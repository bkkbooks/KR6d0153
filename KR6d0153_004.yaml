body:
  text: 東掖白蓮釋了然述二辨受報有二重問答初問意者既事與性六道之因一心中有何不此因同於一時俱感報耶答二初凡夫不得三初總答不得二何以下釋意三但可下正答但可因具不可果並然因果之義其實不差今曰因具者從事為言次第積集故云具爾若論造因實亦前後以前後故故報不俱若以性融故可頓具衆生但理從事則親所以受報不能頓現諸佛得事從理則親所以一時色身普現問偏教菩薩能一時中亦現六道應理親耶答實由得於理性少分但彼不知云神通爾例荊溪云外道之法聽死骨聲能達遠事者良由色中本具諸法故使外道得其少分冥依其本日用不知二復若下菩薩可然用彼等者應知起用有二根本一事二性事則未得道前在生死中受無量身有無量業今既得果從悲願力乃憑昔業為化用本大師引南嶽云待破煩惱入無生忍於法身地還入生死以償衆生斯則正是以悲願力用彼故業性則本具性惡普現色身淺不該深偏故起用但知悲願扶成先業深能該淺圓實依性不妨憑業亦了此業無非是性次問意者約一人別報難十界總報亦應一切凡聖次第先後受報者且如一人先受人身次受佛身何不亦令一切衆生皆同先受人身次受佛身何故同時有受人身者有受佛身者故云不應一時之中有衆多凡聖又何不令一人先受凡聖報已次令一人受凡聖報如是一切凡聖次第受報故云不應一時之中有衆多凡聖答三初破計問者正計由一心為體故不得受衆多身今先破云不由一心復恐轉計由一心為體故得受衆多身故亦破云不由一心文若不作破計而申妨下文云世間出世間事得成立者皆由心性有此道理今報由心即自性計一若破計已何妨而云由此一心為體故有受報不同又從性體故云不由良以平等性體非多非一非聖非凡所有凡聖受報不同皆非心體從性用故故云皆由以此性體具足諸法乃有一多受報不同皆由性用有此道理二但法下示以法爾但法界法爾有多人之總有一人之別以有總故雖同一心為體不妨一時有衆多身以有別故雖亦一心為體不妨一時無衆多身云法爾者爾此也謂不搆造其法自如此猶云自然也若復執於法界法爾即自然計屬無因性須同前破又今從性用故云法界法爾總而言之從性體故法界法爾不由一心為體有一多受報不同從性用故法界法爾有總有別故得一多受報不同若由不由皆法界法爾三若如下顯性圓具以先後受報之法正屬生滅情相亦是性具三再辨治惑二初問者執由一心為體故乃染淨相除生佛既同一心佛淨必除生染是則生不用修理合自然得道耶答三初破計計由一心為體染淨相除破云不由復恐轉計由一心為體衆生之染諸佛之淨二不相除亦破不由又恐轉計既然不由一心必由生佛各心故不相除今亦破云不由別心然計由別心為體者能計所計皆是虗妄計由一心為體者執情為妄但破執計非謂破於凡聖心體二但法下示以法爾乃約染淨法同己他人別以示法爾所謂染淨法同者在己修道以淨除染在他修道亦淨除染是故己他染淨二法法體是同皆染淨故皆相除故但以己他人別是故不可以己之淨除他染三如來下顯性圓具有人才說性具便是所顯故說三千唯顯無破豈知此性無所不具具顯具破故如來藏有相除法不相除法或以事三千為所破唯云屬思議具非是性具豈知此文以不知此文故事唯定破不通所顯若知所破即是性具或破或顯皆吾心體悉不思議二通辨有二重問答初重二初問二初總疑二如我下別問三初立宗二何以下說義二初受報二又復下治惑三何為下結難其謂各各心性為體而性不可一者涅槃師子吼問佛言世尊衆生佛性為悉共有為各各有若共有者一人得阿耨多羅三藐三菩提時一切衆生亦應同得世尊如二十人同有一怨若一人能除餘十九人皆亦同除佛性若爾一人得時餘亦應得若各各有則是無常何以故可算數故然佛所說衆生佛性不一不二若各各有不應說言諸佛平等亦不應說佛性如空佛言善男子衆生佛性不一不二諸佛平等猶如虗空一切衆生同共有之若有能修八聖道者當知是人則得明見章安釋云言不一不二者不一故非共不二故非各雖爾終是一切衆生同共有之地人云一切衆生同阿梨耶識法界體性若爾一人得時應多人得論師云衆生各有佛性但成佛時權智齊等同一法身力無畏等亦復如是若爾佛性可數即是無常正當此難然佛性平等非一非二非共非各如今之持戒修行之人不可一不可異人人各修豈得是一我解彼解彼解我解是故不異乃至云佛性是一隨多人修各各得之不相妨礙今曰法界法體有同有異以有同故同必在理故乃性等以有異故異必在事故乃修殊事無別殊乃殊於理以理從事故此修道見性成佛彼不見曰在迷理無別同乃同於事以事從理故此見性所修淨法亦資於彼名曰隨喜前文答云而不相滅者且從己他事異而論今此問中各一心體者全共法界有同之義答三初總行立宗二汝言下別答惑報三以是下總結別答又二初答受報二初牒計二如法下正難五初約佛分身難二約生返源難三善賊遍身難四夢中見衆難五菩薩受身難二又復下答治惑三初牒計二一人下正難三何為下結斥正難又二初邪計三初約惑染盡滅難一心不容二法二若此下約染淨雙有難一人須有二心三若使下約一心而有染淨結難一心不容二法二是故下示正義第二重初問一時有多等者若據上文以答此竟今再問者發下答文通途指示無出法爾又上文以一難多令多同一故云亦應一切凡聖次第先後受報今文以多難一令一同多故云何為一衆生不俱受六道報耶答二初通示法爾凡有六重初是上文示凡聖皆同一心為體故一心中有一切凡聖次是上文別據一衆生不得一時受六道報三是上文不得以他之淨滅己之染一切凡聖雖同一心為體而不相滅四是上文別據一衆生雖亦一心為體即染淨二事相除五是上文問有何道理得以智斷惑并計一一心中不容染淨二法故能斷惑六是上文問一心中俱有解惑種子外人意云由別有心今則破云不由別有二是故下別示功能三初有理可成故知諸法皆由心性有此理故方得成就心性者即法界法爾也二若無下無理不成三法界下結示法爾成與不成皆法爾也不成者逆性成迷成者順性為行此逆此順無非性具悉是法爾文雖在於邪見正義必該於偏圓六明共相不共相識三初標章二問下解釋二初問二答下釋二初通示體相正報相見依報受用各有共不共者就相而辨然此形相起必有體今欲明相故順辨體是以先示體之與相體是平等真如相是虗妄形質阿梨耶識或唯在妄或通真妄今取唯妄故名為相若了此相必不離體復通真妄文云共相法身者共相之言不同下文共相識也今是無相真相之相下是有相妄相之相今是平等總共之共下是於今總共之中論共不共二就此下就相別示二初淨分染分二初示二分和合識者一由此識具含染淨名和合識今云清淨和合者以今淨分有下染分下云染濁和合者以下染分有今淨分二由此識具含事理名和合識以染淨二分乃是逆順二事之相相必依理波必有水是故淨分亦與理和故名清淨和合染分亦與理和故云染濁和合如清濁波各與水合如下文云阿梨耶識有二分一者覺二者不覺覺即淨心不覺即無明此二和合說為本識此二和合者文通二義若以覺分為始覺即同今文染淨和合若以覺分為本覺即同今文事理和合却以不覺攝今染淨皆名不覺淨分雖是覺體今取返迷之心無明為本皆染攝故文云體者染淨二事即是當體相不離性即是所依二此二下示體一體融一味者前後之文多說性用今是事用二以此下示共相不共二初標立平等真體是總染淨二相是別由於真體分染淨故染淨二相是總共不共相是別由於染淨二相各有共不共故若窮原究本當知染淨共與不共一切諸法皆依真體故真體唯總諸法唯別前從義門且作此對二何故下釋義二初二相所從良由性具方可業薰若非業薰性無由現若非性現則依正共別來有所從去有所過今科云相所從者非從而從從而非從皆不思議名為二相從性而具共相不共相識者識即八識或指八識本有共不共種子為今業薰故本有識而現今曰共不共相作此說者所薰唯識而不薰性或云以業薰性性隨薰緣故有今曰共不共相作此說者所薰雖性不薰性具唯我南嶽談性本具所具者何共不共相相即是性是義方圓全具為相即義方是二何者下正示二相二初對辨二初共相二初總示乃指依報名為共相二如一下辨釋三初約衆成土二初指事二初約淨土然土由生業或由佛應若共若非執成性過今已執說且從生感二如淨下例餘土二然此下釋名云同用之土唯是心相者故知不獨唯心淨土亦乃本性穢那或聞唯心之說即謂在此非他才論本性之言便曰唯顯不破豈吾心體之全具乎二又此下獨己亦感二初立義能感之人或共不共所感之土單非共也故今能感或可一身須分人法方揀能感有共不共若約法體能感之業無非共也如生淨土必憑淨業縱千萬人殊其法門一等以人從法能感之業無非是共若約人者或約同會不同會或約同時不同時或約同見不同見遂有共不共別今從人說故有凡聖共業并一身獨感亦可云諸聖共業者通示所起之有由一身獨感者別未能致之無礙二是故下指事若使一切衆生皆同時而感生亦同時而致死者土既由人人無土廢故使此土不存有闕且如此土有無量人而生安養不妨此土常存不闕所以常存者蓋由衆生或獨或共前後而感人既相續不闕故乃其土常存三又雖下土相唯一二初立義不以人殊而使土別二是故下指事二初指事二唯除下釋伏疑疑者云所言舊土之相更無改增者且如無量壽土觀音成佛時其土變淨復倍于前豈非有轉故今釋曰除同業轉二不共相二初總示乃指正報為不共相二以一下辨釋二初釋義二然此下釋名初文云自他兩別者要而言之天覆地載即是共也我爾相殊即不共也二就共下各辨二初共中不共二初標二謂如下釋二初指事二初約異類二復據下約同類二若如下例顯二就不共下不共中共須了正報尅從法體己他相望一向不共今約時處見語知解聞識而論於共既得論其復須於此以論不共此共不共若從法體己他皆是不共以此顯上共中不共亦有尅從法體一向是共如水共為人鬼依報由約業異所見不同名為不共既人與鬼所見不同名為不共復須於此以論人與人見彼此是水名之為共此共不共若從法體皆是於共然謂其法體是水者且從人見為言若以鬼見為言亦可云法體是火人見謂水而此一物不可思議平等妙性隨人隨鬼業相發現為水為火亦何定謂本是水耶本是火耶一切諸法皆無定本文為二初標二謂眷下釋二初約己他二初己他皆共二初指事二皆由下釋義二或有下共不共二又如下約一身三以有下結答二初正結答二是故下指事警䇿性無不具事由薰發事既即性故染淨之土生佛之身而無定體性既隨薰故於金軀有見灰色或於丘墟而見華剎今文唯舉於勝見芬者將使知迷而令改業第二何故下依止三初標章二問下解釋三此明下結釋又二初問二答釋二初正答文有三一根本二又若下成法三又此下具德應知此三蘊空假中須約二義文意方顯一約法體尅論三諦以三文中皆云此心者即平等一性也由此一性是一切法之根本故由若不依此之一性修行止觀不得成故由此一性具足三諦寂用義故故具德中所具之德乃是三諦二隨處點示通論三諦心體具德三諦俱假成法即空根本即中文云本性具足寂用二義者具寂是具體具用是具相若祇以中道之體為能具染淨二性為所具恐違此文何者今文指寂為體既云本性具足寂用二義故本性是能具中體亦所具同荊溪云本謂一性具足自他故自行之體亦為所具彼宗因以中道為能具故指空中為理總俗諦為事別豈知荊溪云總謂涅槃別謂三德并云攝別入總無非心性平等一性一性中無性空三千宛然假此文以心性是總即平等一性同下文云本謂一性一性無性三千宛然者同下文云具足自他前從就法故總在妄念復從功歸故總是心性故今所立就法論總則法法是總功歸論總平等一性為總三諦乃是一性所具而此三諦亦得為總亦得為別三即一故為總一即三故為別今文乃以心體一性總具寂用然此所具得名不同若以平等一性為非體非用則其所具是體是用如今文云寂用二義寂即體也若以平等一性非體非用名之為體則所具而體而用俱名為用如今文云顯何所用謂自利他故此自他皆名為用為欲薰彼二義令顯現者止行薰心令此心體所具寂義離相顯現觀行薰心令此心體所具用義相㒵顯現故下文云熾然六道并相好圓備此之用相若非所具現從何得二料揀有二初重二初問二答離一切相是寂義者平等性體非相非無相以對用故故名無相然無相之言對於有相無相屬理有相屬事須約五義而分別之使諸文不濫若約過德三諦乃無三道之相若約修性性德三諦乃無修德三諦之相若約體用空中乃無俗用之相若約中邊中道乃無二邊之相若約亡照一性乃無三諦之相今文離一切相正約體用以空中體離事用相若約亡照故此空中還成有相亦為所離體具違順二用即是用義者體用亦五今體是空中用是俗事若約亡照故其空中還在用攝修習止行至即為自行修習觀行至即為化他者義有各對一約自他今從對論體自用他若各論者此之體用在己修證無非自行以此體用令他悟入無非利他故下文云王身攝化普門示現故真體應用皆屬利他二約止觀今從對論體止用觀若各論者體用二法各有止觀第二重二初問修止觀為除生死者今正問觀所云止者相從而來轉增流浪者乃約法體而難隨具凡所有相體是生死祇如實報藏塵若離業識則無所見今約法體故有此疑若隨具詮辨者此相既是佛之所有佛所有者無不即性染體即淨相體即己以淨為染終日染而非染以亡即相終日相而非相故此之相是佛大用何以法體生死為疑故下答文意不出此答中云但除其病而不除法等者同智者云火能燒人得法術者出入無礙不須除火故八萬四千煩惱凡夫為之疲勞諸佛菩薩以為佛事三明以何依止三初標章二初明下解釋文自為三初明以何依止體狀二初標二釋二初問二答二初總答二此義下正釋二初止三初釋四初聞教以意識能知名義者總語意識有起觀之功也一圓覺性具知不知即此為業復薰覺性全性不知現為依報全性之知現為正報此知不知徹復性源無非覺也但從事故依報不知正報為知於正報中一蘊之色四蘊之心心則有知色則無知於四蘊心迷為不知悟則為知此知不知對於塵色單非知也由是知故知隨無明知見立知稱之為迷知隨師教非知之知稱之為悟功由意識蘊此之知可隨師教問修證入意識聞教起無塵解名字位也二聞此下修習對前聞解修習是行然此之行行不離解至於極證亦此解爾約位分別亦可得云行家之解證家之解約體無殊故初心解與果地解無二無別今修習云增益解性後證得云解性圓明故知行證亦名為解言方便者修性對論凡有修入皆名方便解行對論具緣識境名為方便然此方便義通諸行若五悔夢王別為法華方等方便真似對論居內外凡位曰方便今文通諸別在修性并於約位薰於本識者薰習之法義該四種一意識二無塵智三本識四真心事理分之真心是理餘三是事真妄分之意識本識是妄餘二是真能所分之意識與智是能餘二是所總攝言之祗云意識薰於本識意識能知知之為義攝無塵智藏識為本本之為義攝於真心克體言之是無塵智薰於真心問何不直云無塵之智薰於真心答創心發智必依六識真無所存遍在八識問大乘詮之六識八識而何不云依其本識真無所存遍在一切而何不云薰其六識答意識附小說現行故八識附大是含藏故三久久下證得久久薰心者始從觀行至於相似解性圓明自照己體者全性起智了智是性智既能明即性自照意識即息者四住亡也若取塵沙亦通二惑爾時本識轉成無分別智者然明明也始在初住極至妙覺圓位破惑義通橫竪據今爾時之言必蘊斯二若前事之末後事之始為爾時者即竪義也若即於此時為爾時者即橫義也問意識如何通於二惑答意識之義有通有別故通義復二一通無明塵沙二惑起信論云此意復有五種名即以二粗并於三細共為五意二通塵沙見思二惑以意識緣外必依內根緣外即六依內即七如藏師云意識緣外境時必依內末那染污根方得生起二別義亦二一者意名別在第七如攝論云八識名心七識名意六識名識二別在六如起信云隨事攀緣分別六塵名為意識今文當六義亦該七故下相用及以六七共名為用又應四句意非識識非意依止曰意分別曰識故五名意第六名識意即識識即意五意亦名五識識亦名為意皆約大乘三識竪判若依小乘於第六識橫辨三名此不具記亦名證智者證真之智名為證智又對以智證於真如名為智證故以真如自證於智名為證智此二證智皆得名為無分別智四以是下結示下文修止既約三性今文總說故亦該之聞教中云虗妄因緣者聞分別性止然虗妄法有即非有惟一真如者聞依他性止亦無別真相可取者聞真實性止既聞三止依聞修證豈應別途意識即息證分別性止本識轉智證依他性止亦名證智證真實性止亦可聞教中略分別性止修證中略真實性止二是故下引證其有二意一證意識有能知名義之功若會同三性者本覺即淨心真實性不覺即本識依他性妄心即意識分別性二證自照己體亦名證智由無塵智即始覺真心即本覺始本既然不異故無塵智即是真心自照己體斯得名為真自證智文云能知名義為說本覺者意證有能知之功師教為說一切諸法自性寂靜即是為說本覺聞此之說能知此覺即名始覺子昔嘗謂祇一圓覺約本不始遂有三覺由性迷之名為不覺今日示之名為始覺天然有之名為本覺何但始覺與本覺不殊亦乃不覺與本始全一此乃以三從覺覺祇唯一此一非一覺名亦無若以覺從三覺乃有異不覺覺字即屬無明無明亦得名為覺者於彼當分知見立知知非覺乎但以此覺望於真知遂成不覺始覺覺字即屬修智以此之智能覺本覺故名始覺本覺覺字方是天然性覺之覺問論以根本妄心能知名義今云六識者何答論從極論故指根本今從創習必在見思本末體同異而不異三料揀然天台之道得佛本原枝流自在破則性相俱非行之以自他二計取則性相俱是收之以隨機四說此之去取出有師承故今文中或說真心或談本識且本識者豈唯薰妄亦薰真如良以平等一性功歸無別真心本識就法有殊就法如水與波功歸必在濕性性相諍論若得此意自然息滅文有二重問答前云薰於真心今云薰於本識由此為問先問二名次問二薰初重二初問二答二初出本識異名云本識者下文云以與生死作本故顯識論云阿賴耶識亦名本識一切有為法種子所依故阿梨耶識者或云阿賴耶梵音楚夏爾真諦三藏就名翻為無沒識以無始來不共沒故奘師就義翻為藏識所攝名藏為諸衆生取為內我我見所攝故名為藏又能藏自體於諸法中又能藏諸法於自體內攝論云能藏所藏我愛執藏依此義故名為藏識和合識者真妄不相離故種子識者攝持能生故攝論云有能生彼功能差別名一切種子識果報識者有似塵似識故等者或名所知無覆無記無垢并宅識等二正答二初指上由上文云一者真如平等心此是體也二者阿梨耶識即是相也相不離體故為同體乃非相故為異祇語體相同異已明二今更下重說四初法體相用者名出起信於生滅門明此三大今辨本識故說此三但彼相大在淨在性用大非惡在善故立義中云一者體大謂一切真如平等不增減故二者相大謂如來藏具足性功德故三者用大謂能生一切世間出世間善因果故今文不局相通性事染淨用通善惡果因其不同意如辨不空藏中已明二如似下喻義應有三一者相由由水為流由流為波如由真心為八識由八識為六七二者究原即水為流即水為波如六七八識皆即真心三者成體以水與波共成於流如六七與九共成八識三是故下引證三初證法體生滅之言義有二種一者相應生滅即六識也境界為緣執似為實成生滅相二者不相應生滅即八識也獨頭不覺起於三細生滅流注今文生滅通則該二別不相應二以與下證得名以與生死作本者就法以無明為本功歸以法性為本祇由此識含此二義故名本識若合上喻者波以何為本就法以流為本功歸以水為本文云種子者就無明當體即是修事推功所歸乃是理性故種子之言亦該其二三又復下再證法體二初引經二此明下釋應知今宗能深究經論起異諸說者由談性具且經明云自性清淨而但復云心為惱染今指此性由具染性故為惱染且論祇云具性功德今指此性不獨是淨是性亦乃是染是相是故上文具足染事四以是下結今就事相說者本識雖該真性但是妄不離真故本之為名就法在事第二問答二初問若於前答同異已明不復此問為其不能類通雖知本識與真心同異而未知薰本識時即薰真心以不答三初示義上文既云薰於本識增蓋解性故知薰本識時即薰真心二是故下引證三覺即下釋相在本識中明於淨心如在流中以辨於水故水不離流流不離水若不就流辨水者故說水時未必是流而此淨心非阿梨耶如金錍云祗可云水本無波必不得云波中無水又復須知若云波者未必有水若云水者必須有波斯亦可云祇可云波不是水必不得云水本無波語於性體不語性用故云水本無波若語於用則不可云水本無波故云是則無有無波之水從悟實說用即是體故云不可波中無水若從迷妄而亦可云波中無水故云若唯從迷說則波無水今亦例爾若從迷說則流無水二觀為三初問起二答釋三初聞教性依薰起顯現世間出世間法者須知修止觀者罄盡法界全體無有一法出此止此觀此聞此修斯是南嶽開示佛智若有絲毫法而不全正者即成偏邪是以止寂觀照照若不盡寂亦有虧且夫寂者真常性體而此之體豈可虧殘故今語觀即是依體發現世出世間一切諸法然此諸法皆吾心體中所有者此有雖即非有非有不妨而有從此達之是名真觀由此止觀是以果證法界全體若事若理若自若他無不具足故章安云若事若理智斷自他於初證中具足無闕如此之證不與小共不可思議聞則驚怪盡涅槃海此一妙證釋二人疑二以聞下修習二初悲誓境二是故下起行問聞教既聞世出世法今修觀中何以但云六度等行答若就六度分別前五世間後一出世由得後一六皆出世故以六蔽而為世間既云四攝其同事者必該六蔽諸染法也問今修觀者若修同事行六蔽耶答和光而不同塵以和光故亦行六蔽不同塵故彼實我權雖法理當然但以初心易實難權唯內照之未堪涉事證法性已行則無礙三以久下證得近在初住遠至妙覺究竟之言但對聞修或的指妙覺三以是下結二明破小乘人執二初標章二問下解釋二初問何故要須依止淨心者據理小乘亦非不依淨心為行由宗必有體今云何須依止淨心者一則由彼肯空無覺無知義非佛性以大奪之不名淨心因以大奪故就執云不須依止二則學小乘者宗計不同或計修習但依意識何須依真答釋二初意識無體二又復下意識生滅無轉勝義二初正答前問二初示義二何以下釋相三初略釋攝論云若言前念薰於後念成薰習者此義不然以其二念不俱有故二如前下引類二初引聞法二引學字皆先引次類聞法約二人同世學字約二人異世三若以下正示三初示二若不下況直果者無歸著之㒵也三以是下結二料揀餘義二重問答初問二答以凡畜況二乘者凡夫之言或以位次深淺相況居賢位者為凡夫入果證者為二乘或以修人天乘者況修聲聞緣覺乘者第二重初問以染難淨二答淨心之言有總有別總該染淨二性別唯淨性今文從別故云不聞教者却有淨心但以無修淨業故不得有用然復須了依止之義有約性平等有從修異途若約性平等不論逆修順修凡有修習莫不皆依平等淨心而得成就但以從修異途其逆修者是九界法合當逆性故所修習不以平等淨心為依其順修者是佛界法合當順性故所修習乃以平等淨心為依三明破大乘人執二初標章二解釋二初正釋二初問二答此由問者不了大乘縱使境觀圓融不二其如粗惑尚未先除是故創心修大乘者必憑意識聞教起修豈應問云但用淨心二料揀有四初問者以性難修然止觀法體雖一隨義詮之必殊以天然本具未曾發現者是曰性德以今日意識聞教起智薰發而現者是曰修德問者直據性德不許由智是以難云何論意識等也云滅自心境界者自心之言乃指意識以境界所起既由意識今復以意識而滅境界故云滅自心境界又自心者自性清淨心也依此自心而現似境今以意識尋知名義滅此自性所現境界二答先示性德本然次示衆生迷動三示必假方便文云不覺自動者自之一字若指無明性體常住不變無明自發搖動若指法性無明迷故淨心自性隨緣而動文云方便者方便之義有三種一者師教為說二者意識能知三者起無塵智前一屬具緣後二屬修入因此方便始可得證性德靜明第二重問者雖許由知知非意識即是淨心自知本寂然據所論必具止觀今問與答但云本寂者且從止示既然知寂寂必而照答約二義顯於淨心不可自知一約能所夫言知者必有能知所知若無所知何得云知淨心體一如何淨心復知淨心故云淨心無二二約修性淨心性德雖具能知本寂之性奈何在迷若不假於今日智薰無由念息又淨心無二者乃答問中自知二字復為無明下乃答問中念息二字問初云淨心無二不可自知次何復許淨心自知而但云無明覆故不得自知答從淨心體不可自知從淨心用既具能知故可淨心有自知義問若云從用有知何故前云若就心體而論實自知如此如此者心體有靜有照照非知乎知若是用何云心體答心體能具於用故云心體而論其所論者即性用耳第三重問者念由無明無明若存念何由息息念既由無明亡無明亡必由無塵智以不了此故問何故要須智薰答中之意滅無明者須無塵智今問此無塵智與性體照明為同為異若云異者無塵之智不同性體本具照明耶若云同者此無塵智能破無明而使念息豈非性體自照自知本寂者耶答體同義異以體同故性具照明即無塵智以義異故未現者號性照明已現者曰無塵智問已現者即現性德性德不現由無明覆性德既現何故有無塵智時復有無明既有無明如何復稱是現性德答行有淺深現有分極等覺已還皆是分現故雜無明問無塵之智乃是能薰性之照明乃是所薰能所不同如何能薰即是所現答前為能薰後為所現後所現者復為能薰故一法體前後論之為能為所無以能所不同乃謂能薰而非性現第四重問者前三問意莫不存智與滅境界但不許以意識與無塵智能知能滅祇可淨心自知自滅今之問意不論境界滅與不滅并能滅心知與不知證字亦可為澄答二初標定三義然此三義正途辨之須約體德方能分體稱自證德有智斷今文智斷一無塵智而得二名以此之智去惑照理名為智德以此之智用理斷惑名為斷德從於智德稱為他證從於斷德稱為證他此義難見以喻顯之鏡體自明如稱自證因去塵故方乃有明如由他證以此之明去彼之塵如由證他他之一字一向是塵故惟屬過證之一字一向是明故惟屬德去塵得明以明去塵必有其人人如智也此人去塵得明非不去塵且從得明故稱此人為得明人如無塵智號為智德名曰他證此人以明去塵非不有明且從去塵故稱此人為去塵人如無塵智號為斷德名曰證他然法本離執非由自證非由他證非由證他如是證者名為真證若亡執已為緣各說從其本性而得三昧名為自證從其智了而得三昧名曰他證從由去惑而得三昧名曰證他得三昧者於此之三一體圓妙以體與智斷非縱非橫不並不別雖一而三雖三而一非三非一而三而一不可思議但以問者不了斯旨觸途成礙其不了者功由不了須無塵智文云為由他證於他者此他證言不同智德乃約斷德令他得證故名他證既令他得證即是證於他也亦恐誤多由他二字二若心下隨義各難三初難心自證四初約自然難心自證二初立不由功用而得寂靜者非無此理如下文云不作功用自然成辨起用尚然何況證體故知從性論功不作功用從修辨義須論功用修曰無作良由即性今語返迷且從修說二若爾下難既不由功是從性體衆生有性應自然成二若言下約作意難心自證二初立轉計作意二作意下難真如體性性不名作故知作意即是意識意識即能證性即所證斯由他證何名自證三若非下約心自心難心自證二初立轉計非由意識起智而證亦非真如自心作意但真如自心故名證二若不下難二初約不作意難今問或彼執云何必須其能所要有能使心證但心自心即名為證答若云不須能使心證必自然證例前難云一切衆生皆有此心何不自心二若當下約作意難文以意識為他證者然意識者但能起智他證之功必須別在無塵智慧四若言下約知心本證難心自證二初立若據立宗有能知言似合正途今復破者雖云能知而不許立無塵之智既無此智故此能知還是妄識縱立無塵為能知者若計此智而為能知尚亦須破豈況直云能知者耶二為是下難二初標定二義祇由不立無塵之智故為今破所以標定無無塵名二若是下隨義各難二初難淨心自知二初牒計淨心自知亦有其理了無塵智即是本性豈非淨心自知本寂但由計者尚乃不許立無塵智豈能曉了了智即即性二一切下正難二若言下難意識能知二初立二意識下難二初正難三初標定二義二若言下隨義各難二初難不見淨心不見佛心應知佛證者顯見佛心方知佛證見佛心者須約六位今從修入乃以五即難彼全迷二若見下難見淨心淨心可見非無其理下文引經是人行邪道不能見如來釋云所言如來者即是真如淨心依薰緣起故名如來彼謂心外而來故不能見以此而知即心而來故可得見若云叵見是但見來不見如耶荊溪亦云見性修心豈非如性亦可見耶可與不可須善其意一者可以智見不可以識見今難識見二者可以不見相而見不可以見相而見今難見相三者可以無能見所見而見不可以能見所見而見今難能所四者可行非心外而見不可以心外而見今難心外三以見下結示義旨設使心體本證者由問者云能知淨心本證今乃許彼而有心體本證之義故云設使但不合廢無塵之智故云妄心不可息也二若言下轉計二初轉計依經二初立向立意識能知因遭約見難破能知今乃轉計非約見知由聞教知問聞教能知能知之智成正途耶答雖名為智智無別體由計不立無塵智故故智之體還是意識但由意識聞教能知召此能知稱之為智非別有智故殊正途及復雖云能知之智薰於淨心及論知證乃非此智還指淨心自知本證此由計於不通他證二汝依下難二初標定二義寂相者寂即是相二若作下隨義各難二初難作相一由作故作即作意乃成妄相二由相故既有寂相還成妄相二若不下難不作相三初難二若言下轉計三即有下再難即有所緣者疑住之處即所緣也二若言下轉計七識二初牒計以此文顯上計六識問何不計八答約現行故問七識如何屬於現行答以由七識不一向故或類六識義同現行如攝論云於定不定善等位中皆不相違恆現行故二是亦下難二初難二初七識非知七識是我執識者以似為實執為內我亦如論云能執受一切眼等有色諸根妄危共同盡壽隨轉是故說名阿陀那識又云若色等根未已生起若無色界自體生起名為相續攝受彼故名正結生而有執受一期自體謂善心時亦執我故二又復下所緣非實二以是下結示二若言下難由他證三初牒斥二何以下正難二初約義總難前云正途通三義也故今文云心體自寂靜故通自證也又云乃可證他通證他也又至下難證他中云若欲成就出世之道必藉無塵之智通他證也文云但以有六七識等名之為他者他之一字前云從過正出此文文云由有此他故說他心不證是故乃可證他者既指妄識名之為他正屬昏散不證明靜故云不證今以明靜斷彼昏散令他得證名為證他二若言下隨計別難四初牒計妄念習氣者習氣之言有家有即須知即習有三不同一者權說即別正使為通家習若實說者指權家習即別正使具足應云正使即習習即正使二者不因權實正習相即但以經論立名不同乃指正使亦名習氣斯就通別各可得云習氣即正使正使即習氣良由正使亦是染習成其氣味今南嶽所指似從立名不同為言但不可云餘殘氣分三者約最極正使無明微細同名習氣文云是故心體亦不證寂故須他證者意云由除習氣之他而能證寂故名他證二何等下難何等方便等者若立無塵智為方便能除習氣豈非亦通由他而證三若言下轉計由不立智是以但云不起新念四彼未下再難文云有何所以并云若無別法者皆約無塵智為此難三以是下結三若言下難由證他三初難直約淨心二初牒計計者意謂不由他除而證淨心故云不須用他證心應約淨心而除於他令他得證故云但證於他即是淨心能證於他他因淨心既而得證故習氣自滅二是亦下難二初約妄惑文云根本又云先除者一者無始見思種子為能起本今曰妄心為所起念今修止觀要須先以無塵之智達於今日所起之念皆是無始妄惑種子以為根本隨念發現了其種子有即非有作此了達名為先除故所起念任運自滅其惑又無無塵之智直以淨心除於今日所起妄念令念證寂者無有是處以其不能先除本種後若遇緣念還發現是則妄念何由永息正如蘺草若不絶根遇春還茂故上文云若無無塵智薰心裏無明終不可滅無明不滅念即叵息問小乘之人既不先知八識含藏能起本種如何亦能息所起念答其實小乘先除能起見思種子方可除於所起妄念由彼除惑實是薰除以空寂智薰於藏識遂使種子因薰而已方得所起妄念斷滅但彼不知是以不說先去本種二者斷末見思分別性時以無塵智先了根本無明依他有即非有分別妄念是以方除云習氣恨本者依他性也妄念者分別性也釋佛性中滅妄歸真曾明此旨二又復下約淨心前他證者就法言之由妄惑滅而能證寂功歸言之惑何自滅而證於寂須無塵智令此惑滅而得證寂今證他者就法言之由於真心滅彼之惑而為證他功歸言之真何自能滅彼之惑須無塵智用於真心滅彼之惑祇由問者不立此智既無功歸就法不成是以淨心不能滅惑二若言下難轉計妄念二初牒計由約惑斷謂之證他故得轉計但從妄念自相抑止二為前下難二初標定二義二若言下隨義各難二初正難文分為二初難前念止後念二若言下難後念止前念二若前下轉計二初前念自嫌二初牒計二心不下難由其計者計一念起起即自嫌是故今難一念起心心無並慮如何一一念自見自嫌又一念起心心體是妄妄心義一如何自見復何自嫌能嫌心者必無塵智此義如次二若後下後念嫌前二初牒計因遭向破心慮不並是故轉計後念嫌前二能嫌下難二初標定二義二若知下隨義各難二初難知空二初知即是智妄念是逆背空成迷不但迷不知空亦乃自迷非妄才知是妄妄必知空故知妄知即無塵智二又若下知即不嫌順妄而知其妄可嫌順空而知妄體既空復何有妄妄既非有知復嫌誰二若不下難不知二初核定二初無明無者不也明者知也不知念空即無明耳二又復下妄想今問能嫌之心為情為智若是情者應屬所嫌若是智者何名妄想答情智之義不可一途今以權實例曉其說聲聞於權而為情者一不知權情執為實二不知即情執為異然此二情若自相望以後為智以初為情後之智者若望不即故還是情何者聲聞在昔非但不知權即是實亦乃不知權本是權以不知權故執為實來至今經佛敘為權故云種種隨宜說法聞此之說執實情亡知權智現雖知是權未知即實若外此權而求實者知權之智智還是情佛至顯實指權即實故云是法皆為一乘聞此之說外權情亡即權智現如此之智方為究極今以此義例曉今文一者不知妄是於妄名之為情二者不知妄即是空亦是於情若此二情自相比望以初為情以後為智由知妄故故妄可嫌故能嫌心乃屬智也但此之智而乃尚迷妄體即空無妄可嫌謂為有妄故知妄智智還屬情是故今文判為妄想以此一義貫達諸說凡云有情可亡猶未脫於情見證道不斷理現于斯非破非顯旨在於此伏冀諸同台衡學者以般若心深研極究開佛知見不負稟承問證道不斷其義如何答一者教道有惑證道無惑惑既已斷更無可斷故云不斷二者教道約離證道約即以約即故情惑全是而無可斷故云不斷今從後義二此能下約法喻正難無明能起於妄想是故論云不覺即動妄想能成於生死是故今云生起之識於是雲興名字分真若望究竟尚猶在迷博地凡夫望於名等復在迷中是故喻云夢中之夢名字粗覺是故喻云髣佛不睡三又復下難不作心念故妄念不起而為證他二初牒計前自證中亦云不觀境界不念名義與今不同前云不念自證真如今云不念妄念斷滅二為淨下難二初標定二義二若是下隨義各難二初難淨心不作心念淨心本有應須自昔不作心念如何昔作今方不作二若是下難意識不作心念二初直約心體難祇由意識是念之體二若言下約根對塵難二初再牒計二為對下正難二初標定四義為對見法等者今云意識即不分於五根意識并於第六是故通總祇云意識法塵之言通於六塵見對之言亦通六根類如禪門問曰如經中說六觸因緣生受何得覺觸但屬於身耶答此對通說若通時見中亦說聞餘義類爾今就別義論覺支者正對身也文云為不對見法塵而不念又云為全不對塵名為不念前約意識現行以說雖然現行而不對塵後約意識不行以說如寂睡時意識不行為不對塵二若不下隨義各難三初難第四第二不對法塵識名之生由識塵故若不識塵何名為識二若對下難第三對而不見頑故非識瞽故非見三若見下難第一見而不念由向三句皆非識義不足廣破今此一句既能見塵正是識義而云不念者未知此見何由不念於是廣破文為二初直難不念三初總難二為知下標定二義三若知下隨義各難二初難知空文云對而不見者雖對於塵了此之塵非有而有有即非有不見塵相此對不見非頑瞽法問對而不見與見而不念何殊答見約五識念約意識二若謂下難謂有三初法三初不能無念不能無其後念念前謂有二又復下謂有即念三又復下有即妄想文云而復不念者即是無明妄想何謂而復不念亦可此句生下喻文二譬如下喻三此亦下合心境俱暗者不作不念但有妄念念於前塵今於妄念而生嫌心乃不念念前來以念念境祇有境中一重無明今以不念念念乃於心上又加一重無明之暗故云心境俱暗問云不念者不念前塵如何稱為不念於念答念前塵者乃有於念今不念塵即是亡向念前塵念從亡所念不念前塵從亡能念不念於念但以此亡非無塵智還屬忘念雖云不念乃是不念之念故為今破又念前塵時惟有能迷前境之心心上一重無明之暗今復不念前塵增加境上一重無明故云心境俱暗二又復下約作意以難不念二初難二初難不作意二若作下難作意二但以下出他迷三初出始習自珍二初因繫得止二是故下由迷妄寶二是以下斥習熟謂證二初習熟謂證二但不下約義斥迷三初迷流動二復不下迷在惑三又不下迷居位三雖然下許為方便大章第二明止觀境界者無名數中假名數說或廣或略皆是隨機以經論中多明三法此三性者攝一切法罄無不盡故三無性論云一切諸法不出三性今乃約此示其止觀所觀境界此所觀境不出二義一者所觀所離妄境二者所觀所顯真境分別性者亦名遍計即屬見思是為妄境真實性者亦名圓成即屬空中是為真境依他性者即屬無明亦妄境也是故論云分別性者謂名言所顯諸法自性即似塵識依他性者依因依緣顯法自體即亂識分因內根緣內塵起故真實性者謂法如如又依他性既屬八識含藏染淨故通真妄然真妄境望後體狀既當正修故此境界義同開解即可示同摩訶止觀眼智所知之境界也問彼是真境今何通妄答彼三諦者實於緣生三道妄境說示三諦意與今同亦可今科與下體狀同與摩訶止觀正修義意為類以彼正修先明所觀同今境界次明能觀同今體狀問彼文所觀何通真妄答彼引華嚴心造之文通造十界豈不得以佛真九妄若離妄是真是故真妄俱屬思議皆為所離若即妄是真是故真妄俱不思議皆為所顯然分別依他二性之名文相非一不易條流今先約情法有體無體以辨二性分別性者是能執情而無自體依他性者是所執法有妄染體如論云依他性有體異於分別性無體又云依他性性體即是煩惱及業分別性能熏起執上約六八對論辨性若各論者各約因果以辨二性六識之中枝末惑業能熏染因為分別性約於所熏六道境界為依他性由此境界依能熏起故以分別却為所依如下染濁依他中明例應八識不覺即動能熏染因屬分別性轉現境界為依他性故四念處云梨耶依業生故云依他上來但約妄識以說若通約於真妄相望義應有三一者約果竪說為依他性約因橫說為分別性故六道境依於八識名依他性轉現境界依於真體名依他性各取能熏無明染因為能執情名分別性二者不分因果但約妄染名分別性同依真體名依他性如下文云一者淨分謂在染之真即名真實性二者不淨分謂染法習氣種子及虗相果報即是分別性二性和合無二即是依他性三者依他之名不獨在妄而亦通真分別之名却惟從果如下文云心體平等名真實性心體為染淨所繫依隨染淨二法名依他性所現虗相果名分別性又依染淨或唯八識得依他名以本識無體依他而有如四念處云依染如土依淨如金故言依他又以此望彼名曰依他若以彼望此名曰他依即同三性論云能為分別真實二性依止然上所辨分別依他乃約染法若淨法者具如下釋釋文為三初標科文云三自性者或名三無性或云三有性或祇云三性云自性者即自分性從安立諦以得此名亦名有性略名三性云無性者己自分性此名從非安立諦說四念處云三無性名非安立諦論云三無性即是非安立諦若是三性並是安立前兩性是安立世諦體實是無安立為有故真實性即是安立真諦對遣二有安立二無名為真實還尋此性離有離無故非安立三無性皆非安立也二所言下解釋文自為二初總明三性為三初標二謂出下示文云六識七識者以七合六共名分別如大師指經起以遊行以求衣食為世間往惑分別之識名阿陀那據分別識應是第六毗婆加識而却名為第七識者全同今文以六七識共為分別問分別識與分別性何殊答有分別性即分別識六識是也有分別性非分別識八識是也三此是下結義既不一向之說者且約大位二所言下別明三性二初標二初辨下釋文自為三初真實性二初示義三初標二所言下隨釋文自為二初有垢淨心三初標二即是下釋云淨心者名從對得體自性彰名對得者對染名淨體性彰者淨心之體即平等性非染非淨而能染淨由以此之非染淨一性之體名染淨性是故染淨二性相即以淨即染故此本性具足違用以染即淨故復體包淨用無染衆生雖有能熏之垢而此淨性熏垢本空衆生雖有所現染相而此淨性染相當寂若依淨性即是染性既現染事不得名淨由此染性即是淨性乃與染事事不相應復稱為淨三故言下結二所言下無垢淨心亦標釋結釋中云染熏息者修惡情已也事染泯者修惡法破也智者總云斷修惡盡淨熏滿者修善智足也淨德顯者修善法圓也雖從熏顯性淨之用非增者智顯之法顯無別顯全顯性故豈是修增假遣昏雲照體之功本具者顯法之智性本天然實非昏去方謂智明故云假遣如此推窮莫非性德故復稱淨前文復字對於事染今文復字對於修淨三然依下總結故有有垢無垢之殊者依熏約用有事染淨本無無染有染之異者平等性體本非染淨二問下料揀初問二答然衆生於無明中不妨即有諸佛法性之明性故諸佛於性明中不妨即有衆生無明之暗性但以對治轉迷故言諸佛無無明爾二依他性二初標列二清淨下隨釋二初淨分依他性三初標二即彼下解釋應知一性其名有三一曰非染淨性二曰染性淨性三曰出障真如在障真如若通論者從其當體皆名實性從為虗相之所依故皆屬依他若別論者有二不同一者獨取雙非為真實性染淨二性屬依他性正如今文染淨二分依他性也二者出障真如為真實性在障真如為依他性問今文淨分依他分別與於前文及佛淨德為同為異答體同義異前約生佛對論三性佛所有法皆真實性衆生所有名餘二性今則生佛各論三性生佛所依皆有實性逆順二修各有餘二文云即復依彼淨業所熏至故名依他者依他之義有二不同一者身土依性而現是故順指淨性為依二者身土依於淨業能熏而現是故順指淨業為他文云三身至自利利他等者對論法報寂光自土即自利也他報應化他受用土方便同居即利他也通而為論三身四土己所證得皆自利也即此益物皆利他也三料揀有四初問者因向文云事染功盡答有二意一約自他自行不起化他亦起故云為可化機亦得顯現二約權實實造不起權造亦起故云示有三毒權受苦報問示有三毒為性為事答就佛自論亦得為事對衆生說故受性名問大師祇云性惡不斷豈非權造是性非事答智者所論諸佛起用是全性惡起為修惡為對闡提佛雖起修此修即性不為惡染故受住名故智者云終日用之終日不染又云今明闡提不斷性德之善遇緣善發佛亦不斷性惡機緣所潡善力所熏入阿鼻同一切惡事化衆生請觀事字并以闡提對說之義又云闡提亦爾性善不斷還生善根如來性惡不斷還能起惡雖起於惡而是解心無染通達惡際即是實際乃至云闡提不達以此為異請觀起字并云雖起及云達惡以此而知但由佛能了修即性故異闡提非謂不起修惡事染問佛起修惡與生何殊答體同義異以體同故皆謂事也以義異故即不即殊故輔行云闡提若能達修惡則與如來無差別第二問答中意不出隨人詮辨故言清淨尅從法體實名為染例如起用屬解脫德亦名為縛故荊溪云若現六界為縛現二乘界為脫佛菩薩界為變照縛脫自非證得法華三昧不思議身自在之業安能現此三十三身非縛非脫而現縛脫其謂現者現非事乎故知尅體亦現縛事但以此事即性而為俱名性脫第三問者以由向云即是清淨分別性法答中乃約當體所依以分二性第四問者無垢清淨二名相類真實依他二義似同故有此問由依他者必有所依若指真性似同實性答中約於體相用者於依他中置所依真但取能依故名為相又此依他亦該能所淨業所依身土能依若能若所皆是修相用光對緣稱分別性前云三身四土皆通自他即此意也二染分依他性三初標二即彼下釋三料揀釋中云但為分別性中所有無明染法所熏者依他性者即所現境能熏之法有二不同一者始初獨頭不覺以為能熏有轉現境二者今日六識無明以為能熏有虗狀境然二熏境若從異說轉現界外虗狀界內又界內境若從迷執即自謂實今從大教詮此界內是虗狀也所現境界既二不同是故能熏有本末異今從末說故六道境依於見思此依他性故屬六識界外依他方屬八識若不異者能熏無明本末體同所現境界皆是八識三料揀有四初問者衆生既具淨性之用未熏現時豈全無能答意者自雖未熏為佛所護因護漸修豈非有用若無淨性佛何護焉云同體者一由生佛性淨體同佛若以智能護淨性究絶染惑是則亦護衆生淨性二由諸佛同體權智常護衆生有力不蒙者佛力常有以機罪重而不蒙拔問輕者蒙拔重者不蒙豈顯於佛而有大力佛果力大何不拔乎答佛力實大去就殊爾非謂力微不能舉重如世之科可舉萬斤以萬斤物而不就科若也就之何謂不舉衆生罪重不就佛力若也就之何不能拔第三問答中乃以自熏為答是故且云更不有能若耶佛護為言此淨亦有力用故涅槃中佛於重罪衆生偏加愍念斯由衆生本有性淨第四問答答中意者法不自現必假熏成若衆生在染全無熏淨之能諸佛在淨而有熏染之德言熏染者即是悲願現入六道示有三毒即此悲願熏染性也問用假熏起何須復云不斷性惡答若無性惡熏乃不成問若依熏起何云不假功用如鑑現像答法界法爾或從事辨理必假悲願熏性方現或從理辨事不藉外緣皆從性起或事理不二或事理雙亡隨緣異說悉非思量文云故大聖捨之以表知機者乃知機之未可發也就法論捨雖曰佛捨於機功歸論捨實是機捨於佛例如事理即離之名三明分別性四初標列二所言下隨釋文自為二初清淨分別性二初標二即彼下釋二初出法體自證之體平等真常名相泯然不可分別為他起用若說自證平等性體說即分別何況示為六道四生一切名相豈非分別文云一切種智能知世諦至六道四生者此以世間法為用也依於內證至示於未聞者此以出世法為用也一切種智者若以道種與一切即故屬中道今文別在一切俗事種種差別又三智俱用名一切種亦可據體即中道智如云佛眼觀六道生二此義下釋名義二初難起二謂雖下正釋二初就應不為世染不作功用者悉從性德故名清淨即此清淨平等覺性隨於事境起分別用故此勝用從實相立二又復下就機令他清淨者令於衆生亦得此性為他分別者為字平聲以佛德用為生分別二染濁分別性三初標二即彼下釋所執虗相為依他性執虗為實為分別性文云互相生者以由執實分別性生虗狀依他性須由虗狀依他性生執實分別性如今凡夫於根塵上起執實情作極惡業熏於本識命終之後現地獄境所現地獄其體無實即是虗相此由實情生虗相也雖是虗相以妄情故見此地獄而為實事此復由虗生實情也三問下料揀答中云雖無異體相生而虗實有殊者無異之言一者以妄對真分別依他同是妄法故無異體自就妄說六識分別八識依他豈無異體二者自就二性尅實論體分別無體執虗為實故無異體若隨名辨體分別乃以事實為體依他乃以虗相為體豈無異體三者見思能執屬分別性六道虗相為依他性此之虗實同是界內六識妄法故無異體無明執實屬分別性二土虗相為依他性此之虗實同是界外八識因果故無異體若取能執所執不同豈無異體問但可六識執於八識虗相為實如何界內界外各云虗實答義有對各無以對論而難各辨問且分別者執虗為實如何分其界內外別答今以鑑明形像喻之若執明虗而為像實此如界外若執像虗而為形實此如界內良由界內迷於八識之像是虗執為形實界外迷於中道明虗執為像實故枝末者但迷於像屬迷事惑其根本者由迷於明屬迷理惑枝末惑破但亡執實坐在像虗於彼當分曰知真空若望中道空還成障根本惑破能亡像實遂見明虗於此破惑始窮源極非此區揀法理不明其實圓宗三性一體三更有下再約二義以示三性初義者真實性義不異於前但依他性與前不同前以染淨二種虗相依於染淨二種能熏即事依事或以虗相依染淨性即事依理今以性體依於染淨二種能熏即理依事文云所現虗相果報名分別性者亦不同前前分別者執虗為實今分別者直從虗相即前依他為今分別由今以理為依他故事惟分別第二義者文云就依他中分別為三性者由真實性有通有別通則該於性體性用障出障真別取性體并出障真今由上文別取出障真為實性故在障真屬依他性因而得云更有一義即取在障真為實性分別性者亦不同前前以染淨能熏之因為依他中之所依故是以染淨能熏之因俱屬依他但以染淨所熏果報為分別性今文若以染淨言之今別在染向即是通若以能熏所熏言之今通因果皆為分別向却成別二性和合無二即是依他性者以事依理事是依他以理依事理是依他是故今文一依他言該此事理不同前文或別在事或別在理四料揀有二初約意識與五識辨此則未辨五根意識并六意識次則方辨是故料揀乃有二重初問答者良由大小宗計不同以小乘中有許五識亦起三心故知五識各各自能分別一塵生受想行大乘不爾故五識者但能得塵未起分別才起分別即屬意識今問識是識別若不分別何名五識答祇由大乘五識與意起非前後是故五識分別之處即是意識問雖無前後必須五識與於意識有不同相方可得云五識得塵不生分別答若辨異者亦可得云始眼得色與餘塵別識別義通各得塵處亦是識別但不同於自就色塵分別物像乃至青黃長短好惡故異意識次問答者亦由小乘有計意識五六殊分今且約於眼根見煙以示其義何者由勝義根引生眼識見於前塵分別是煙屬現量境既見於煙比知有火即眼意識識比量境煙境雖謝緣念即存斯乃屬於第六意識緣法塵中落謝色塵故此宗計乃有二義與大乘殊一者眼識分別是煙亦能引起受等三心異於大乘眼識但能得於前塵才起分別此是於煙即屬意識此如初重答文已明二者小宗計五意識識比量境第六意識緣落謝塵是故分於二意識異不同大乘緣現五塵及落謝塵總名意識不分五六此如今答問輔行何故不約大乘却分五六而文乃云五識五意識未屬煩惱在無記故答若從體說祇一意識以體從根故分五六得此義旨大小無妨所以荊溪通明大小是故亦云若依經部大乘法相同時意識緣現五塵及落謝塵又復須知不獨五意體同第六祇如五識體亦全同揀境及心惟觀識念從體通取即是觀於五識五意并第六識是故諸識皆非所揀故輔行云今初且觀諸識為境從根別取故惟第六在初得觀其餘五識歷緣方明人多昧彼因便云耳三上來下結大章第三止觀體狀者前來示解今正立行體即體質狀即狀㒵乃明止觀當體狀㒵即無塵智約於三性而示其相然三性名義性相二宗通皆取用各有建立即離殊分今附山家先陳大旨法界究極不得而名但為衆生無以曉於法界之極故強目為平等一性故荊溪云本謂一性然此一性尚非數辨豈可形求圓妙難思無法不具以具迷故從性雖一從迷且殊迷性無相而為虗相斯由無明即是八識名依他性迷性虗相而為實相斯由見思即是六識名分別性八識因果依他性者界外事也六識因果分別性者界內事也復迷其事不能知曉名塵沙惑以識言之實該六八一期對惑在七識也於一迷念惑既有三其所迷也豈可云一類荊溪云性指三障是故具三見思之惑迷虗為實失於真空由是故以所迷一性名曰真空以迷塵沙失俗能諦由是故以所迷一性名曰俗諦無明迷性而為虗相失其實相由是故以所迷一性名曰中道性體非三體三對迷說三其能迷者三惑妄境即屬分別依他二性其所迷者三諦真境即真實性若指三惑即是三諦斯亦可云性指三惑是故具三又能迷二性體是俗事所迷真實體是空中又前之二性既是無明故屬空假後之真實即當中道既以三惑迷三諦性達迷見性當修止觀無分別智此智即性而雖一一性既因迷而有三此智亦因性而不一類荊溪云修從性成成三法爾以此之智止於分別妄執之實而見真空故此之智乃無實塵即空觀也以此之智照了妄實識彼妄執故此之智即屬界內之假觀也以此之智照了依他非有而有識彼虗相故此之智即屬界外之假觀也以此之智止於依他虗相之相有即非有而見中實故此之智乃能無於無明塵相即中觀也以此三觀觀二性三惑達真實三諦故為分別依他二性修止觀也其真實性修止觀者以俱亡智見於當念天然性體三諦即一諦名之為止以俱照智達於當念天然性用一諦即三諦名之為觀類智者云自行三諦即一諦名之為實化他一諦即三諦名之為權良由入實為止出權為觀取用法門名目雖異所用之道實無有殊為此意故故今記焉問三諦既是天然性德何云因於三惑有三答智者云理實無名對無明稱法性中論云但為引導衆生故以假名說離有無二邊故名為中道祇由天然本性具此因惑有三并具引生立三假名是故得云夫三諦者天然之性德問實性止觀方辨三諦三一相即應前二性非即一耶答說雖次第意無前後問若欲修習如何指心答既於前章已開聞解今修止觀豈可殊途是以解惑同源皆全藏體真妄不二無非淨心能所一如三性齊致能觀之觀尚即惑焉豈於所觀諦理殊隔是故一塵一念無不三一當處難思即一而三即三而一不前不後非縱非橫此之圓解迷生理是名字知是觀行行是乃至妙覺究竟究是但以隨冥修習有別若依前二進成第三故分別性惟修空假其依他性惟修假中至真實性空假中三三一圓備故前二性似修勝別其真實性全同一心若念念中三番並學祇如分別觀即是假止即是空當處不二即是於中三雖不同祇是一念即一而三名之為觀即三而一名之為止分別既然依他亦爾亦見三性一中具三三全是一非三非一而三而一不可思議若不爾者何殊地攝不得圓宗從權而執問前以真實性為三諦又為空中又為中道者何答諦祇是理理尚無一云何有三但以對緣說為三爾故智者云實是一諦方便說三說為三者進退不同故有三向一者此之一性為衆生迷迷即是有有名為俗有無別有全性為有故以一性名為俗諦若以衆生但見其有不知此有全性而為祇可名俗不得稱諦今詮此俗即是性故故稱俗諦復對迷有說其一性性體本空故名真諦復對空有說此一性性體空有當處不二故名中諦然茲三諦即一性上立此三名故祖師云雖是一體而立三名以體會名以名即體是故得云是三即一相其實無有異今宗此旨故稱實性為三諦也二者前以迷有從所依性稱為俗諦若從迷有當體而論復有二義一者此實是俗名為俗諦二者於俗知俗法門名為俗諦是故一性惟名空中俗既是事屬前二性空中是理屬真實性三者前以一性名為空者即畢竟空亦從於空所依而說若從當體故此之空而非一性體即是於無明虗相還屬於前依他性收是故一性惟名為中是以實性屬於中道釋文為三初標科二初就下釋三第下結釋自為二初就染濁二就清淨前明境界順於迷真起妄為次故實性居先今明修觀順於返妄歸真為敘故實性居後又此三性該染淨境今通約之以為所觀由凡所觀境不出三法染濁三性即衆生法并於心法清淨三性即是佛法此三法者不出內外生佛屬外心法屬內又自己依正二種之色若望生佛亦屬於內若以自己依報望正故依外正內就自正報色外心內然今觀境通諸內外
