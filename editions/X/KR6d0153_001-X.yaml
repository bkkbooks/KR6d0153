body:
  text: 東掖白蓮釋了然述思議匪及者謂之性形數可辨者謂之情性則覺之真源情則迷之妄本以覺覺迷故至於非覺非不覺以迷迷覺故致于有迷有不迷將使返其情而寂於性者謂之止則非覺非不覺有迷有不迷皆不得而名及夫據其性而照於情者謂之觀則有迷有不迷非覺非不覺悉可以而狀寂焉照焉體焉用焉止焉觀焉本焉末焉皆不可而思議焉吾佛釋迦持此道而莊嚴之謂之定慧依此道而開示之謂之知見吾祖南嶽括此道而驚其所悟謂之分別依他真實之三性吾祖天台據此道而要其所入謂之真空俗有中道之三諦或二也或三也或總也或別也無非一性常異常同天然之妙法也所以息則纖塵絕朕動則萬象揄揚來不知其自誰去不究其何適取則便散捨則便昏其欲即達涼池高安秘藏是真心要是曰大乘無過南嶽所示法門者矣是以假設賓主內外別其正邪精示靜明廣略因其利鈍名雖通衍旨必在圓今有因緣惟宗圓旨直記義理云爾時大宋宣和三年歲次辛丑十二月初一日敘問序中云今有因緣直記義理者未審有何因緣答凡有十意一欲會天台所說止觀與師不殊故二欲知天然妙體惟一性故三欲使解了本覺之法尚屬用故四欲令曉性德善惡體屬修故五為了知修惡當體法是情故六為明佛所起惡用不異修故七為證今立理由事差權因實妙顯非師心有承稟故八為自備忽忘易尋討故九為呈露所解恐有迷錯求刪削故十為利同學直入觀道故其題稱大乘止觀法門者大是無外之名乘以運載為義大有待絕乘有修性相待說大始自世間終藏通別皆名為小惟圓為大若絕待者即彼偏小全是圓大此二乃是法界法爾常待常絕不可思議非大非小目之為大亦得云大名不可思議即法界全體也全此之大起而為修運載行人證體證用此修即性此性即修法界法爾常脩常性不可思議非運非載目之為乘又大即是人乘即是法如十二門論云諸佛最大是乘能至故名大乘觀音得大勢文殊彌勒菩薩等大士所乘故名大乘又大乘者由一性之法天然具三謂體相用此三即性故名為大以此三大而為所乘故名大乘如起信中約此三大釋大乘義此之三大即南嶽所用分別依他真實三性故下文云真心是體本識是相六七等識是用此三即天台理隨得三且體大者乘其止以自利用大者乘其觀以利人相大者該乘自他或惟在自故此大乘即止觀也所云止體觀用者如下文云心體平等離一切相即是寂義體具違順二用即是用義是故修習止行即能除滅虗妄紛動令此心體寂靜離相即為自利修智觀行令此心用顯現繁興即為利他問止對解脫義屬化他觀對般若理當自行今何不同答解脫有三若取方便乃是於用今取真性般若亦三若取實相乃是於體今取文字又般若照事則為用般若照性則為體今取照事解脫據性則為體解脫於事則為用今取據性由一性是理體十界是事用般若解脫是理體中所具之德此德從性則為體從事則為用今取解脫之德解縛得脫寂然從性則為體般若之德照暗得明觀達於事則為用如輔行云止體寂故即是法身觀體用故即是般若即此止觀功能可以入道故稱法門法者或訓軌則今訓功能據下文釋法身云法者功能也以止觀功能即門者門有多義一者能通非但通入亦乃通出入則見王出則為民故入止出觀又門者能禁非但禁內亦乃禁外禁外是觀故文云不入涅槃禁內是止故文云不住生死又能通是開門能禁是閉門開門是觀閉門是止或閉門是觀開門是止上皆從德若過德對論止觀家門者出入乃以入止觀為門出則屬於昏散內外開閉例出入說南嶽者衡山荊州也思大禪師者諱慧思姓李氏項城武津人因讀妙勝定經歎禪功德便爾發心遂依文師稟受禪法初化嵩陽學徒日盛知齊祚將滅空聲告云可往武當南嶽入道遂至光州值梁孝元傾覆權止大緣蘇數年後徑往南嶽即陳癈帝光大二年歲次戍子六月二十二日也棲隱南嶽凡十年至宣帝大建九年歲次丁酉六月二十二日終于南嶽德行備如本傳曲授者委悉逗於前機也心要者一念總於眾德也南嶽著述止觀法門不宰筆削之功故不出名以後人傳習恐失無由故存此目注辭凡有三節初示修處乃指下文第三大章止觀體狀也雖依止中兩處亦有體狀之語非今所指次示開解即通指一部例如摩訶止觀皆云信行圓乘第三令人尊文重教釋正文中準釋經論皆分三分今以初問至為汝說之為序分從所言止者至止觀作用訖文為正宗從凡禮佛至終卷為流通若自就正宗義分三分者以略示止觀為序分從止觀依止至斷得為正宗由止觀依止至體狀是自行之因斷得乃自行之果故皆屬正宗止觀作用乃是利他故屬流通又略示至止觀境界皆是序分由開解故止觀體狀與斷得乃屬正宗由正立行故今依初序分對於諸文但有別序由起而無通序於今別序由起中自有通別初通由起有問有答問二初敘意有法有喻稟性斯質者言其所賦託修異焉者言其所習匠有殊雕者喻託修之異器成不一者喻稟性斯質性隨習變猶器遂工成荊溪云匠者成物也器之工師也二吾聞下正問先敘所稟大德洞理敘解鑒宗敘行究竟元廓者乃頓極幽通之理行也故以䇿修者問於元廓之宗冀聞正法者問於究竟之理答中云幼染緇風者南嶽為兒童時因夢梵僧勸令入道又數夢僧訓以齊戒逐出家焉少餐道味者時見朋類誦法華經情深樂重因而習誦并發於心求稟禪法但下愚等乃示謙德既以行理為謙則知前問宗即是行莫知何說者以問意猶通未聞指的大乘行法故也成別由序的欲聞修大乘行法故成別也於中為四初再請奉持不遺者下迷承於上覺曰奉妄念秉於真修曰持是此奉持不敢遺忘須約名等五即辨之究竟即中亦奉持者如御車達到猶名為車此之五即乃是外人未聞修前天然性體本自奉持非適今也但日用不知故有斯請二沙門許說二初述贊發心樂聞尚過二乘者以二乘人於菩薩法全無一念好樂之心況行為耶然此大心實為難發以諸眾生莫不皆因為於自己起貪嗔癡背大道心縱脫六趣而沉空寂今發此心是故超勝又復須知稱性發心方異偏教諸菩薩爾二許說行法為三先示其行有威德之功故云雖發勝心要藉行成其德成即是證發心是解依解立行由行證德解行證三闕一不可今欲談行故示成德二但行法下通指行門大率言之乃有萬行故云非一三今且下別示止觀由經論中多明止觀二法為子略說者一行有萬差今略惟談止觀二法二止觀二門經論廣備今乃略說依此修習不離當念於即生中可以成德三外人下受旨目利兼人得法報恩正是菩提之心行也四沙門下誡聽諦聽善攝者思念不亂持此一心入語義中如此之人故可為說二正宗中初略說二初止謂知一切諸法者即染淨緣起諸法也從本以來至不生不滅者即真實性但以虗妄至非有而有者即分別性然彼有法至體無分別者即依他性又不生不滅等是總示三性從但以虗妄至而有是分別性從然彼有法有即非有是依他性惟是一心體無分別是真實性然此二向者初義由依他性中所論止者正是有即非有非有之法即是一心不生不滅乃名為止故下文中依他性止乃云惟是一心所現有即非有本自無生今即無滅如是緣心遣相知相本無與今惟是一心體無分別其意大同次義由下文於真實性中論止乃云淨心之體常無分別又云知彼一心之體不可分別即與今云體無分別其義亦同問如何以不生不滅為總答三性通說皆有此理如清凉云求偏計相不可得故不生能顯無相性故不滅推緣起故不生能顯無生性故不滅圓成性非妄心境故不生聖智所證故不滅廣如彼文又將三性對論不生不滅等作是觀者今文說止而云觀平聲者當知觀法聲義有通有別今取止觀通皆名觀如奢摩他觀毗鉢舍那觀能令妄念不流者分別性中執實妄念依他性中虗相妄念真實性中執無妄念此三妄念各以不流故名為止由今略示則總下文三性義理次明觀中知本不生今不滅者即真實性從而以心性至世用者即依他性猶如幻夢非有而有即分別性亦可猶如幻夢等乃喻依他性其分別性攝在依他有之一字若以此有為虗有即依他性若執此有為實有即分別性故略說觀中亦該三性應知三性論觀分別以實有為體依他以幻有為體真實以無前二性為體三性論止分別息實有為體依他息幻有為體真實息無性為體大位若此委如下文二外人下廣說二初請解由識發解昧必因識微故聞要略不能開悟再求方便委曲開示沙門下再許廣說二初標章作五番建立者不無生起先明依止者即指平等一性為一切法之所依止以諸眾生迷此一性而起妄想故有分別依他境界對此迷妄而示真性故有真實境界境界既興指為所觀就此所觀當辯能觀止觀體狀既修止觀因圓果成故有斷德既然證果合當利物故有作用若以此五會同摩訶止觀十章者作用同起教斷德同果報體狀同止觀境界依止同前六章二就第一下解釋文自為五初止觀依止三初標列復作三門者初乃定體體謂一性二乃論功由此一性是諸法本況復能具寂用二德故須依止三乃辨修欲修止觀還以何法依止一性而修習之如下文云以意識依止此心修行止觀意識者乃發觀之始心也又何所依止者正示所觀不思議境也何故依止者顯能觀觀即境為觀故依止此心也何者以此淨心是諸法本心外無法即境為觀不同近物有能所也以何依止者起觀之心即第六識境觀雖融麤或尚在故指意識為能依止圓詮識是無分別智斯亦可云能觀觀智即無明是二初明下正釋文自為三初何所依止二初標二謂依下釋有總有別總中云謂依止一心者即平等一性也然此一性即三千性此三千性不可遠求乃是行者現前一念指此一念即是一性故為依止而修止觀次別釋二初標科一出眾名等者由此一性具含體德故使經論有諸異名依名釋義約義辨體遂有三章二初出下正釋文自為三初出眾名二次辯下釋名義三初釋二初標二問下正釋文自為七初釋自性清淨心二初問自性非無明他性清淨殊無明染濁心異無明不覺當知此心本來無名因有無明故此名起二答二初釋二初釋淨又二初總示此心至故名為淨者染法覆性其性常淨問或謂別教性體常淨不即染故圓教性體以即染故不云常淨應顯今文是別非圓耶答須知圓中有即有離約無明以言心性不得不離約心性以言無明不得不即但以圓教約即論離異別定離始終常淨二何以下釋其所以謂以無明體是無法者所言體者有隨名辨體克實論體若隨名辨體者既有無明之名名下必有無明當體乃以虗妄而為其體若克實論體者無明但有所依性體自無實體惟有名相曰無明爾何者由無明全以法性為體故無自體如流以水為體但有其相謂之流耳故下文云二種無明本自無體惟以淨心為體輔行云故昏散之名名無實體還以寂照而為其性問云法性無體可乎答義不一途若以平等性體非法性非無明故無明法性但有二名二俱無體如輔行云二法無體但有假名良由無明法性本無名字為對緣故假立二名實無自體若以平等一性為真全真而為妄體故無明無體此如今文若以理無所存全是於事者故法性無體如輔行云見依無明無明依法性法性無所依何者法性無體全是無明然復須曉若以究竟克實論之法性無體者非無當體但法性外無所依爾故下文云非謂空無心體無明無體者非無所依但以虗妄無當體爾或曰無明無所依者別以惑窮圓約性即二釋真如二初問二答三初正釋二初約離義各明二字初真次如真中有二一者對偽名真由一切法而無自體乃以淨心而為其體既無自體皆悉虗偽以此顯心即名為真二又復下自就淨心克體名真由此淨心既非生滅乃無增減故名為真又云諸法以虗妄因緣而有生滅之相者故知無明只有其相而實無體二三世諸佛下約離釋如由離凡聖差別異相無異稱如如即同也體一故同非竝為同無相稱如如即空也元妙故空非斷為空二又真下約即義合示真如二字為二初顯是指一切法當處真如惟是一心次若心下揀非乃揀偏邪以心外故異而不同以有法故相而不空由失真實遂生異相故非真如二是故下引證別證離義故離言說名字心緣若證即義應引論云此真如體無有可遣以一切法悉皆真故亦無可立以一切法皆同如故亦可今文通證即義由一切法即是一心心外無法故不可以言字心三之所思議言說心緣別對心口名字乃通或心思名字或口說名字又言說是實法名字屬假名故智者云離言說妄想者不可思議也離文字者雖假名也畢竟平等至不可破壞者藏師以此三句展轉相釋惟是一心者結歸法體今且畢竟平等者空也無有變異者假也不可破壞者中也此三即一故云惟是一心名真如也亦可以此四句對於四德問一心與真如為同為異若云同者起信約一心分二門於二門中乃有真如并於生滅一心是總真如是別若云異者今文何云惟是一心故名真如答體同義異真如只一故云體同而有差別真如平等真如故言義異且平等真如即同一心差別真如既對生滅故一心是總真如是別何者天然一性非真非妄不得而名此則平等也以眾生迷故見有生滅因對生滅即指一性而謂真如此則差別也差別真如既指一性為名故此平等亦名真如斯乃名從差別而得體自平等而彰以差別而名平等故平等亦名真如故使今文以一心為真如也以平等而即差別故差別亦名總一故使起信釋二門中真如門云心真如者即是一法界大總相法門體也然起信辨真如正在別相二門中明今文辨真如正就止觀依止平等總相中說此是義異也由體一故今文引起信之別而證依止之總三釋佛性初問次答二初正釋二初約體釋次約用釋然體用之義凡五一者過德三惑為用三諦為體二者自就三諦各有體用則三諦俱體三諦俱用三約事理則俗諦為用空中為體四約中邊則空假為用中道為體五約亡照則三諦為用一性為體智者云只約一眼而有五用一眼豈非一圓常平等性體耶五用豈非三諦俱照為用耶今文該二一者中邊以法身佛性為體以緣了佛性為用二者亡照以平等一性為體以三種佛性為用故下文云若就心體法界用義以明覺者此心體具三種大智況三種智性即三佛性又云本覺之義是用故顯前體惟是總相一平等性約體釋中三初總答以由心體非覺不覺欲辨佛義故因不覺遂名為覺二研究二初究性非不覺二初問次答二初約淨不同染釋淨若同染滅染之時淨亦須滅既染滅淨存故知其淨不同於染以顯淨心非是不覺今文云既是無明自滅淨心自存者且智者云無明破則無無明對誰復論法性若爾無明滅合無淨心今文何故無明自滅淨心自存耶答智者一向約即今文即不妨離淨心雖即無明不妨無明自滅淨心自存二又復下約染不同淨釋染若同淨在染之時已證淨心今就染滅方證淨心故知其染不同於淨乃見淨心非是不覺二究得名所從二初問意者何以不就淨心自體名之為覺却對不覺名為覺耶答二初正答平等性體本不可名由對不覺強號為覺名從對得體自性彰以體從名體亦名覺以名從體名亦何名二是故下引證即楞伽經也一切無涅槃者單約法示無有涅槃佛者乃無因法而有覺也無有佛涅槃者乃無因覺而有法也既無於覺則無不覺何者由謂覺者覺於不覺今既無覺故無不覺故即結云遠離覺所覺所覺者即不覺也若有若無有者若有是有覺若無有是無有覺即屬不覺是二悉俱離則覺與不覺悉皆非故又遠離覺所覺者即能覺人所覺法人法有無皆不可得所覺法者亦名不覺但不同初釋以無明為不覺二此即下約用釋二初結前生後二此心下正釋二初約了因般若佛性四初總示此心體具三種大智者華嚴經云無一眾生而不具有如來智慧但以妄執著而不得證若離妄想一切智無師智自然智無礙智即得現前經文云一切智者乃是總示其無師等即是三智由心體即一性以一性為能具三種大智為所具此三大智若次第敵對無師智即一切智自然智即道種智無礙智即一切種智若準法華文句既以自然智為一切智今無師智同佛之智慧是一切智無礙智同如來智慧是道種智中道一性自天而然佛果既極即以無師亦是畢竟空寂何有可師由無礙故故如可來雖有三智不出自他道種化他餘二自行本謂一性具足自他斯之謂也故以此心為覺性者有體有用以覺之一性為體以三種之覺為用此之三覺亦名三諦亦名三性由此三審實故稱諦此三照明故稱覺此三不改故稱性乃一法異名也二是故下對前平等一性以辨同異二初標次云何下辨二初辨同謂心體平等等者三智一性體一義異今取體一故云同爾何者蓋此一性非迷非悟如如無名亦可強名號之為覺眾生迷故而有三惑對惑說覺故此一覺而成三智從義異故一性是體三智是用由對惑說覺故智成用從體一故此之三智即是一性而成其三故言同也二復云何下辨異本覺者即一切種智故云在凡名佛性也出障名智慧佛者即始覺也乃該道種并一切智又本覺者性德三智也故云亦名三種智性出障名智慧佛者始覺三智也本即性德始即修德雖修性不同故皆在用此則愈見三法俱用一性為體又云心體平等者一者三法即一故平等二者修性德一故平等三廣釋先須了知平等差別二性之義然後通達南嶽始終所說之意一者定體言差別者體是情事言平等者體是理性二者相即以事即性事亦平等以性即事性亦差別故有平等性差別性平等事差別事初約體用論差別性者復有事性之性為差別性如火熱水冷嗔惡喜善等事法性也故大師引地持云事法性者性差別故空中理性即屬平等此以空中體一為性若以事即性向來差別亦乃平等如諸眾生在差別故入火必燒入水必溺佛見差別當處即性故火不能燒水不能溺乃至嗔喜常見一性故令此事亦名平等若以性即事當知此性亦名差別乃是火性水性嗔性喜性此性不同前來事性故性德之中有俗諦性者亦名差別性也或以差別性性字為所具今曰差別是所具性是能具以所即能故云差別性也或以性具差別之法云此法非情今曰差別之名本曰情事從能具故故云性德差別非謂性德有差別法無差別情上乃體用論二中邊論者以緣了是差別性以正因為平等性三者緣了正三皆為差別此中正因得差別名者出對緣了說於正因故使正因與緣了異三法不同乃名差別若以正因而即緣了故此緣了與正因同正因之體為是平等一性無差是故三法一體無殊悉皆平等問何故偏云若以正因而即緣了還可通云緣了而即正因不答克從法體正因屬理乃即之體也緣了屬事乃離之體也以正因即故故緣了亦即緣了離故故正因亦離如荊溪云正本不離今加不即本不離者由正因體本屬即故則顯緣了體本不即今加不離或謂不然今復更引常與無常類而顯之淨名疏云問種以能生為義義符無常性以不改為義義符於常此二義別何得言符答緣了符種不足致疑但正因符種義似有乖此文正是克從法體上來乃就理事對論差別平等況此平等尚猶差別應了事理若即不即悉皆平等不可分別又復且就平等差別而為句法若雙亦雙非非此盡具就文為二初問智慧佛等者智慧之法若對不覺而有覺者此則屬修然此之修既指平等心體為修故又屬性是以約修為問乃云能覺淨心約性為問乃云淨心自覺即下答文通此二問是故修性皆得名覺答三初標示雖言二義體無別者覺於淨心者觀智也淨心自覺者諦理也諦觀義別其體乃同二此義下正釋二初迷真起妄二初正示二初約根本即界外三細也心依熏變者九識真心無明熏變不覺自動者若起信中一業二轉三現今文一無明二妄想三境界由取義進不開合不同起信取動以動為業今取不覺是無明也動是妄想即同起信業也顯現者即起信中能見相之轉也虗狀者即起信中現也此二合為今文境界然起信下文亦合轉現俱為境界故云一切染因名為無明妄心名為業識妄境界所謂六塵二虗狀下約枝末三初承前起後由境界緣起後界內然虗狀境界若次第分別即是界外因根本不覺所起境界依此境界起於枝末不覺即有界內無明境界此則二種境界不同若克實為言祇一境界從虗實辨故分枝本若以此境是虗即屬界外纔執此境為實即是界內境界既然無明妄想亦復如是祇一無明以不了真實性故則曰根本以不了依他性故則曰枝末祇一妄想以於真實性而起妄想執有虗相名曰根本以依依他性而起妄想執有實相名曰枝末然此枝本一體而異復有二義一者就事自辨祇可云至本無末不可云在末無本如麤惑落後至細惑時是則亡麤惑在時不可離細以由麤惑迷心別無體故二者以理融事由此枝本同一淨心而為其體故麤細因果徹至妙覺方為究盡由五住二死不相離故問理融可然前事自論末不離本為獨末惑為通末果答亦通於果如前所謂祇一境界從虗實辨若以境界為虗則屬界外豈非末不離本亦通於果問應了六道果報虗處即是界外若爾却使界外有六道虗報耶答體同事別界外無六道之事今取六道體虗義同界外虗果二似識下示義二初示三相一無明二妄想三妄境問若以似識似色似塵之三會此之三如何分對答似識者該於無明妄想之二以似識不了為無明以似識妄執為妄想其似色似塵合為境界問色塵何殊答今文以正報為色依報為塵若以起信六麤會之似識成無明即智相至計名字相四麤也由此四麤是惑染故非業非報無明成妄想即第五麤起業相也妄想成妄境即第六麤業繫苦相也彼開為六今合為三然起信中亦復自有存沒開合先示九相即三細六麤次辯五意即沒六麤中四但存三細智相相續後辨六染於六麤中即沒五六合其三四初由似識起無明文云似識即六七識者問似識似塵之名界內外耶若云界內則屬實有豈名為似若云界外應指八識何云六識答若從當分妄執界內乃是實有若從克實而論諸境悉是虗相今從克實以言故召六七為似文云不了知等者今文正取能不了邊為無明也二以不了下由無明成妄想正取能執為妄想也三以為下由妄想成妄境以為實事者即所執之妄境也二妄執下示熏心所熏平等能熏自殊此所熏心與前根本淨心不異次然似下約名相釋義前但示義惟云不了妄執實事今指不了名曰無明妄執名曰妄想實事名曰境界約此名相而申釋之為二初釋三相初無明云迷境者即迷事也對於迷理而得此名云緣中癡者對因中癡而得此名以述本覺無明為因而生三細即因中癡也以迷境界為緣而生六麤即緣中癡也由於虗境妄執為實即是不了成緣中癡妄想妄境在文可見二以果下種熏心熏之為義起信論云如世間衣服實無於香若人以香而熏習故則有香氣然其論文且附事辨本若實無熏何得有論明四種熏習乃與今文至有詳略不復對會尋者可了今則直就當文以釋為二初各熏凡有四法一無明二妄想三妄境四似識問向但有三今何却四答向從合說乃以似識合在無明并妄想中故云似識不了之義即是果時無明似識妄執之義即是妄想今從開說是故別明又虗狀之果有二不同一者正報二者依報合而言之俱屬妄境開而言之依為境界正為似識文為三初無明云果時子時者果子無明本末而論有各有對若各論者根本枝末各有獨顯為子相應為果并各以無明妄想之因為子境界為果若對論者根本為子為始迷未現境故枝末為果由從境界起妄執故今取對論以分子果以果等者若依小乘義立熏種但熏六識復成枝末今從圓旨熏於真心即成根本此以枝果而生本子亦名住地無明者住地之言惟指根本正從喻立淨名疏云此之四住非根本惑如枝葉依樹而不依地故界內身見有種種不同不名一處亦非住地又引勝鬘無明住地其力最大佛菩提智之所能斷由以見思喻於枝葉依無明幹但住於樹而不住地乃指無明而為住地復有二義一約界外四住以見為能住如樹無明為所住如他總而名之曰住地也如荊溪云見為能住無明是地二以無明如樹法性如地故云住地然得地名實從法性例如無住雖通真妄究實無住俱是於真但以圓詮真法即是妄源源既匪殊妄亦無住故荊溪云法性即無住無住即無明無明亦無住豈非的指無住乃是法性由即無明所以云亦問住地之名既取本感六番窮原前之四住何亦名之答此有二意一者別教界內非名界外可目二者圓教六番窮原從前推究雖次第由起約後總答即當處同原是以四住皆得地名問若以根本無明為住地何稱無住答約即論離與法性殊故名住地約離論即與法性一故名無住此從法性為地若就無明為地者無明之地無住為他所住故名住地問界內見思不從圓旨亦得稱為住地可乎答義亦通之摩訶止觀云愛即四住地也亦能障智然是異心之感解感不俱此文恐約當分通住迷地以名二妄想小乘熏成事識今成業識三妄境似識小乘熏心依得得住今成種子依八識住文無似識者合名似塵也二然此下共熏二初總示前四法各熏者言自分之功今四法共熏者論同藉之義二何以下別示二初枝末自論共似識是報陰無明是不了妄想是能執妄境是所執此四和合熏於淨心現虗狀果二又復下根本論共二初示義二初因共成果由前根本中云心依熏變不覺自動顯現虗狀文中但語無明與業二法之因兼似各熏現虗狀果今於二法復加種子三法為因共熏淨心現虗狀果文為三初示種子與無明共乃有二義一者種子依無明住故二者種子若無無明不能獨現果故二若無下無明與業識共三若無業識下種子與業識共亦有二義一者種子不能獨現果故二者種子依業識住故故云亦即自體不立問向枝末共熏何有似識妄境而無種子今根本共熏何有種子而無似識妄境答此由附於枝本不同以辨義理由種子無明始迷之時依淨心起不依似識根本業識雖能現境而不妄執虗境為實是故根本不論此二為能熏也枝末能熏不詮種子是故不論問四法共熏既是枝末何故成果稱虗狀耶答能熏附小辨義成果克實為言二是故下果中具因文云似識似塵虗妄者果中具因之種子也無明者果中具因之無明也妄執者果中具因之業識也以還具二字通冠下文由向以無明業識種子三因共成於果故今果中還具三因此則一向從根本說亦可此文同上承前起後以境界緣起於界內似識至妄執等二由此下對前結意云略說者一者略說不覺動故二法為因而不詳說種子為因二者略說顯現虗狀而不詳說和合方現三者略說由因成果而不詳說果還具因問前何默略種子答且約初迷未論種子然種子之說且附權談究實而言悉從性現故經云眾苦行業不可思議二如是下結如是果子相生者一約枝本對論子果初文承前界外虗狀起後界內無明即子生於果也次釋枝末熏心中云以果特無明熏心故令心不覺等即果生於子也釋根本中云是故虗狀中還具似識等即復子生於果也二約枝末各以因果而論子果根本中果即虗狀之果子即無明業識種子三法之因由因成果果還具因即子能生果果能生子也枝末既以四法和合為因現虗狀果即子生果也若例根本復於此果而具枝末四法之因即果生於子故通結云果子相生二後遇下滅妄歸真二初滅界內妄惑二滅界外妄惑釋成二覺問何故滅界外惑中方釋二覺答由從真起妄義凡有三一者雖有真妄二名謂從真起妄當處乃無能起所起由真妄名殊其體一故二者從法性真起無明妄於所起之妄不論枝本界外內異由見思無明乃同體故三者從中道實性性真起界外無明之妄成依他性復從無明之妄執虗為實起界內見思之妄成分別性故滅妄歸真義亦有三若依初義無妄可滅無真可歸若依次義滅界內惑即滅界外若依第三義約圓竪入初滅界內位在住前未見實性至滅界外方辨二覺初滅界內妄惑二初單就界內以論滅妄四初遇友開解皆一等者圓滅果惑義殊前教由知妄原流自息滅是故得云皆一心作二聞此下依聞修觀下分別性修觀中云但能知境是虗三若此下解成除障無明惑也妄想業也妄境苦也似解既成除此三障下分別性中止門除障云實執止故即是能除果時迷事無明并妄想等四爾時下約智得益下分別性得益中云無塵智用隨心行故即是得益二雖然下對界外辨二惑同滅一者以理融惑二惑一體若滅枝末根本亦除二者圓除末時必由先了本從性起本相體虗末妄為實今亡執實云枝末除除實執者由知本虗即此之知是滅根本故滅末時根本亦除文為二初直辨同滅二初正示三初無明二妄想三境界於此三義各先論同次則複疎無明中初論同者意顯枝末妄惑滅時根本亦除何者由迷虗相從一性起有即非有名存無明今除末時乃能先了虗相即性豈非亦除根本無明文云雖然知境虗故說果時無明滅者枝末除也猶見虗相之有者根本在也有即非有至唯是一心者若依此知能了無明即是法性無明除也以不知此理故亦名子時無明等者今以不知而顯於知若不知者是無明存且今初心滅枝末既知此理豈非滅果亦除於子次但細下複疎若云同滅何故向云果無明滅故複疎云但細於前迷事無明故說果時無明滅耳當知約解橫言二惑同滅約位竪論先滅枝末然雖解知無明有即非有其如未證非有尚見於有問解與位殊耶答解則如法圓融位則隨情厚薄若解隨情辨則解亦差殊若位約法明則位亦頓等今且奇情辨位就法論解故對明之云迷事無明者對於迷理然於惑法得事理名其義非一若以枝本各論枝末中見為理惑思為事惑由見則邪計妄法之理障於真理思則貪癡散塵之事障於定事根本既名別見別思則事理義例同枝末若枝本對論則知今文以見思為事無明為理且見思為事者由迷無明虗狀而起虗狀是事故稱迷事惑稱迷境以由小乘云此見思迷於真諦大乘詮云真俗二邊體是無明故稱迷事則顯根本迷於中實理性而起故稱迷理已上乃約二惑以辨若通取三惑對論之義則塵沙為事二惑為理淨名記云以塵沙惑不障於理四住障真無明鄣中又無明為理二惑為事淨名疏云理惑者迷於中道事惑者迷於二諦法界惑也又若三惑各論皆通事理且如見思不知當體是生死俗故稱迷事不了真諦故稱迷理無明若迷空假當體非智是障則名迷事若迷中道故稱迷理如大師云二俱是迷理為智障又云俱是迷事為智障塵沙若迷神通化道即名迷事若迷俗諦三昧故名迷理又若從教以說則藏別教惑為事通圓教惑為理由界內外即離不同二又不下妄想初論同又不執虗狀為實故說妄想滅者乃滅枝末事識妄想也猶見有虗相謂有異心者業識能執謂此虗相與淨心異也此執亦是妄想者對於枝末故云亦是亦名虗相者枝末執實為相今是虗相對於不獨名為妄想故云亦名若依此義猶有虗相妄執異心則根本業識妄想不除但今滅末妄想時能解本識妄想虗相皆是一性不異淨心故二惑同除也次複疎者亦約位竪論如向文意三又此下境界初論同不知境即淨心故使根相不一斯則根本妄境不除今除枝末妄境之時亦同解了根本妄境咸即淨心既然相相即性是以萬境皆一豈非根本妄境同除今云似與心異與向謂有異心者向約能執今從所執次複疎如文二以此下結意二初結論同以此等者則顯向文必有子果二惑同除若向無文何云以此論之亦少分除耶若不分分漸除者約解橫辯以子顯果也二但相下結複疎但相微等者約位竪論麤垢先落也二今且下約由果惑滅後子惑得滅以顯初心二惑同滅何者由向雖示斷枝末時約其解心二惑同滅為相難見故今復就約位義辨由枝惑滅後根本得滅顯於約解二惑同滅文為二初標示二此義下釋二初釋果惑滅後子惑得滅三初標立二二義下正釋二初約能除智同畢竟空智而為能除異偏空故故除末智亦能除根二二者下約由麤惑亡故細惑微薄亡麤惑後子時無明雖即念念熏於淨心復起住地既照亡麤故所起惑亦乃輕微曰無麤惑為能熏故當知此意約入初住自然斷惑故云輕微若非麤惑先亡如何得有自然斷滅三以此下結二如迷下顯二惑同滅二初舉顯舉後位之竪顯初解之橫二以其下釋同滅義由子無明既分分滅則無塵智亦轉轉增遂使果時無明滅矣以子解滅成果證滅二自迷下滅界外妄惑釋成二覺為三初法二初約分證明覺於淨心二約究竟明淨心自覺然覺於淨心者從修為功淨心自覺者從性為功故分證位齊至等覺文中祇云無塵之智即能知彼虗狀體性惟是一心等是故義屬覺於淨心及辨究竟先示等覺分證智成故云此智即是金剛乃至云此智成已等然後用此之智即復熏心成妙覺果故云習氣亦即隨壞乃至虗狀永泯等既成究竟極證淨心所以此位乃亡修入故以淨心而為自覺荊溪云除真如外凡有修入悉屬於權以果位真如究滿為清涼池同此意矣初又二初約住上二約等覺初又二初示所滅妄由業惑薄故內識利故外色細故故實執不起所云俱者內外共說似色似識者今屬當分名似非同前文指於六七四念處并輔行引唯識云唯是一識復分二種一者分別二無分別分別識者名為識識無分別者名似塵識一切世間為似塵識之所成三無性等當知云識識者即迷妄之上復論迷妄乃同下文分別性也無分別識者即第八識名似塵識也正同今文前以六七為似識者乃從克實不從當分若無此義二文難通二無塵下示能滅智即能覺淨心之智也還復熏心者以智熏心也二如是下等覺無明住地幽盡者幽盡也即能等者用無塵智能覺淨心心外法虗境復性惟是一心二此智下約究竟明淨心自覺又二初示果證此智等者乃指等覺後心無塵為金剛智無塵之義有二一無實塵顯塵惟識二無像塵顯塵惟真今從後義也無塵約法從離過立金剛約喻從智體名又無塵智通通真似故金剛智局局等覺故亦可俱通此智成已者等覺智成也即復熏心者用此之智復熏究竟淨心也一念無明習氣者一者即指正使名為習氣以最後一念無明微細名習氣故二者一念無明并於家習以其最後無明盡故習氣隨壞成妙覺果若以此文證知淨名云習氣者乃是最後一品無明并於家習同名習氣則為使矣何者若云最後一品無明正使已盡惟有無明之家習者且最淨無明既盡則習氣合當隨壞如何正盡復存家習種子習氣壞者變易之因究盡也虗狀永泯者變易之果極亡也二虗狀下淨心自覺三初示心體寂照者心即淨心照即是覺以由淨心寂體自覺故云寂照體證真如者由覺於淨心名用證真如以用證體故今淨心自覺名體證真如由即體自證故二何以下釋二初約能所不二釋二何以下約智外無真釋若智外有真可云覺於淨心既能覺智外別無於真乃即真為智故淨心自覺三此即下結約體用不二結於前義體是淨心用是覺智體用若二可云以用覺體是覺於淨心今既用即是體故自性自覺自體自證即淨心自覺智者亦云內性自照不從他知二如似下喻水靜是潤內照是照潤體照用體用義殊故云照潤義殊而常湛一者由照潤皆水故照潤是覺於淨心潤照是淨心自覺三心亦下合潤體照用即寂照義分而常湛一即體融無二照潤潤照即照寂寂照故照即潤故即照寂順體潤即照故即寂照順用照於潤即照自體名為覺於淨心潤自照即體自照名為淨心自覺三故言下結故言二義一體者由前答文初標示云雖言二義體無別也以無分別智為覺者結覺於淨心也淨心具智性者結淨心自覺也四此就下總結大科般若佛性也二又此下約緣因解脫佛性又此淨心至巧用之性者此指能具福巧之性也為淨業至報應二佛者全能具福之性而為報佛乃藏塵相好之報也全能具巧之性而為應佛乃隨物示現之應也此二全解脫性為解脫事也故以此心為佛性者乃以平等清淨之心為報應二佛之性也二又復下重釋初釋體二初約修德對治不覺顯體為覺四初約修對治又復不覺滅故說心為覺者滅無明也動義息故說心不動者滅妄想也虗相泯故言心無相者滅境界也因無明妄想境界故此心體為覺為息為無相也二然此下克體自論然此心體非覺乃至非無相若爾則不可以心體為覺如何却稱為佛性耶故第三雖然下釋出所以正用對名以召平等雖然者領上生下縱奪之辭也其體雖然非不覺與覺若對不覺滅說此心體為覺亦無所妨四此就下結其得名此就對治出障心體以論於覺者正是非覺非不覺名為覺不同智用而覺覺覺為覺二又復下性德本無不覺顯心為覺二初正釋四初約本無不覺不約修德對治不覺真約性德本無不覺說心為覺本寂乃不動之異名平等是無相之別稱業動寂然轉現平等亦同不覺其性本亡豈因修滅二然其下克體自論則性德無名也三雖然下釋出所以亦以對名而召平等以本無不覺說心為覺也問與向對名以召平等何殊答意一義異意一者由性德之體凡有名字皆從對立以召平等言義異者向約性德對滅修中不覺以召心體為覺今約性德本無修中不覺以召心體為覺故滅修與本無為義異也四此就下結其得名凡聖不二心體者乃取平等法身佛性不取差別緣了佛性問本無不覺者且不覺即無明應本無無明耶若本無無明如何本具九界答不可一向本有今有亦可得云本無今有如智者解歎然火起乃云本無今有本無此苦無明故有又淨名疏云眾生本性清淨無有癡愛即同今文本無不覺楞嚴阿難問佛六道云世尊此道為復本求自有為是眾生妄習生起佛答云妄想發生非本來有以此諸文而求其旨由順悉檀就於本今談此有無非一向爾或云本有性德不覺而無修中不覺今曰性德本具具法不周以修不覺非本有故或曰本有不覺之法體但無不覺之妄情今曰亦顯性德本具不周以不覺之情非本具故今立義者一性之體為能具萬法之用為所具論所具之用則本有不覺明能具之體則本無不覺今論性體故曰本無若論性用法法本具豈外修情復了體用一如本今有無皆非思議二料揀凡夫即佛二初問二答三初偏據性體平等云擬對說為覺者然此之名雖從對得今取名下所召之體體是平等故無修不修二又復下以體融事心佛眾生有三屬事故高下差別今以理融故無差別既然無差則何用修為三然復下正約常同常異為答以常同故不用修以常異故故須修常同是體常異是用體則平等用則殊分問差別緣起是無常何云法爾不壞答以不壞此無常故若壞此無常則法界法門祇有於常而無無常況法界全具所以常常常無常也故云不壞莫謂非是無常云不壞也二料揀本無不覺二初問二答二初正答即同前文二義何者若心體至應更不覺者乃淨不同染也故證者無有不覺凡夫至應為覺者乃染不同淨也故未證者不名為覺二再難二初問二答三初體無用有心性緣起者即是用有或以心性緣起修惡法體為不除者今文既云心性緣起復云有滅豈非亦除二又復下實無虗有不覺體虗乃非實有以實言之非但本無況今示無然非不有者以虗相言之則有不覺亦是即無離有以無明即法性故有即非有若從離說然非不有三但證下順無違有順則淨用如體故無不覺違則逆體為染故有不覺二問下釋用二初正釋佛性二初問二答乃示別有因緣何者然其心性理恒平等遇熏緣異遂成悟迷今從淨熏乃得成智故指福智二種淨業對所熏性為因緣也智體是性雖有照能若無淨業所熏此用不能顯現然能熏淨業非心外有亦全性為問既云能熏亦全性為如何復云別有因緣答克從法體有染有淨體是緣生非染非淨體是理性祇由性體能具緣生是故緣生非生即名性具從當體故能熏淨業名曰緣生以即性故故此淨業非心外有從當體故性非緣生以隨修故故云即能顯彼二性令成事用若得此旨在情在智或根或塵法法緣生法法性具分別融會理無不通二例示無明性二初問二答引楞伽云實性者驗知性惡性善之二性者祇一性也四釋法身二初問二答二初總示名義法以功能為義者或云軌則為義若一往分之軌則言其體如方圓長短皆與模範不違故言法也功能言其用由有軌則之功能故使合其模範身以依止為義者或云以聚為義一往分之聚義者乃從當體如聚五陰必成身依止義者乃以此身為彼所依如所依事皆依於身又聚五陰以成身依五陰以成身不離五陰當體為依當體為聚故法身者聚理法為身依理法為身聚與依止皆從理性當體而名今此法身離而言之乃依中道一性之法為身即而言之乃依萬法為身二以此下解釋二初約隨染二初明隨染二初釋二初約功能釋法二初通示以此心體等者即平等一性能隨於染祇由有此隨染功能故為一切染法熏習性若無能縱諸法熏則不能攝持并不能顯現從總說者有隨染之功能從別說者有攝持之功能有顯現之功能今從總說故乃通示隨染功能二即以下別釋二初有攝持功能即以此心隨染者應以此句冠下顯現正是一性由有能隨修染之功故能攝持熏習之氣一性為能攝持修染之氣為所攝持由此一性有攝持之功能故名為法二復能下有顯現功能以一性為能現染法為所現由此一性有能現之功能故名為法二即此下約依止釋身即此心性等者以此平等一性乃為能持能現差別之性并所持所現因果染事為此能所共所依止故名為身與心不一不異者能持能現差別之性與此一性體同義異以義異故不一體同故不異所持所現因果染事與此一性有即有離離故不一即故不異二故名下結二此能下成藏識三初示二識二初示二初能持與所持和合成子識八識三細業即因也轉現果也故上文以不覺自動是因顯現虗狀是果今能持之性與所持之業和合為因故云子時二依熏下能現之性與所現轉現和合為果故云果時二此二下辨同異云體一用異者以第八識祇一真妄和合為體但從妄三細因果不同遂為二識二然此下明染淨二分二初示二分二以其下示性一乃釋伏疑也由示中染分一向惟從事染以說故云即是業與果報之相乃指向來子時業識與果時轉現為染分也淨分乃以事理共論故云心性及能熏淨法若據其義於染分中亦可云一者染分即是心性及能熏染法於淨分中亦可云二者淨分即是業與果報之相盖淨分中有淨業之因并淨報之果今於染分一向從事却開能熏之業與所現之果於淨分一向語能熏之因不言所現之果復開心性之理既於染分不言心性恐人疑云何故染中而無心性為釋此疑故云以其染性即是淨性更無別法遂祇於淨示心性也問若依此義諸文祗合惟云淨性何故有文又云染性答性論染淨義不一向或非染淨或而染淨或惟染淨而染淨者約事辨性以情約體也由事染淨既依性現故約此事以辨於性知性本具染性淨性如下文云以此真心能現淨德即知真心本具淨性復以真心能現染事即知真心本具染性非染淨者克從性體也以染淨性體本非染淨得名染淨者由此性德能具染淨故下文云若癡二性之能以論心體者即非染非淨惟染淨者乃約差別以示圓融也以差別故有染有淨以圓融故染即是淨故惟淨淨即是染故惟染如下文云據違性而說無一淨性而非染就淨性而論無一染性而非淨且今文者正約差別以示圓融染即是淨故惟淨也亦可得云名偏體圓以名偏故祇云淨性以體圓故外無染性三由此下結歸隨染以釋法身二又此下約隨淨二初釋二初約功能釋法二初通示二此等下別示二初有攝持功能二復能下有顯現功能二即此下約依止釋身二故名下結釋如來藏為二初問二答二初列二所言下釋文自為三初能藏三初釋藏如來語修乃是果德所顯淨心名為法身眾生語性乃是性德在迷法身號為淨心法身淨心即平等一性若依下文以諸佛法身為淨性以眾生法身為染性者約以事召性今據性體本一故眾生法身亦名淨心並能包含染淨二性及染淨二事者包含者具也由此心體具其二性及以二事故名為藏應知染淨二性同鏡明性十染淨二事同像生修十若據今文論具則性十修十約能約所皆得具名但人師所見不同遂有異說或云具性者其奈今文染淨二事或云具相者其奈今文染淨二性或云性相俱具者性既無相如何得名此性為染為淨所以諸說似未盡理今曰先定法體則一性為能具染淨之事為所具二約事辯性則能具之性亦名染淨故此平等一性具有能具染淨之性并所具染淨之事故云心體包含染淨二性及染淨二事也然此能所一性分之乃有二重一者平等一性為能具染淨二性與染淨二事為所具二者就所具中自分能所染淨二性為能具染淨二事為所具及究論其旨則歸一性為能具染淨二事為所具何者且染淨二性得為能具者由是性故復為所具者由染淨故故染淨二字體屬修事二性性字體屬一性所以約事辨能具之性故云染淨二性或曰具性不了染淨體於屬事或曰具相不了染淨雖然有相纔云染性淨性正談能具之性未可論相又若以染為相須同修中所離之情相如何却云別是性具所顯之法相然二家所見莫不皆以性具之法為所顯故故顯性家而不具相故顯相家而曰離情如此談具相出性外情出性外乃令一性具法不周今所說者而此一性無所不具若生若滅若破若顯若常若無常悉皆頓足故相與情不出性外以皆具故從相須破則性亦泯寂從性須顯則情相宛然此破此顯皆為性具亦不分於能具所具強而為言名之曰具如此了者依稀識具問所具之相為本來有為現方有若本來有下文何云若本無解等之性者設復熏之德用終不顯現豈非本但有性現方有相若本來無今文何云並能包含染淨二性及染淨二事答一性是能具諸相是所具若無緣熏時其相乃未現非謂本不具又雖云具相其未熏現時非謂心性中已有於相㒵故今所立義與昔二家殊問且未現時豈非具性答未現之時云具性者乃是能具之性非是所具其所具者還是於相故與具性家殊問既云未現非謂不具是則性中有具相耶答雖然具相其如未現故不可云性已有相故與具相家異問篤論其旨至當如何答以非思議不可定有不可定無今引祖文而證此旨摩訶止觀喻惑心具法云若言先有那忽待緣此取未現為無不可於心先自有惑若先自有何故持緣其惑方成若言本無對緣即應此取本具為有不可云心本不具惑若本不具惑對緣之時惑從何來不有不無始欲云有惑且未現始欲云無心且本上故不可有復不可無定有即邪認未現時謂心有惑定無即妄認本具時謂心無惑當知有而不有上有定約具故有下有字約未現故不有不有而有上有字約未現為不有下有字約具故而有惑心尚爾況不思議一心耶止觀以惑心喻不思議心今若例於具相但於向喻文各以心字例為性字各以惑字例為相字學者詳之輔行釋云定有謂已具定無謂永闕若謂已有如倉中盛物若謂永無如沙中無油然此等文二家所見各有消釋皆謂此文符合己義如具性家以已有為相以永無為性具相家以已有謂破計以永無為具相今曰二家之見消文似偏乃以二句各有法體且具性家以破有是破相破無是破性乃以相性成此二句具相之家以破有是破計有思議之相以破無是破計無不思議相乃以所計情相法相成此二句今謂二釋恐非文體然此文體祇約一法以論二句且如三毒之喻祇一惑法若謂此心已有三毒如倉中盛物若謂此心永無三毒如沙中無油豈可得云有約三毒相無約三毒性有約三毒情無約三毒法作此釋者似有穿鑿但究文中已永二字故知祇約一種法體為二句爾復有具相之家乃以二句祇一法體此釋甚善但就破計其釋乃偏何者若云已有是破計計破則不妨有相且永無亦破計計破應須不妨無相若云無計破則有相應須有計破則無相何故有無計破皆不妨是有相耶今所釋者祇為此相本不思議不可定有不可定無若定有者如倉盛物若定無者如沙無油非但文相白直亦乃心地圓融然止觀文約大經意以成其說若欲愽知尋經自曉問未現之相為性本具相但由眾生情隔不見謂之未現而其本性實常具相耶為由未現故故其本性則不具相耶答不可思議亦不得云常自具相亦不得云性不具相四句咸亡群情頓遣若隨順悉檀亦可得云性有性無須善法理方能通達且相之當體體本是事事則無常遇緣方有但得名現則不曰具以相離性故未現時於性但有能具之性而無有相斯亦可云性不具相作無句說此如下文但云本具行果之性涅槃經云是故我說一切眾生悉有佛性真實未有三十二相八十種好性之當體體本是理理則常住天然本有故乃名具則不曰現以性即相故本具時諸相頓足斯亦可云性常具相作有句說如下文云果德之法雖有相別而體是一心心體具此德也涅槃經云大慈大悲十力四無所畏三十二相眾生悉有兼存則雙亦互舉則雙非欲於四句以通不四不可專以有無為定問性不曰現者如何得云顯現佛性等相曰具者既然由性而名性曰現者必乃由相而得祇由情相迷於佛性對迷說語故曰顯現二藏體下釋如來如即平等性體來即差別事用如名不異故屬平等來必有迹遂屬差別下之二釋意悉如此三此即下總結二釋所藏者若對能藏而揀判者似前能藏為今所藏若極求其旨蓋盡法界祇為一藏此藏之外別更無法前釋能藏於此藏中舉其平等性為能藏染淨二事而為所藏如佛性論第二如來藏下云一切眾生悉在如來智內故名為藏以如如智稱如如境故一切眾生決定無有出如如境者並為如來之所攝持故名所藏眾生為如來藏故前能藏非無所藏今約所藏者於此藏中舉其迷染無明之法而為能藏却將一性而為所藏亦如論云一切眾生為如來藏能藏如來不得顯現故今所藏非無能藏但為取於心性為藏故能藏所藏皆從真理而得其名問今所藏中有染淨二用名之為來何云所藏亦取真理答文雖該用意則在體故文明云即此真心而為無明㲉藏所覆藏故真心之言豈非以理為所藏乎亦可從文前釋能藏乃真藏真妄由淨心包含染淨二性并染淨二事性非真乎事非妄乎亦可染妄淨真今釋所藏乃妄藏真妄由無明所覆藏體藏用體非真乎用非妄乎亦可性用為真事用為妄亦可染用屬妄淨用為真文亦有三一釋藏二藏體下釋如來三故言下總結皆如文三能生名藏問與前能藏何異答能藏言體以用從體故曰能藏能生言用以體從用故曰能生又能藏名藏者能藏則別別在一性為能藏故所藏則通通以二性二事為所藏故能生名藏者能生則通通以心體并染淨二性為能生故所生則別別以染淨二事為所生故文云體具染淨二性之用依染淨二熏能生世間出世間法豈非心體并二性而為能生世與出世染淨二事而為所生初釋藏為四初標二喻女生子者且子之身質即母之血氣所以得生故取用之亦見同體若准方等如來藏經并尼揵經各有十喻明如來藏於中乃有如貧女人而懷貴子文通圓別若從圓旨即具為生與今喻同三此心下合四是故下證初引楞伽通證能生染淨次引華嚴別證生染後引觀經別證生淨次釋如來與結悉如文六釋法界二初問二答以法爾釋法性別釋界同輔行中以諸法釋法三諦釋界法字屬事界字屬理然法爾之言即天然之謂也體合屬理今云事者由此之理天然具事乃以能具從於所具故今法爾屬諸法事故下即云法爾具足一切諸法界云性別者別之為言體合屬事今云理者由此之事召性能具性則差別乃以所具從於能具故今界別屬性德理又可今文不同輔行以今所釋法界二字皆約性故法即性體故云法爾界即性用故云性別遂即釋云以此心體法爾具足以性體釋法字為法爾一切諸法以諸法釋界字為性別輔行以諸法釋法者乃緣生事為諸法也今以諸法釋界者乃性具用為諸法也是故不同問輔行云十法差別名之為界是故十法各有界分又云界者界分相不同故與今界者性別同異如何答文有同異若十法各有界分則別在俗今通三諦若界者界分相不同故則彼此是同皆約三諦以釋界故問既指三諦而為界分界則差別合當屬事何故輔行會同實字而文乃云亦可界法性法即是實相且持倒法界為界法者意以界字為實法字同相且實即是理應屬無差豈同界字為差別耶答事理之義亦如前明體用之說須約過德諸義而分輔行此文應通過德亡照二義若約過德三諦為理緣生諸法為事若約亡照亡三為理照三為事前約過德故云法即諸法界謂界分相不同故一切諸法皆以三諦而為界分後結其意乃約亡照故云三諦無形俱不可見然即假法可奇事辨問雖云約德奈三是差如何同實答以對緣生法是定差故此三諦即屬無差雖云差別不妨同實問此三既是無差之差如何俱照却名為事答對於定差雖云屬理若望俱亡三還屬事今引輔行略籤釋之文云三諦無形俱不可見以性亡故然即假法可奇事辨以假立故上二句標也次釋此亡照先釋亡云即此假法即空即中乃假亡也空中二體二無二也空中亡也已上釋三諦無形俱不可見一句次釋照云心性不動假立中名照中亡泯三千假立空稱照空雖亡而存假立假號照假已上釋然即假法可奇事辨一句然輔行前約過德後約亡照者意辨德中三諦俱得為理功由一性之亡也問照既是假正屬於事何云奇辨答天然妙性非亡非照非事非理今欲辨假故奇事論有人或云理中三諦難見故奇事以辨之今問理空假中云難見者還有名不若云有名何須奇事而辨其名何云假立中名假立空稱假立假號耶若云理中三諦本來無名以無名故所以難見故奇事辯名者今問既本無名如何却云是空假中以此而知云空假中便成奇事但請細究此旨必見心源況復文云三諦無形俱不可見者由無三體故云無形然即假法可奇事辨者由附事說故有三名體既是一故一性是理附事名三故三名是事然亡照之義名亦通漫恐濫其說復更委陳若克從法體有二一假單照空單亡中道雙亡雙照二平等性俱亡亡前之三平等性俱照照前之三此乃是今立亡照義若隨義召法假雖單照以此之假即是平等一性之假故三俱照空雖單亡以此之空即是平等一性之空故三俱亡中雖雙亡雙照以此之中即是平等一性之中故亡與照俱是法界此乃以假召三故俱照以空召三故俱亡以中召三故俱是法界若立句分別空之亡乃當亡之一句假之照乃當照之一句中之亡者乃非亡非空之亡非照非假之照謂之雙亡而亡照空而照照假謂之雙照又若以空為蕩以中為絕故合空中乃為亡句假為照句其平等性謂之亡者乃亡前空之單亡中之雙亡并空中之亡又亡假之單照中之雙照亡此亡照謂之亡也故三諦俱亡之言其旨深絕亡既如是照亦復然以此義故一者以空召法亦云三諦俱亡二者平等性體亦云三諦俱亡其以空召法云三諦俱亡者復有功歸就法二義若就法言之以就空名便故故空能亡三若功歸言之由此之空是平等一性為空是故此空方能亡三又三諦俱亡之言有能有所若以三諦空於三惑此三諦俱亡為能亡也今以平等一性為能亡則三諦為所亡矣若論意旨平等妙性既非思議實不可名但為緣故或名為中或名為一或名非三非一今退不取中名謂之俱亡者乃為中名對空假故進不取非三非一謂之俱亡者以非三非一別無體故由是處中而取故以一名為俱亡也如大師云雖有三名而無三體即亡義也雖是一體而三名即然義也不二門云惟一實性無空假中復了此一乃是圓融不可思議實非是一強名為一貴在得意不可執名若達此一非一是故性名亦無此下記文凡云一性者應以今意實達諸說又復須了亡處則二諦宛然照處則一法不立此亡此照皆非思議故大師云是三即一相其實無有異釋法性二初問二答初約即義以辨性用法乃事法事則差別指此差別即性而具性亦體別故云以此淨心有差別之性故能與諸法作體二又性下直辨性體約即論離離於事相故云性者體實不改以一切法皆以此心為體者約體論即也諸法之法自有生滅者約即論離也
