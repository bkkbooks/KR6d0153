front:
  text: 大乘止觀法門宗圓記條箇卷第一大乘止體觀用般若解脫二德體用法門南嶽思大師三性不生滅三性論止觀之體別圓性淨之異隨名辨無明之體克實辨無明之體問法性無體乎無明法性無體之異無明無所依體別圓之異一心真如同異耶約惑諦性有五種體用三智之始本二覺修性俱用心體平等二義平等差別二性之義事性之差別性具之差別差別性之異解枝本二種不覺因中緣中之癡子時果時無明住地無明無明名住地二義無明名住地亦稱無住界內見思當分名住地種子之說且附權而說從真起妄之三義滅妄歸真之三義枝本二惑同斷之二義枝本惑同異斷解與位之差融迷事迷理之惑得名覺於淨心淨心自覺似塵識并識識無塵之二義無塵金剛二智同異習氣之二義用證真如體證真如雖然性具不覺之異解法身名義法字三義身字二義性論染淨之諸義勿染淨非染淨之義唯染淨之義眾生法身或名染性或名淨心包含具也具性具相之異說篤論理具之至當能生能藏二義之異釋法界釋法性卷第二淨心法性體用之意止觀所觀有所離所顯成三千編體三千之趣無不極三千唯在俗諦第一義諦所依當體二諦真如心圓融之二義自覺聖智情量思議淨心之體約佛智思議不思議言語道斷心行所滅止觀三境約文相辨生起修門通不立章本意三境皆通修反相離相滅相理性所離相不思議名亦非淨心諸法情生理生之異無明非有之二義性相二空離言說妄相文字二趣心知不言說口說不心思不思議則約麤心口反轉合譬即離約事理得名更互修德性德意識分能所理三不可分別約修性之二義解即是觀解而非觀解三與觀約位而分諸性淨名為破著沒染名沒修名立性名為起修故說性不空則亡空計故性用能起之事法無相之相之二義性即是相之三義約有空立雙非名二義薰成有二所謂各共也各薰有互別之二意無明之體有隨名克實二義妄念未間斷約一人通體之二義無明薰成無明之最初性染事染說則前後旨則一時佛則有未悟之日生則無未迷之時根本無明與業識不異三義同不一之二義成論三因四緣大論六因四緣相應因共因之異因緣之義為要性具之法差別之二義謂空不空皆是執聞融謂融亦為著鬪影事用之相漸現頓現耶厭沙作油五隱實法為生眾生假名為作以生顯具二義性義通本有不改本有清淨故轉凡淨性約不改義論轉凡義染淨並有約事約理二義染淨改轉約事用不改約性體性染淨無成壞染淨二性通常無常約生佛而真如為內外用修性染淨相除之眾義染違淨順故淨除染修染淨違順性染淨二義修染性染體同義異性染名義之二義性染不斷二義修染可斷二義修性染淨名相有無約同異約法體論權實以施為開南岳證圓融無量義引華嚴不引法華二義南岳十如讀文平等一性單理獨事不成三千南岳以如為句所以天台假諦轉意成三千理具事造三千三千三諦南岳讀文天台三轉同異空中二體二無說三千有趣極舉用之說三諦分體用論中邊亡照無明故有三諦佛性我性法同人別藏性理之三種同異如來藏為有門之義染淨無始本有從能具性故闡提佛性不斷善斷各具互具四承籤文理體無差二句各具分對不二門三千互理四句各具互具理同事異二義皆具三千圓中棟濫具三千事異能具各互具不一向染淨約十界有通別法身涅槃之同異十如之法有性有事談三千之所以法界全體事眾生頓受十界以迷顯悟卷第三塵成泥團喻之立處圓中事理相攝二意圓教相攝事理不虧約性相攝約事相攝台岳所談互具迭有祥略事十界法融攝之故三法無差異解正義無差融妙之異名妙與無差其義不同不定差別事理三千各通差無差中空偏空鏡火明淨一性在佛在生未暫別大鑑之磨明本明之異鏡喻顯三諦鏡喻之六義三義理性十界之名義業果性薰感隨各不知二義鏡喻所用不同一性圓融之異解問三與一何者實體邪一性能具三諦具德性想相名為一一性之異解一性為體三諦為用一家明三諦有的從隨點二意一性亡照故三諦亡照約事辨性之名義一性分二法身二義理差別事無差生無可度佛無可成以現顯具約性事論具現二配具現約性事偏互性得現名從事故事得具名從性故頓現同具漸具同現問三千現耶具耶約事理論造能所不一約事理論具能所不一依用四明四明分能所為造亡之為具所以染淨二性唯一法身體用現義不顯圓一性二修圓別不同二義別教緣了得性名二義問染淨二性可廢耶於性中染淨亡不亡即順情性百界千如為不思議故不可思議之異解正義佛能知不可思議言說屬言無名假立一心平等法身之名真諦有名有實無諦有名無實真性妄性三諦之性名習性性分之二性不改實性之名通事理評具性家非具相之說破或計理不思議定相具事常義由即性理具於事事具理泛有六義事理互為能具所具約就法功歸之二義存有為具頓足為具佛性具生眾生具佛即離之二義即與具體同義異理具事故事具理不可事具故云理具事眾生本具染淨以名召體亦說佛性之意生佛不虧染淨二性語性為淨為佛之意一家談修性都有七種之義三明在障出障之理之下辨事法體有隨名克實之二義性染淨隨名之體歸于性隨名克實二種辨體之依文在障法有五種約五法能所三義染性或能障或所障出障法有五能所有四染性亦為所顯淨用亦是所破染性名性障障性二義平等之差別圓融之能障所障在障出障之名通染淨四明事用相攝之相之下少分二位事法之至攝不融攝事法之融礙非融礙事相所得之由事法之二根本眾生不知二根本事相之當是妨礙事法之當體所依之體波所依當體之體波之當體之異事體非礙請謂成礙之異解他解今義更示義詰前異解定差無差之差迷謂內外悟唯一心眾生但理諸佛得事眾生色心皆具諸佛眾生之具但是理性文義修性十界各相論具今文弘決生具佛性事不同之故不對法心體既融破事體自融之義攝色歸心方具之異義就法功歸論具隨說不同就法論具以易通難之文相攝相等相即事法聖人能融凡夫不融理無相之異解事相定相不定相定不定相論存亡二義一家三諦融妙復說三千所以事事互融由全體是理問現見色相豈即蘭香耶理事相即事事自融示相不同外道計我通四種外計我遍與佛法理通二不同大小二相互容受不增減淨名不思議之用異解他人芥子須彌相入與今不同或解芥須相入寄事顯理今師之難事中大小相容圓聖應云無謀者從性言之云隨情等從用言之凡夫就事妄執為實二義五明治惑受報之下但除病不除法一家師資名二義能執情一所執法二能執所執事情與理對辨病法能執所執約當體所依成病法約事以能所執分情法三義一能起心情所起心法二能執心為情所執事為法三能不知心為情所不知境為法但除病不除法之文二義一情除法自除之義二情離法即之義論情與法有三種一情法俱離二情法俱即三情離法即圓之情法俱離與別斷九異相體俱即之義約即論離之義約即論離之異解今詰難四明以情為所顯之法而破而顯唯破唯顯非破非顯法離情即之義破顯之道成佛要門凡說理性皆歸空中凡說理性皆歸俗事破亡情為空之義破性自有空之義今師破顯二義論諦理辨破顯立義根本諸家之異約非破非顯而論破顯二義一自行顯體二義一事理法體破顯二情智同異破顯二化他顯用二義一約情智二約法體化他顯用中情智同異破顯亡照破顯以三千會合破顯卷第四因具次第積集之義眾生諸佛頓諸相能不之由徧人實由性現諸報菩薩起用示現有二根本一憑故業二依理具二本諸教通否不妨眾生眾多身有無之義法爾法界法爾名言之所從別心一心為體之計破異大經佛性共有各有之文自成佛他不成以自成資他修六明共不共相識之下阿梨耶唯妄或通真妄梨耶名和合識二義性體事相分總別二意性具業薰之相由或解業薰本識種子或解業薰性國土由生由佛人生餘土此土常存故自下本文下卷二明依止之下破淨覺所立總別一性妄念為總義異三諦為總為別一性寂用相對體用二義無相五義體用五義自他止觀體用二義佛現生死法非染非相三明以何依止初明止依正之知不知五蘊之知不知行證不離解二義行證亦名解修性對論方便解行對論方便約位論方便薰習四法爾時之二時意識通二惑之二義心意識之別智證證智本覺始覺始本不之三覺一異無明亦名覺三覺之覺字意天台之去取自在本識阿梨耶識無沒識和合識種子識果報識起信今文三大不同水流波相由生滅有二種生死之本二種會諸經異由談性具水本無波等二明觀六度分世出二意和光不同塵初心未堪涉事二釋破小人執之下小乘不依真行二義直菓三釋破大人執之下大乘初心憑意識聞教起觀性德修德滅自心境界二義無明緣起法性緣起淨心不知境名義二義淨心知境之義無塵智與體具智性為同為異性智發時何有無明耶能薰所薰智一法而論心證三句料簡智斷二德一法二義自證他證證他之大旨真證之人初料簡心自證功用無功用修性對辨約修云無作由即性淨心自知本寂淨心可見之義如來可見不見四義意識能知之智還是識七識屬現行二簡由他證習氣有三不同由他證之正義三簡由證他見思根本見先除小乘先破見思之本種他證證他之異無明名義約權實之情智約妄真之情智證道不斷之義生起識名字粗覺愽地夢中夢意識法塵之六通徐根塵識名之生由識緣境對而不見見而不念之異心境俱闇釋大文第二明止觀境界之下今文明境通真妄三性分真妄摩訶止觀明境通真妄真妄所離所顯分別依他二性之異分別性分別識同異釋真實性之下染淨相即故不妨染淨修德非增智性本明生佛更互不妨明暗釋依他性下一性三名真實依他二性之異依他之義有二不同三身四土自利利他二義果上染用起不起二義果上示有三毒為性為事生佛染事之同異佛示染事亦名染果上用為解脫亦為縛染分依他能薰所現二法佛同體力常護眾生二義佛果大力不重垢眾生依薰成法或假功成法或不功成法等異說佛捨眾生眾生捨佛釋分別性之下一切種智之異義分別依他更互相生分別依他異體同體見思迷事無明迷理若望中道智還成障大小宗計五識不同小乘計五識起三心大乘不別立五識分別大乘五識意識之異小乘五識五意識第六意識之異大小計五識五識意第六識二異輔行五識五意未屬煩惱等文五識五意識第六識體全同止觀揀境不簡諸識大文第三明止觀體狀之下界內外之事三惑三諦能所迷三性分對三諦二義依他分別二性止觀真實性止觀台岳用與名異義同三諦者天然性德解行一途一生說三諦名一性說空中名一性說中道名心佛眾生內外依正內外卷第五初約分別性止觀從假入空分對止觀觀見思假是假觀空假二觀不分前後空假二觀分於前後入空前假觀是出假方便南岳天台止觀異相流轉生死之因由以虗相為理大小之異小乘無明虗相為空圓教虗相為空圓談之幻一性之言亦通餘教唯圓教之一性導達迷圓理之學者性相二空釋約依他性止觀界外塵沙無明之異妄業二義釋約真實性止觀今三性止觀與中道破徧會同真實性二無為體二義空中二體二無二也空中還成虗假無無性無真性心外無法之兩向止觀二門意歸雙行三無性過德之三義分別無相性依他無生性真實無性性二義妄立非妄立諦大乘止觀屬圓頓以依他名分別二義除實性有二意除情不除法異解正義釋二約喻明體狀之下修性空中體同義異二明清淨三性止觀之下如是二字為實十法為權三諦為權一諦為實三諦一諦二而不二三一而分不分不分而分三一相即之二義釋明分別止觀之下表彰佛現虗相生執為實自心所作之二義釋依他性觀之下三身四土對自他釋真實性止觀之下佛現情事非凡迷眾生得用失體料簡差無差無障礙別性諸佛離情何名異事之異解情之所起全由性具破具性之說生佛體同何佛成生不成不知生佛同無由成佛料簡有非有應化之異智諦身能顯所顯所成唯識今家識轉成智等之異法身為塵相法身有色無色法身有相無相異解正義法身得名凡有名字用義順逆二修一法身為修為性法身之稱得由之異性性無名非受啞法乎於體假名非強名俗有三名不思議俗三義三祇通大小別教無隨緣圓取波水即別取波水本幻術與神通不同大乘止觀法門宗圓記條箇終
