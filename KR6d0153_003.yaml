body:
  text: 東掖白蓮釋了然述三問下示差無差二初問意者若無差別何稱無量若有差別何稱為性由此問云為有差別為無差別答四初示藏體具斯二義畢竟空藏體是無差此藏具用用則而差然此性用即體而為故云蓋是無差之差二此義下釋二初約藏體全一釋二初喻二初標二何以下釋塵成泥團喻出楞伽彼經云大惠譬如泥團微塵非異非不異金莊嚴具亦復如是大慧若泥團微塵異者非彼所成而實彼成是故不異若不異者則泥團微塵應無分別如是大慧轉識藏識真相若異者藏識非因若不異者轉識滅藏識亦應滅而自真如實不滅經文取喻真識妄識不一不異今以此喻不可喻於如來藏者由取用有異經文通辨真妄今文一向喻真又經文但取塵與泥團對論為喻離塵無團故不異塵與團分故不一如離金無像離水無波故不異金與像分波與水分故不一今就塵中橫辨為喻若以水為彼以金為像此可一體無差而為差別故差別處皆全一體若以衆塵為團故不可喻一體無差為差別也由衆微塵有異體故不同衆波衆像祇一水金二如來下約法正示二初示非同喻由假實不同故微塵差別是實泥團之一是假今如來藏藏體之一是實其名差別是權故云如來之藏即不如是二何以下釋三初直示藏體是真實法者實即圓融權乃隔歷圓融故無差隔歷故差別體既真實故圓融無二也二是故下歷法顯示為三乃從狹至廣初約一毛孔性終約一切毛孔性又初約毛孔性終約一切法性又初約一衆生法性終約一切生佛法性總而言之三千世間一切法性皆是如來藏之全體故先取於身身物最細無逾毛竅此藏全體為一毛竅復乃全體為一切毛竅法法雖殊此體全一故此一性即三千性圓融無二無差之差不可思議故總結云是如來藏全體也二是故下明性事相攝釋然性既無二更何所攝良點事即性故論相攝從性為言是法是攝非謂攝他從事為言性為能攝事為所攝故攝之一字於能所中了無能所性事不虧名為相攝問若性事不虧為相攝者何故文中先就性明次就事辨是則單性單事皆可相攝何云不虧為相攝耶答事相攝者而不虧性是故下文謂由事以性為體故故事得相攝又云心體既融相亦無礙以事顯性性相攝者而不虧事若非事差如何得有諸法之性性豈諸乎初示性相攝者即以所具從能具性而論相攝如理具三千也二示事相攝者即以能具從所具事而論相攝如事造三千也理豈虧事事豈無理但以趣極受名別爾釋文為二初示性相攝二初舉一人一毛孔性能攝十界諸法之性乃是一界具十界也初即攝一切世間法性具六道也二及攝下即攝一切諸佛出世法性具四聖也二如舉下例一切法性一一法性各攝一切法性乃是十界各各具十成百界也初以毛孔性例餘世間法性亦能即攝乃示六道各各即攝十界也二如舉世下以世間法性例出世法性亦能即攝乃示四聖能攝十界也良由藏體無二所以法法互攝問何不以九一對論世與出世答前染淨義既約四六今世出世豈應有別問文云一切諸佛所有出世間法性既云諸佛豈非對前成九一耶答既云諸佛所有佛所有者權實法也三權一實是佛所有故該四聖然今文中十界互具與天台所談互有詳略今文世間總略而舉而不詳云具三世間天台十如總略而舉而不詳云以一衆生一如是相即具十界十如但總略云自具當界十如復具九界十如二又復下示事相攝二初示二初舉一毛孔事能攝世出世間一切事二如舉下以毛孔事例餘世出世間事亦即能攝此二相攝例性可見二何以下約事用相攝歸性融以釋義旨事相差別性體圓融若不推功歸於性融事相差別無由相攝故云以一切世間出世間事即以彼世間出世間性為體故問為由性十融通故事十無礙為由一性融通故事十無礙答從義異説功由性十從體同説功由一性三是故下證三無差別者昔人或謂惟理無差其如今文證向事理皆悉融攝或謂緣起之事當體無差其如今文由得性融方曰無礙以今觀之義恐未盡今曰功歸在理就法在事是故事理或差無差心境了然問就法在事者豈非以理無所存遍在於事篤論還是理曰無差答理在事者非物在倉良由事即是理故事當體便曰無差問事即是理必名為理如何得云事體無差答名離體即可如來難名體俱即則無所妨然復有人却許事曰無差良由即理權名為妙不因即實今且問之十雙權實理事一雙而為根本其事權當體惟差無差若是無差如何復云事體是差由即理故名曰無差若謂因即理故事權無差如何不許事權非妙由即理實權名為妙若云妙與無差義不同者且權體既然自妙妙即圓融無礙如何權體自不無差無差者即融妙之異名豈應權體自得為妙而不自得為無差耶或曰權體自得名為無差今日大師何云立一切法差降不同無以此文謂立淨法淨法尚乃名為差別豈況事權立諸染乎或曰妙與無差義實不同由定差者名之為麁不定差者名之為妙事權却名為差但由此差是不定差故差且名妙今復問曰得名妙者為從差別為從無差若云差別亦得名妙者荊溪何云三無差別方名為妙若從無差方得名妙者故知權差不可名妙或曰無以定差難不定差今曰此義幽隱當委辨之所云不定差者不定之體體屬無差若云差別體是不定者既然差別如何不定所謂不定者指生即佛指佛即生方名不定若也差別如何相即故知即之功妙之功無差之功皆由理也才云此差是不定者便是於事點理於粗點妙於差別中點無差別此旨深隱人穿知之或曰得妙名者却從無差但圓中事理望偏定差但名無差是故圓權亦名為妙就圓自論不妨事權是差理實無差今曰然此對當本於義門而今觀之義門似礙何者既然望偏故圓教中差與無差但名無差得稱為妙就圓自論不妨有差與於無差如何不於就圓自論以差為麁無差為妙以由自昔祇許圓教事之與理即之與離權之與實差與無差偏圓對論俱名為理為即為實為無差就圓自辨亦得有事有離有權有實有差無差若於麁妙一義但有偏圓對論乃無就圓自辨是故不許圓教事權權體是麁由失法體故礙義門不獨義之有妨亦恐未通祖教何者良由荊溪明許就圓自論粗妙故云若約不思議中亦得論妙與不妙如三德中若前三悉檀説義當於麁謂三德為世界解脫生善般若破惡是故為麁若見法身方始名妙三德既爾餘九亦然今例此云十種三法既爾一切法門亦然故圓事權當體是麁即實是妙權得妙名類前功歸就法二義可以意了然曾有先達聞余立於不揀同異其權當體體乃是麁即實故妙始則確然不許圓權當體是麁遂與余釋其義似屈而轉計云此乃就圓自辨妙中之麁不可同於偏教之麁余曰因遭今難不覺許於圓權是麁然祇一三教豈可偏麁圓粗二麁體別云云或曰由情執故麁今曰若由情執何但權麁實亦應粗云云問今文引於三無差別通證事理則事理三千皆無差耶答今文雖然不可守一妨於衆義以三千法無所不攝或差無差非差非無差惟差惟無差一塵一念無不具足故三千法通攝衆義若趣極於理從理辨義故三千法名曰無差趣極於事從事辨義故三千法名為差別以此事理皆以藏體之無差融俗用之差別若理若事皆得名為無差之差差之無差從此辨義則事理三千各通於差辨以無差或於事理各從藏體之無差故事理三千皆名無差各從俗用之而差故事理三千皆名為差又此事理在衆生心名之為迷在諸佛心名之為悟故事理三千從於迷悟俱在事異皆名為差若指迷即悟指悟即迷故事理三千俱在理同皆名無差祇由一念圓融是故義無不可四譬如下舉喻二初正約喻二初正喻法文既分三今喻亦爾初喻示藏體具差無差前法惟性今喻通二初像性二初正喻鏡體者即空藏也具一切像性者即不空藏也鏡體即像性空藏即不空無差別差別二若此下釋喻二初無性不現者如良由理具方有事用下約像知性者如其實無別以生顯具二如彼下帖喻無性不現雖復明淨者中空如鏡明淨偏空如火明淨同號明淨如同名為空照物現像鏡火有殊如中偏不等三既現下約像知性喻二以是下像相二初依具發現二而復下淨穢無礙十界之相相不同同在一心而無相礙無相礙者即是無差雖然無差生佛用別即是而差此差與無差不離藏體如鏡衆像可喻斯法二雖然下喻釋中藏體全一泥團之喻不類藏體藏體全一惟鏡可比文為三初總示雖有像性像相之別至是一鏡者若以喻求義似有妨何者像性無形可云惟是一鏡圓融不異若其像相雖依於鏡而不同鏡由鏡惟明像有異色鏡或惟圓像有長短如何可云圓融不異應知在相論離在性惟即相無別離乃離於性故以像對明遂使鏡圓像色性無別即乃即於相故指明是像遂使像圓鏡同今正約性論即乃云像相亦圓融不異惟是一鏡二何以下正喻文有三初喻一切衆生毛孔性二如毛下喻例一切法性三一淨下喻例一切生佛法性淨穢二性者約世出世以分淨穢故知前性別在四六莫云淨穢不同染淨二是故下喻釋中性事相攝二初喻性二初喻一毛孔性能攝一切法性二如舉下喻例一切法性各攝一切法性前法文中各開為二有世出世今文總云即攝其餘一切像性并云舉其餘一一像性其餘者即總該淨穢二像世出世性二又若下喻事二初喻示相二初喻舉一毛孔事能攝一切事二如舉下喻以一毛孔事例餘事且為能攝今喻亦總不同法中開世出世二何以下喻釋義文云以一切像相即以彼像性為體等者意明像相相攝功由於性若不推性無有攝理有人直云相自相即者豈有此理或云朱紫之色不即蘭蕙之香但得像性相攝之義則違像相相攝之文若云此相是性故相攝者今難曰相既是性相何不攝相若不攝相非性耶故知此見但有即名全失即義二以是下約法結生之與佛同一淨心圓融無礙觀喻可信然復須知一大寶鑑在生在佛未曾暫別若云在生為塵所昏在佛磨而能照非今喻意今喻意者此鑑唯一無礙常明淨穢之像同在其中而無障礙淨穢之像雖殊猶生佛迷悟有異明淨之鏡祇一若如來藏體無雙故此鑑明乃天然性德之明非塵昏磨明之明然磨之明與本之明其明雖同其所以明者殊爾磨明覺始也本明本覺也才言此鑑為本明者已失其明體矣所以本覺亦在用收二是故下引經證喻二初正引經證喻二初引經即華嚴經也章安解般若一德具三以明淨之鏡為喻乃云此鏡一照一切照照中故是鏡照真故是淨照俗故是明明故則像亮假顯淨故瑕盡真顯鏡故體圓中顯三智一心中得故言明淨鏡攝一切法二此義下釋義喻有六義一者鏡二者淨三者明四者隨對五者面六者像若以克體言之其實有三一鏡二面三像謂淨明隨對者而無自體淨明者即鏡也隨對者即攬前三法為此隨對也鏡是能隨面像是所隨面是能對鏡是所對因此隨對其像即現以喻喻法其旨最明鏡者喻淨心體也隨對者喻淨心體具諸法之性也面者喻染淨二業也像者喻染淨二報也若克實而喻惟有其三一者淨心二者業三者報所謂諸法之性者諸法如能對所隨之業報也性者如能隨所對之淨心也因此淨心業報之三故云諸法之性也性之一字體歸淨心諸法二字體歸業報故知云性十者而無別體十體是事性體是理由此理不但故具十遂云理性十界今以淨心之體能具諸法故云即喻淨心體具一切法性問今以隨對喻具諸法之性若依章安應以其明喻具法性義何不同答能隨所對即是鏡明名雖有殊義實無別文云各各不相知即喻淨心等者不相知言不思議也故經結云一切皆無性法眼不思議今曰業與果報皆法界故性本無生業熏淨心業自不得而知如何而熏淨心隨熏淨心亦不自得而知如何而隨因此感報亦自不得而知如何而感故云各不相知也若作思議釋者事理不同因果有異故云各不相知業者下釋經合文也但合面鏡而不合像者既有業有性則報在其間故不別説況復經文正為談於業性故也然鏡明面像之喻有喻如來權造如十不二門有喻十界實造如於今文其妙經文句釋無生境智約鏡喻中亦喻實造與今文同記云鏡十界因同今鏡喻法性親生於諸法也形十界緣同今面喻染淨二業也像十界果同今像喻染淨二報也又復記云鏡明性十界像生修十界故形像修性皆具十界並不出於法性理鏡見明形像修性本如鏡內外一同今上文雖然有此像性像相之別而復圓融不異惟是一鏡也又復記云一切並泯故皆云無不復分別若性若修同今下文若廢二性之能以論心體者即非染非淨圓融平等不可名目也二又復下復引諸文以證藏體文為二據其所引雖欲皆明藏體惟一然其用義文意少殊初則意明世出世法皆依一體而得成立次則意明世出世法雖然不同其所依體其體惟一初又二初引經別明世法依心體生此據法性體融説為一者出其問者不了此旨作專一之一而解然問者是文殊豈不解耶但以俯為迷生故作此問起于後答顯示的旨如經所謂仁今問此義為曉悟群蒙所以問云云何能生種種果報今從的旨以示故云法性體融説為一也若了此一體融即不應疑種種果報或曰今此體融之一祇可作於總相明一以説義義何者由此之性百界千如無不具足以圓融故總名為一故號一性故知此一即是三諦圓融遂説為一此義然乎若謂不然其如義何若謂然者前何亡照以三為事以一為理則顯一性而非三耶答此旨甚難今祇問云究竟而論三之與一何者有實體耶若云俱無實體者祖師何云非謂空無心體耶若云三一皆有實體者應有四體若圓融時如塵成團耶若云其實是三但此之三圓融無礙故名為一者若爾一是虗名三是實體祖師何云雖有三名而是一體耶若如向説必須遍云雖有一名而是三體又復若圓融時如聚三塵為一泥團耶若云不思議體不定三一三體即一體一體即三體者祖師何云雖有三名而無三體雖是一體而立三名三祇曰名一乃曰體耶請以此義經懷自如今説為正祇由此性而不當一無以名之強號為一而此之一不可思議具一切德是故此一具空假中既能具德故知此一是圓融性説之為一乃非定一問還許一性乃是總相名為一不答正是總相名之為一故今立總別乃以一性而為總也又復今立一性一性者一即三三即一非三非一而三而一是此之一名為一性豈非總乎問與彼何殊答彼此皆云以圓融故總名為一其言雖同其意不等何者彼以三諦圓融總名為一今以性體圓融強名總一彼以由三諦圓融故即三是一即一是三今以由性體圓融故即三是一即一是三問今云性體圓融且性體者即三諦也豈非同彼三諦圓融耶答深極論體用者三者用也性體者體也由體圓融故用絶妙若分而言之性體圓融三屬差別所云三是用者如涅槃疏云言一則失用言三則傷體所云性體圓融三屬差別者亦如疏云三諦即一諦一諦即三諦差別無差別無差別差別非差別非不差別而差別而不差別諸佛境界具足如是不可思議問文中既有雙非雙亦今何惟取前之二句證差無差答一家明三諦者不出的從法體與隨處點示且的從法體者即全一性具足其三故一性無差其三而差即一而三如伊如目故名三諦不可思議且隨處點示者於一切處法法三諦祇如就於即一而三復點三諦者一即空也三即假也非三一者即中雙遮也而三一者即中雙照也的從法體與隨處點示義雖不同莫不須指一為無差三為差別故今引證從法體今問一性是亡云何能具答由此一性能亡能照以能亡故三諦皆亡以能照故三諦皆具然此一性本非亡照論亡論照不可思議二今即下通明世出世法依心體生二初示義二是故下引論證二又復下證世出世法同依一心體二初引文二此即下釋義二初依文釋義顯諸佛同體二以一下約義伸明顯生佛同體二初示義二何以下證但云五道與佛不言三乘者以三乘望五道亦名返流但不同盡源望圓極佛尚在流轉但不同五道通此二向是以不言二明因果法身名別之義三初標章二解釋三結釋又二初問上言等者指初圓融法門中曾云以具染性故能現一切衆生等染事故以此藏為在障本住法身復具淨性故能現一切諸佛等淨德故以此藏為出障法身若據上文有在障出障之語今不指者為在第三科中方明故今但辨衆生諸佛二種法身然衆生非不在障諸佛非不出障今正約能辨所第三約所辨能故今文中未明障義二答二初標有二義者初義約修染淨召一法身遂有生佛二法身異故云以事約體説此二名次義約性染淨召一法身遂有生佛二法身異故云以性約體説此二名而復云約事辨性者由已現之事染淨灼然能具之性冥而無相故以所現而顯性具遂乃復云約事辨性然其初義克從法體由染淨體體是修故法性之體體惟一故全此之一現而為修即似其修召此之一遂有染淨二種法身次之一義隨具詮辨既然性體能具染淨故此染淨即名為性乃約二性以辨一體遂有生佛二種法身二所言下釋二初以事約體三初標二然法下示四初法二初因事體殊二若復下由體事一正所謂理之差別因事而殊事之無差由理而一文相坦然不復消釋二譬下喻二初譬因事體殊二若復下喻由體事一今此喻文既喻克從法體之義故不復論鏡有人像體性馬像體性是故但云人像體鏡馬像體鏡三淨心下合四以是下辨意二初正辨二以常下引證文云常別者正指修事不同下文性別之別法體雖同從義異故文云不度生者佛既無生可度而其佛者亦自無佛可成於度生中無生可度非謂不度成佛亦然三此明下結二所言下約事辨性以性約體説二法身四初標二所謂下示三初示約事辨性有染有淨以現顯具者性若不具即不能現是故約現以顯性具然具現之義性事論之亦不一途若約真無俗有性不名具事則曰具第一義中一法叵得世諦之中具足諸法具即是假亦此意也若約性頓事變性則曰具事則曰現故今文中論二性時皆受具名語二事時悉從現目若約具無別具全具於現是故事現亦名為具現無別現全現於具是故性具亦名為現然去就之義雖爾究竟之意如何應了具之名者體本從性體若非性如何萬法一時頓足現之名者體本從事體若非事如何萬法次第漸現良由此事為性所具以能召所故事亦名具良由此性能現於事以所召能故性亦名現正如今文以此真心能現淨事乃以真性名之為現然此真性體非是現以所現事召能現性故性亦名現問何謂真性體非是現答以喻曉之如鏡現像是像現耶是鏡現耶若謂鏡現者有像之時亦是一明無像之時亦是一明何謂鏡現故知現之當體體是於像但以鏡明能現此像故云鏡現然事得名具義實難曉請以現義反而顯之若得此義性事對名具現者各從自分之功性事通名具現者乃約相從為目問向云萬法次第漸現豈無頓現答才云頓現此現同具良由頓故例如於具才云漸具此具同現良由漸故問云三千者為從具説為從現説答若各取自分之功理則為具事則為現具無別具乃具於現現無別現乃現於具是以具現不虧方成三千故才云三千者必薀具現此則攝無不遍也若約相從之義以現從具故俱名具則成理具三千也以具從現故俱名現則成事現三千也是以具現各是三千此則趣無不極也問以性為能現事為所現現既同造應性是能造事是所造何故曾云事是能造理是所造答造之為義且不一途就事自論心是能造法是所造事理對論乃有二向從理立事則理能事所造是遷變則事能理所例如談具理頓諸法則理能事所體為相隱則事能理所問四明以分能所者為造泯能所者為具其説如何答其説甚善得法體故以具體是性性則融一造體是事事則殊分問義若甚善今何頻言能具所具答以具旨難明固先以能所之義照其説使見其旨若見其旨能所之義任運不分二以本下示以性約體有二法身應知性本惟一以此一性具修染故名為染性以此染性約於一性是故名為衆生法身以此一性具修淨故名為淨性以此淨性約於一性是故為諸佛法身問染淨二性性之一字與法身何殊答體同義異以體同故皆是一性以義異故法身是體二性是用問若云性本惟一由具修中染淨故云二性者若爾祇須談現何須説具答若但説現惟見染淨本無今有不見一性圓頓之功問前以事約體但語其現非圓頓耶答文意實圓以由文云彼事亦即平等一味又云常同常別法界法門此二科意例如圓教修性離合若合性三俱名正因全此正因起為修二如以事約體但語法身能現凡聖若離性緣了全此緣了起為二修如約事辨性乃語二性能現染淨問前云初科是克從法體若約三因言之例且應云祇是一性二修此義與別何殊答一者別教不即正因為二修故二者別教一性不能具緣了故今雖克從法體名曰一性而此法體是具德之法體即緣了之正因故與別殊問別談性三義復如何答一者修德種子無始有故對於今有且名為性二者緣了依性而住且名為性由非即具故與圓殊問克從法體性德緣了體是於修者若論合時性之緣了歸修緣了耶答離合之義且非一途若約法體論離合者實如所問若約具德論離合者性德緣了歸性正因由此方彰是性具德三若廢下示直從心體惟一法身若廢二性之能者能之一字指於二性以此二性能現二事今廢能現即是廢於染淨一性若云但廢二事者文須應廢二性之所或曰且置於二性能現之義故云廢一性之能其實二性不廢今曰二性若不廢者何云心體非染淨非淨又染淨二性正是性用若不廢者何云以論心體又上文若不廢者下文何云依此平等法身有染淨性問性可廢耶答克從法體性不可廢染淨可廢性可廢者由染淨故故云廢二性之能染淨不可廢者功由性故故云佛有性惡生有性善若得此旨諸文了然文云圓融平等不可名目者然作此説名目已彰此乃如來究極之處而南嶽智者修證之本然於此性豈得以染淨諸法決不可亡乎亦豈得謂染淨諸法而決可亡乎由其可亡者情也染淨諸法即情矣其不可亡者性也染淨諸法復可即性矣所謂染淨諸法即情者由情可思議矣若其不得而思豈得謂之染淨耶而諸文指百界千如為不可思議者由百界千如即此故故得名為不可思議矣或曰不可思議者以偏言之但非三教之可思議豈復非圓以因言之但非等覺之可思議豈復非佛今謂不然所以名圓名佛者由於此性不得而思議故故不思議之言佛亦不能思議爾故淨名疏云諸佛菩薩亦不思議下地及一切衆生因緣三道此即絶待不思議也問前何故云不可思議者惟佛能知答佛能知者由知此法是不可思議故問能知粗耶答能即是所知乃非知何粗之有宜以旨了問向云由百界千如即此故故得名不可思議者豈非意欲顯不思議體體是一性由此性體圓融無礙遂使諸法即是此性以即是此性故所以諸法法法圓融名不思議作此建意還有何據答淨名玄文彼云問何等是不思議答曰不思議法性猶如虗空無念無思湛然常寂入一切諸法悉通達顯現即是不思議也入之一字是今建義明者詳之復了此入全體是入非謂入他方為的當據此一性既不可思議何故復名為一為性為平等為法身耶由為衆生作此建名此名非實故云凡有言説悉屬於權但為衆生附世假立以世間無異相故稱之為一今亦復然乃無性相一異之異相故以世間色心心為諸法之實故名為心今亦復然乃是一切緣生諸心諸法之實故以世間能為物所依止故名為平等名為法身今復然能為百界千如所依止故祇由附世假立是故名目生焉篤論性體心原其實不可擬議若了此名即性性體既實而真翻見世間名所召實實却成虗召性之名假却有實故曰真諦有名有實世諦有名無實然此有無亦為衆生作此説爾文云依此平等法身有染淨性等者即法身一性為染淨二性以此二性故有凡聖法身之異三是故下辨意四科簡凡有三重初問二答習成為妄性不改為真性然性之為義或不動或不改或實性或性分或習成若以事理而區分者實性中性也不改不動空性也性分俗性也又不別不對故其四名皆通三諦雖有通別然此四名莫不皆屬理性者也惟習成屬事由習成從緣生當體性分約緣生所依若性分之性亦從當體故與習成同皆屬事又習已成亦云不改亦云實性故此諸名通皆屬事今文且約天然不改故為理性今以此義評昔具性而非具相之説可問彼云具染性者既即是理性理是染耶夫言染者即垢穢之名理豈垢穢若云是垢穢性者今問性之一字性是垢穢耶猶恐未能曉此問意今復以四大之性而問之夫事性者如火熱水濕風動地堅各各性分相同故理性者非差別故今問性具水火彼必謂之但具水火之性也今復問之為具水火性分之性理性之性耶若云具性分之性者是則談具非具理性矣若云具理性之性者且夫所謂火者必熱水者必濕理性非熱非濕如何得謂火性水性未審水火之名為從理性而得為從事體而彰若云從事則具事矣不應云具事之性也若云從理理非熱濕何得二名名必因實理非熱濕豈得謂之火水者耶此旨幽隱自昔窂窮無同彼宗且以其性而為所具或曰理性之道不可思議豈應如此以情卜度今日每見學者為令窮究三一名體圓具性相義不可通即便説云不可思議然此推託自昔有之如涅槃玄敘他人解芥納須彌云不知入與不入既是不可思議那可定判入與不入章安破云此亦不可佛果上地皆是不可思議盡應不可解餘者盡言可解至此一義獨言不知耶今亦例云遭人問云如何性具而不具相即便辨云性具頓常相是變造且性頓常者亦是不可思議何可辨之及遭今問理性如何謂熱謂濕此乃且是不可思議如何至此云不可辨若一向以不思議故故不可辨如何乃云性不具相如何復難彼云相是變造性中如何得有此相彼人通云既是不可思議之相如何以情卜度即便笑從義窮理失乃以不可思議推之及遭今問性何濕熱還以不可思議推之豈非亦是義窮理失故此推託余患學者談具不明隨心信乎不覺觀縷其談三一圓融者亦復如是遭今問云既然是三如何即一既然是一如何即三即便答云不可思議然若還直作此會不可思議者心境不明趣但仰信今曰不可思議者直須的的明白絲毫不迷徹究根源方可粗云不可思議二故云下引證三佛性下例釋經以佛性而非造作今例染性亦非習成且從迷覺以分其實染性是佛或直以事造三千謂之常住不可破壞者且夫變造之名如何謂常荊溪豈不謂常應不變無常非性耶或曰不可執名然若不正名荊溪何不以理為造以事為常故知事常必由即性或直以事為無常者事既即常事豈非常世間相常如何消解若相不常必應改云世間性常第二重二初問二答然此文云佛性之中有衆生者是明法性能具諸法衆生身中有佛性者此明佛性之體乃為衆生事相所隱佛性理也衆生事也斯乃理具於事事具於理若泛而論之應有六句一者理具事二者事具理此二如當文三理具理文云真體具足染淨二性四事具事文云十方世界內纖塵而不迮三世時劫入促念而能融五理具理事如不空藏具染淨二性辨染淨二事六事具事理以理具事理顯之何者且事具事者功由理具事故今理既能具事理故事亦具事理如下文云若真諦攝世諦中一切事相得盡即世諦中一一事相且攝世諦中一切事相皆盡然此六義克從法體惟理具事就法辨義有六不同何者且理復具理者由理因事別故有染淨二性所以理復具理且事復具事者由事即理故此之事復能具事須約功歸就法二義事為能具者功歸在理由就事即理故事能具若從功歸理為能具若從就法事為能具理為所具例此説之若從功歸事為所具若從就法理為所具答文為三初正答即理具事事具理二句也文云法性能生諸法并云體為相隱者須當分別良以具之為言或指存有為具或指頓足為具且存有為具乃同圓中離義頓足為具乃同圓中即義今文通二若以佛性具衆生但云此明法性能生諸法義乃同存有曰具由法性生諸法故諸法是法性所有衆生具佛性但云體為相隱由諸法能隱於法性既隱法性故諸法中而有佛性皆從離義若從即義者以法性即諸法故故法性當處頓足諸法以諸法即法性故故衆生當處頓具佛性問所云頓足之具是約即者即義必應同具義耶答或因即而具或因具而即或即即是具或具即是即有此不同者不出體之與義從體乃即即是具具即是即平等妙性能即能具此之即具不出一性豈有體殊但由此性當處便是諸法故名為即當處頓足諸法故名為具因即是故頓足因頓足故即是故可云若不談具即義不成亦可云若不談即具義不成此二名之別者乃由義殊二如説下引喻然此喻文可證今義今立義者惟理具事由理具事故故事具理祇可色從空起色乃具空終不可云空由色起空乃具色如水成波終不可云如波成水問空無別空即色是空水無別水即波為水豈不得云空由色起水因波成耶答此旨亦難今當精究若據天然妙性不得而思議者亦不論諸法法性二名如不説空之與色水之與波也因衆生不了迷此妙性而見諸法則曰法性生於諸法如空為色如水為波此之諸法既從法性而生故於諸法而有法性如色有空如波有水此約諸法對法性説故云生云有也若約法性望諸法説故法性即諸法如即諸水空而為色波諸法即法性如即色波而成空水雖有此二莫不先由法性為諸法空水為色波故方可云諸法是法性色波是空水終不可云先由諸法是法性色波是空水然後法性是諸法空水是色波此則正從迷悟相對立教以説若以天然妙性之體體本不二而收法性諸法者則法性與諸法無前無後不即不離如空色水波不可前後亦不異同但以上義會之自見諸説有歸三以是下結第三重二初問此問因向云衆生身中有佛性而起真如之體雖一迷悟得名必殊且上文以諸佛之悟召此真如亦名性淨涅槃今何不以衆生之迷召此真如名為性染生死如何却召為佛性耶答二初正答以本具染性故能生生死而此染性即是淨性故復能具於淨性涅槃既然復具淨性必有出障之能今取衆生由染性故已曾建立生死染法故不復云有於性染生死是以但指有於性淨涅槃意令衆生修出障淨德故云而有佛性也文云在纏之實者實即真如亦可作其實之實釋之二若據下辨二初通立二性在生在佛二性無𮓪二但名下偏名佛性二初示二初恐濫事染二又復下為起淨行經論語性偏名為淨為佛者意為起於淨行故也文為二初興廢熱惱過也清涼德也今論二性特言二事者意顯事從性成去過就德必在於淨二若孤下欣厭文云愚惑者性本無名具足衆名雖具衆名名無實體體全是性性既圓妙豈定染淨并非染淨豁然無奇能了此者依稀識性不能了此乃聞性染便謂實染遂不羡之聞有性淨而謂實淨便乃欣之此畏此欣非惑非愚其謂何耶問聞染為惑故不可以染名若聞淨為愚則何復以淨目答名是方便遂有入實之功愚是初心乃有見性之幕故偏言淨性而誘進之因幕而求求必從師師必授以性非但淨性且具染即染是淨見非染淨方為究極三是故下結諸經論中於佛於生談本性者皆云佛性淨性然於師祖教門隨順悉檀舉不同名者乃非其一一者以性對修約無示有諸佛無修惡有性惡衆生無修善有性善如觀音玄文也二以性對修約有示有諸佛有淨衆生有染如今立難之文也三以修對性修則存沒性則常住修則偏一性則雙存修偏一者約一人終始方具染淨二事性雙存者如今文云莫問在障出障得稱為性淨涅槃並合名性染生死四以修對性據法界全體修亦染淨性亦染淨如下文云若總據一切凡聖以論出障在障之義即真如法身於一時中並具在鄣出障二用修既全具性故可知五以修對性欲令愚者欣習故修存染淨性則惟淨如今結文六以修對性欲令行者了修即性見性全具方極圓行故性談染淨如荊溪云忽都未聞性惡之名點迷則三道流轉也安能信有性德之行點事則修德三因也七以修對性克從法體修則有染有淨性則非染非淨如云廢二性之能惟論心體即非染淨三明真體在障出障之理三初標章二解釋二初問前科問意約能辨所法身既一何故有因染法身果淨法身今科問意約所辨能法身既一何故得有在障出障由法身是所障所出染淨是能障能出二答二初正答前難三初定名障與出障有事有性今惟從事故云心體平等無障不障并若就二性亦復體融文云但就染性者染字恐誤應云二性方應釋義所云有障垢之名者意謂有其障與出障垢與不垢之名文體從略乃云障垢恐人見下障垢之言因而改二為染問何故今文論障出惟就事辨不從性耶答性之染淨與事染淨體同義異今從義異不就性辨何者由性之染淨既是性故故體融一味雖有二名其實一體不同事中炮然二體問曾云事法無體但有其名今何復云事有二體答前豈不云夫言體者有隨名辨體有克實論體若隨名辨體事染以生死為體事淨以涅槃為體故二體不同若克實論體其生死涅槃但是名相克實而論體是一性故事法無體問既有隨名辨體且性染性淨二名豈無隨名之體何故但云事中有體答性之染淨名隨名辨體者染淨二名名從事得隨名辨體體還是事但約義異以性染淨義異於事故性染淨二名名下之體體是於性既是於性性則真實故非二體所以得云體融一味如此還成克實論體問隨名辨體克實論體有所自乎答理義既正何必求文恐不信者今為證之荊溪云立名之法各主所詮故云對體此同隨名今開顯竟名無別趣體無別理此同克實然復今文與前因果用義不同前有二科一以二事辨法身以法身起二事若依此義今文應云法身起障出障今文乃云真心違性起事染真心順性起事淨乃與前文所起雖同能起有異二約二性辨法身約二性起二事與今文能起所起雖同其取染淨有異由前不取所起乃取能起辨二法身今文不取能起乃取所起辨障出障問有此同異者何答前約染淨辨二法身故通取性事染淨以辨法身今約法身明障出障故別取事染事淨以論在障出障良以性染性淨體融一味不可斷故豈得論於在障出障修惡可用修淨斷之故就事辨障與出障以體約體中不取所起者由以事約體已曾辨故能起有異以事約體者由染淨二性同法身故二此義下釋相二初正釋在障出障二初在障此文法有五種能所三重五法者一染業二染用三真如四染性五淨性前二是事後三是理事體雖一由約因果或約過現故分業用理體雖一由約體德故分如性其能所者一染業為能熏真如染性為所熏二真如染性為能起染用為所起三染用為能違能障真如淨性為所違所障由此淨性與真如一體故故以所障稱為法身但以此義消釋文相坦然自明問淨性為所障染用為能障且染性者是所障耶是能隋耶答若以性從染染體同事即屬能障若以染從性性體同理即是所障今祇云染性為能起而不云為所障能障者由取名異義異故由性染不同性淨故但説順用照性為所障此取性染性淨二名異故由染性不同染事故但説染用為能障此取性染事染二義異故若非以體同義異而辨者於上下文消釋之際恐難的當二若以下出障法亦有五能所有四法五者一淨業二染用三淨用四真如五淨性能所四者一淨業為能熏真如淨性為所熏二真如淨性為能起淨用為所起三淨用為能除染用為所除四淨用為能顯真如淨性為所顯若與在障對辨者在障中無淨用今無染性在障中無能除所除故能所祇三有此不同者由在障時未有事淨之用故由出障中染性非顯故由事淨之用非所破故應知皆是隨時辨義用與不同且染性者何非所顯若非所顯豈得謂之佛有性惡且淨用者何非所破若非所破豈得謂之闡提斷善今不以染性為所顯者且順淨照之名欣羡便故今不以淨用為所破者且順正論破顯必就反妄歸真辨故文云圓覺大智并波羅蜜者即智斷二德但名淨用文二照字性事不同尋者可了二以是下辨頓具漸具初頓次漸三然此下結示二料揀餘義有二重問答初問者向論垢障名偏約事今問違性亦可名為障垢者不若可名障障即破矣何故前云染性與淨體融一味不相妨礙文云應説為礙染者染即垢矣變文體耳若據性名為染前數言之今意問障礙染其云染垢者相帶來耳二答俱是等者因上問意性應名障故今答之性得名障乃是障性亦名性障云俱是者顯不獨事又顯不獨名違亦乃俱得名障名垢障性性障二名翻倒者但稱呼異爾又對事障顯今性障障即是性性即是障故有二名云平等之差別者差別之言一者以過對德或名無礙或名為障二者就過自説或名為染或名為垢三者乃從稱呼或名障性或名性障雖諸不同體實平等云圓融之能所者障是能障性是所障今即性名障性既圓融能所豈別又今論性障乃是能障既以性為能障乃是圓融之能障也文言所者相帶而來結答但云勿謂相礙不融者故知正以障礙為難第二問答二初問亦應有自體在障出障者在障即染性出障即淨性上文雖有能障所障但通以真如之性為染所障名為染性圓融能所而未顯説染性即是淨性今問意者既云平等差別圓融能所且染性是在障淨性是出障亦應染性自體是在障出障耶據此問意為明染性下答文中既答染性圓融同淨故乃復出淨性圓融同染答二初正答初示染性圓融文云據違性而説無一淨性而非染者染性之外無別淨性也即是自體為能障者染性也自體為所障者淨性也染性之外既無別淨性故云自體為所障也自體者即染性當體也二淨性中云無一染性而非淨者淨外無染也自體為能除者淨性也自體為所除者染性也淨性之外既無別染性故云自體為所除也自體者即淨性當體也染性中見圓融故者由自體是所障故所障者即出障之淨性也染既即淨是以圓融淨性中見圓融者由自體是所除故所除者即在障之染性也淨既即染是以圓融又復在障出障之言皆通染淨但能所不同且如以真為能在於障以妄為所在之障今取所在故為染也若取能在自屬於淨且真為能出於障妄為所出之障今取能出故為淨也若取所出自屬於染然以染性為所除者恐人疑之性惡不斷何云所除今復問之此文云自體為所除者為修為性若云修者今文自云無一染性而非淨既然是性故知染性為所除也更且問之文云自體為能障者是性染不且性染既得為能障豈不得為所除耶故知性之染淨而無別體體是於修故得乃有能障所除之名今了一性能具染淨故此之性名能障性名所除性雖有二名實無二體故能障非障所除非除但有名耳無非一性如此了者方見性無不具具無不性不可思議天然妙體二辨意者由染淨二名而無二體既無二體故染淨相即既然相即故一味平等雖一味平等而不礙二名故識常同常異之法門平等差別之道理以此辨意究之故知第二問答者是辨性染性淨者也四事用相攝之相三初標二問下釋二初問體性至可解少分者由向所明染淨自體在障出障染外無淨淨外無染故云圓融義理已明故云可解初心乍聞故云少分又但解理而未解事故云少分但上言事法至其相云何者上明圓融無礙法界法門中云故世間出世間事亦即圓融相攝無礙世間即染出世即淨今指上文故云事法染淨亦得無礙相攝然上已辨事之相攝功由即理其旨已明今云其相云何者一者雖聞因理故事融今疑何者其事有不融者二者雖聞因理事融而於事融之相未曾廣示故作此問生後委釋二答三初正答前難二初總立若偏就分別等者須知分而言之法理有三一者能執妄情二者所執事相三者所依真理以所執之事從能執之情其事一向不融以所執之事從所依之理其事可得相攝云就分別妄執之事者正以事相從情云據心性緣起依持之用者正以事相從理故其事相通融不融問若依此説理融情礙事非融礙而亦融礙何故曾云事是融礙答若了事即平等體性非事非理故此之事非融非礙若事從當體故乃是礙若事從所依故乃是融共而言之事亦融礙曾云事體是礙者正從當體也今文云妄執之事不融者正是事之當體故乃不融心性緣起之用相攝者正是事由所依故乃相攝問上來何不直從事當體以説而復云事從情為礙答以事相所得之由乃有二義若從當體則依妄情而有因不覺故則境界生若從所依則依真性而有由即不變而為隨緣故此事相有二根本當體從情所依從性如楞嚴云一切衆生不知二種根本一者無始生死根本則汝今者與諸衆生用攀緣心為自性者二者無始菩提涅槃為清淨體即汝今者識精無明能生諸緣之所遣者由此義故故云事相從情為礙從性為融問但可云體相從情為礙何故云事相當體是礙耶答由事相之體有所依體有當體體性為所依情為當體此義難見今以波而喻之波之所由有二根本一由於水二由於風若論波體者以動為當體以水為所依曰波之動者動必由風故知即風為波當體即水為波所依以喻觀法其理可知既然當體同情故知當體是礙問可云即水為波當體不答亦有此義問與動為當體何殊答若隨名辨體故波以動而為當體若克實論體故波動無體但是相爾克實而論以水為體問祇可以水為所依體何云以水為波當體答其實以水為波所依當體之名從初而得初以動為當體今以克實奪之此之當體全即是水意顯別無當體全是所依為當體耳若依此義斯亦可云下之當體即融即妙或曰如前之説其理不然夫事相當體常即常融實非隔異但由情執為離為礙礙之在情實不在事却取波水之喻而明其理波如事也水如性也波常即水性常即性波未有離水之日事未有不即性之時但由癡人謂波非水如事非性癡如情礙非于事隔故不可云事體是礙今曰事當體者虗妄也性當體者真實也從妄而知者為迷為情從實而知者為悟為智迷其實而從妄乃妄謂事之不融故事不融者是迷實而從妄迷性而為事此皆妄也悟其妄而從實乃實知事之能融故能融者是了妄而從實指事而即性此皆實也妄謂不融事體是妄故事不融實知能融實體是性故性能融融之功者在性礙之功者在事故事體是礙也所云波常即水者由全水為波故波常即水此水之功也波不即水者水體靜波體動動隱於靜而但見其動不見其靜此波之功也實而言之本既是水何曾不即此取知者為言妄而言之但見其動不見其靜謂波非水此取迷者為言迷者正從今日但見動處為言故波是不即知者正從元本見水為言故波乃即不即者妄也常即者實也妄從事得實從性得故事礙性融其理照然今為昧者復更言之法界法體不出事理事是情迷虗妄之體理是智悟真實之體智實乃融迷妄為礙所以融之功者在理在智礙之功者在事在情若言礙之功者在情不在事必須融之功者在智不在理若云由智稱理故能融必須由情順事故能礙或謂礙之功者在情融之功者在事必須差之功者在情無差之功者在事若爾事體不得為差別矣若云事是無差之差不同情之定差者此乃迷名而不求義也由以情迷故從事之當體而失於理故曰定差以智了故從事之所依而得於理故曰無差之差其實二差體同但由於理得失致有二名豈可情差而非事差然情智者能迷能悟也事理者所迷所悟迷雖事理俱迷但迷之體者在事故云迷謂內外悟雖事理俱悟但悟之體者在理故云悟惟一心衆生但理者正從事上論功諸佛得事者正從理上説義此旨幽隱人而窂明若也不達其如之何二所謂下釋相三初正釋二初凡聖多小相攝輔行引佛藏云佛見一切衆生心中皆有如來結跏趺坐今云毛孔者故知若色若心皆具諸佛輔行復指衆生雖具但是理性者由十一界從未發現故名性十從已發現故名修十若性若修雖有二名篤論其體無非一性全體為十故修性十界各相論具以性佛界具性衆生以性衆生具性佛界以修衆生具修佛界以修佛界具修衆生輔行乃從性之衆生具性佛界從性辨具故云但是理性今文由明事之相攝故以修中衆生具修佛果又輔行中正明各具故迷衆生自具十界所具佛界既未熏習未曾發現所以但有理性而已今論互具故迷中衆生而具十方現成正覺一切諸佛故具修事又輔行中以悟對迷而論與奪由佛既悟悟無別悟悟事即理理既能融故事亦具是以説佛而能事具故云佛果已滿從事而説衆生既迷迷無別迷迷事非理事既非理事不能融故事非具乃奪其事而與其理故云但是理性所以致有果隔之言又云乃至凡夫但是理具今文不論其奪乃從法理皆與之故就事論具二若十下長短大小相收三世促念即長短十方纖塵為大小二是故下引證文相惟證大小長短又於長中自論相攝三其餘下例顯辨意初例顯今論事相相攝不出十界正之與依於正報中大而括之無出生佛於依報中大而捨之無出十方今於依正中碎舉諸法略而例顯無不相收以辨其意故云其餘淨穢乃至云及不對法悉得相攝云不對法者不定對故名為不對非無有對且如舉筆而對於硯不必對硯亦可對墨亦可對紙故此之筆名不對法不同淨必對穢有必對無等二蓋下辨意云相無自實者實猶體也由相無自體體是真心故云起必依心心體既融心必有體體即真實由實故融亦可云起必依心者即妄心也心體融者此妄心體體是真性性即融矣若此説者則雖次第由顯由相從妄念而起妄念從真性而起真性既融故妄念融妄念既融故事相融就法論融乃妄念事相也功歸論融由真性爾或報事之當體自融但由情故不融者請以今文而就思之若事當體自融者何必須説心體既融相亦無礙耶復了説雖次第由顯旨實同在一時雖然同在一時不可混迷法理問與昔人云攝色歸心方具何別答一者言同意別二者言意俱別且言同意別者若取妄之色心俱名為色真之色心俱名為心亦得謂之攝色歸心其色方具若言意俱別者須知天然一性不名為色不名為心附世假立曰色曰心若以天然一性名心則攝妄色妄心歸心其色心方具是故不獨攝色歸心亦乃攝心歸心若以天然一性名色則攝妄色妄心歸色其色心方具是故不獨攝色歸色亦乃攝心歸色此約攝事歸理其事方具功歸在理就法在事若直從就法而辨則妄心亦具妄色亦具不必云攝色心歸心攝色心歸色此之二義隨説不同旨在一時隨説不同者如大師因料揀一念心具十二因緣恐人不得其所以具遂云不同世人取著一異定相一念乃是非一非異而論一爾此則從於功歸以説大師又云芥爾有心即具三千并云惟香惟味觸等此則直從就法而説又若直從就法以易通難必云色何以具色即心故二料揀餘義六初重示二初問問從不解攝字而生今先以答文而辨其意一者相攝二者相等三者相即若善了者攝等即三名雖有異趣實無別為不了故隨名解義遂成不同謂相攝者大乃入小小乃入大謂相等者大雖不入於小大乃等同於小小雖不入於大小乃等同於大謂相即者不獨大同於小亦乃大即是小不獨小同於大亦乃小即是大因此義故遂有淺深由即是故所以相等由相等故所以相攝故今問意既能相攝必須相等耶下答云非但相等亦乃相即答二初正答云何以下辨意常同常異者此文之來明事相攝故此常同常異乃約事用為言第二重問答者以凡難聖答云聖人稱理施作所以皆成者故知事融功由於理由聖證理所以能融凡夫迷理但見於事事體同情故云情執乖旨是故不得或曰聖人稱理施作者由對偏情故若事若理俱名為理然其圓融體非不事今曰對於偏情故圓事理俱名為理者為取了事即理而得理名為取事之當體自得理名請有智者細究此意必然自許今説為正問可云理之一字乃是道理而非理性由不思議事道理本融聖人稱此道理故事而融答次文問云聖人得理便應不見別相豈非因今文云聖人稱理故有此問以此顯之理非道理故淨名疏云真性乃與衆生共有以諸佛菩薩能得此理故有大用豈非大師稟南嶽説乎又復縱作道理之理亦無害於今所立義何者且事是相別有何道理而得相攝第三重問答問之意者克從法體理體無差無相事用差別有相今之學者多云理無相者乃無定一之相非謂全無有相請究今文聖人得理不見別相者為定一相為不定相若云不見定一相者何云以彼小事而納大法故知若從理體不定之相亦乃可亡良以相體祇是一種差別法門不得理故故成定相以得理故成不定相其論亡者不出二意一約法體定不定相亡則俱亡存則俱存由此二相體祇一故二約同異亡於定相存不定相由即不即故答之意者如來不獨證亦乃得用故相無者皆悉證得第四重二初問約體用分途為問平等之體本既亡相約誰論於攝與不攝事用之體既然差別雖云如來不壞此用如何大小而能相收二答約體用相即而答第五重二初問由向答中但云即體是用體理用事祇有事理無礙如何見其事事無礙故有此問或謂三諦既已圓妙大師何須復説三千今曰三諦顯言惟有事理相即蓋由不云一假一切假無假而不假是以三千有事事相即從言雖爾意則無殊二答不出功歸在理就法在事所云就法在事者一則事能即理二則事能即事但了理融故無法不即蓋由一切諸法全體是理所以諸法更互相即尚乃凡身即是金軀豈況丈六不即藏塵問所云凡身即金軀者何故輔行云一一界果各各具十不相混濫答正各具故作此説下文復云彼彼三千互遍亦爾豈非凡身即是金軀又復於各具中且如佛具十界豈可不得指佛界地獄界即是佛界之佛界耶問此理難信且如現見色相豈可即是蘭香答學凡則難信學佛則易明問前云從事當體乃有差別若爾事之體者即同衆塵今文從事何以非之答今取克實論體所謂事者但名相爾問事即事者功由於理還成事理相即未見事事自融答功雖在理示相不同由事理相即者乃體用對論事事相即者乃就用自辨若指此用在果而全即衆生因理者未極佛旨第六重二初問外計我遍亦不一途或計我大物小物在我中或計我小物大我在物中或計我與物異或計我與物同今通途敘計問與真心遍物何別答二初出外執見二初我與物異微妙廣大者正是所計我大物小二設使下計我與物同彼此不融者我體無相以我對物即與物即物體既實以物對物彼此不融正隨世間所見而執何者世間衆物物皆即虗空而成故執神我如空與物相即及就衆物物物各殊不可此物即於彼物故執事實彼此不融二示內顯非二初標二知一下釋二初示內二非謂下顯非不出二意不同外道事相本虗迷者謂實佛法知虗一不同也故云非謂心外有其實事也即猶是也事相全體即是真心外雖謂即乃是神我與物相合即義不成二不同也故云非謂心遍在中名為至也三此事下方便重示三初內師問起二外人欣受三沙門下方便顯示二初約想物大小二初令想物大小二沙門曰毛孔下核究心事五初核事異二沙門下究是心體三沙門曰汝下核心無大小四沙門曰汝想下究心無增減五沙門曰汝想作大下究非共他心三沙門曰然則下揲示義旨二初揲示二初示心體惟一從心體言故無大小從心用説大小宛然今從心體故云心既是一無大小故二毛孔下示心為物體指此一心而為物體故於大小二物融同二以是下義旨二初緣起相攝二初示相收二初大小相攝文云以是義故者由向明心體惟一能為物體以此體一義故舉小物之相收大物之相無大物之相而非小物之相也舉大攝小亦然功由大小體一故大小二相相融二無小下大小之相宛然二初示無小相而非大相大相入小相而大相不減無大相而非小相故小相容大相而小相不增功由二體惟一而無大小是故就法二相相收大小宛然二是以下引證大小相入二相宛然文出淨名然此經文談不思議吾宗人師各見不同或曰不可思議用者乃事用當體自不思議故能相入或曰不思議用者乃是性德大小故能相入乃非事用今曰克從法體不思議者性體也用者事相也即性為事了事即性故號不思議用事不能融功由得性而融初家失此性非大小功由因事大小次家失此且得性而融者南嶽云毛孔與城但全用一心為體當知毛孔與城體融平等以是故舉小收大文雖託於妄心意欲曉於真性大師云若得芥子真性之小能容須彌之大得須彌真性之大不礙芥子之小荊溪云問真性自與實慧和合何關外境而云大小相入由契於理答然此真性遍於法界迷謂內外悟惟一心且大小由事者南嶽云若據心體平等之義望彼即大小之相本來非有不生不滅惟一真心止觀云今解無心無念無能行無能到不思議理理則勝事理既無念無到無大無小明矣荊溪云迷謂內外悟惟一心迷謂既外亦乃謂大謂小內心具性故非大小問昔人亦云譬如芥子能容須彌良由真性若離真性無於容理與今何別答與今不同他以大小體是理性故乃相容大小之事事終不融是故生身尊特事炳然問或云性德具大小性而此二性當處一體不可思議故大能容小小能容大但以性德宜寂難可了知故乃寄於事中大小相容之相以顯性德大小相容篤論相容是性非事故荊溪云若以理奇事如華嚴經譬如一塵中有大千經卷一念如微塵諸法如經卷芥子須彌取譬亦爾此説如何答與而言之得於義異失於體同奪而言之二義俱失由失法體義異不成今以體同而難其説且大師以三解脫釋經所住解脫是真性能住之智是實慧所起之用是方便若如他立者事中大小相入由於性中大小相容性中大小相容者正是性德方便解脫何故荊溪問云真性自與實慧和合何關外境而云大小相入由契於理答然此真性遍於法界迷謂內外悟惟一心且事中大小相容者自由三解脫中真性解脫若如他説應由性中方便解脫又復不應問云何關外境以此而知大小之體體本是事由得真性故大小相容無謂大小是理性也問雖然此文大小非性奈何文云以理寄事若云事融何云奇事答應知一念諸法微塵經卷若望真性悉皆是事但由彼指塵經為喻故一念諸法乃當於法然一妄念能具諸法者由得真性所以能具是故念法望於塵經乃名為理故寄喻事以辨法理況約即論奇方極圓旨也問若不許於大小相容是理性者止觀何云理則勝事荊溪何云制心從理無非心性答此由古師但約事相釋不思議今家乃約由證理故起此事用為不思議欲異古人惟事故今特以理言非謂無事云約證理又從理起用故云理則勝事所言制心從理無非心性者事相大小無非真性以無非故故大小相容衆生迷之但見內外大小相殊今既悟之見此大小內外皆是一心約對迷説故云心性其實心性即是內外若不即是何云無非又復若如他説無非心性之言須誘三種解脫方見性德有大小相容且此文者乃別指真性解脫為無非心性故知方便體是內外二此即下結成緣起二若以下心體無相二我今下夢覺長短二初論夢覺時節長短二沙門曰奇哉下牒示義旨二初牒示二以是下義旨二初正約凡夫夢覺辨喻義旨三初長短非實二若覺下情理有殊三初一向據惟不融二若覺下約心融事融三若以下一向據心無相三正以下正約心體示旨二初功歸一心為體故相攝二初正釋二若此下返顯二又雖下功歸心無增減故相攝二是故下通約凡聖辨法義旨二初諸佛證悟二初長短相攝二又復下演短令長然長短相攝與演短令長二義不同者由相攝之義雙存長短然後相攝相演之義或祇有短演之令長或祇有長促之令短又相攝者是相體俱即演短令長者乃相離體即七日為劫等文出淨名今文云緣起之法惟虗無實乃至云一劫之相隨心即成七日之相隨心即謝有謂緣起法體是常住者今何以云隨心即謝或曰如淨名云衆生謂之一劫今約衆生謂之為謝法體豈然今曰若謂約衆生為謝者今文云聖人善知緣起之法惟虗無實悉是心作隨心即謝豈非隨於聖人心謝然聖人無心以衆生為心而此之心既然在用故有成謝或不然者今問緣起之法惟是真實惟是虗妄若云真實何云惟虗何云依想以現虗相問圓聖起用不謀而應何云相耶答用之法體本屬乎事體之法體本屬乎性以即性而為用從性而言故曰不謀故曰無緣故曰不動從用而言故曰隨情故曰為物故曰分別今云相者成者謝者以聖人從用而言也淨名云衆生謂之一劫衆生謂之七日者以聖人從性而言也二若凡下凡夫在迷緣起法上妄執為實者須通二義一者見思惑性執像虗為形實故不融二者無明惑情執明虗為像實故不融若無後義則使等覺已還無染礙之情可斷五明治惑受報不同之義三初標章二問下辨釋三此明下結辨釋二初治惑與受報各辨三初辨治惑二重問答初問者以性難事次問者以事難性初答者直從事答以法界法爾事染之法為事淨之法所滅次答為四初總答二如上下指上三是故下正答二初所治二若修下能治二文各二初據性雙有二但下依熏用遍二文用字正從所起事用之用故此之用一有一無若其能起之性在修未修悉皆並具四是故下引證即淨名經也文二初引經二法者下釋義今文申釋乃約破事顯理故以病為事以法為性及下卷云病在執情非在大用乃是破情顯事故以病為情以法為用不獨南嶽通此二向祗如大師荊溪亦有二説如下當明然其病法有此不同者須善其意由能執之情雖一所執之法有二一者事法二者理法事法之體是粗理法之體是妙故荊溪言有心粗境粗心粗境妙從法體言事權之境為粗理實之境為妙且所執之事既粗能執之心亦粗既彼此是粗故知事法因情而得與情同體故俱名病遂指妙理號之為法此則法與能執情雖能所有異而妄體是同不可一存一亡從當體故俱名為病俱為所破即所依故俱名為法俱為所顯故義例問安心中云體其實不起滅妄謂起滅為當祇除妄謂猶存起滅為體妄謂令無起滅答此亦無別云無別者能執之情與所執事法皆是妄體存則俱存無則俱無故云無別此文事中情法不分人窂知之須善其意若單論理非起非性平等一性非事非理若約果德則性不妨起理不妨事若約衆生惟起迷性在事迷理若聖鑒凡即起祇是性事即是理今從反迷歸悟以説令離起歸性離事歸理正同今文除病不除法以理法不除事法除也見非起性若見於理理之名者名從對得理之體者體自性彰而此理性是平等性故非性非起非事非理上文乃於所執事法與能執之情不分俱名為起正同今文俱名為病二者以所執事法與能孰情分途而説有三不同一者能起之心為情所起貪瞋并其果報為法二者謬執之心為情所執之事為法如貪瞋之法本是過患謬執為德又如事法本是於權謬執為實三者以能不知之心為情以所不知之境為法如事本即理以不知即故名為情以所執事境為法然能起謬執不知三情之名名實互通但欲分別令相顯故各取一名以示其義然此三義以情為病以事為法但除其病不除其法者所不除法有二不同一者非謂事法不除由祗除情事法必泯如治病目空華自亡此則不用除法其法自離二者就情説離就法説即故祇除情不除其法如荊溪云所言但除其病者病謂執權為實法謂一切權法執權之病若除即此權法是實是故除病不除法也同今下文病在執情不在大用智者云譬如火是燒若觸燒痛謹慎不觸即是除病不可除火并荊溪云但破執病法何所除三道之法本三德故已上諸文悉是情離法即若惟論即情亦不離如荊溪云若聖鑒凡即起祇是性問據上所論事之情法有情法俱離情法俱即情離法即且情法既一何有此三答隨順悉檀各有義理情法俱離者為對治破計也由今不起九界之情乃離九界因果事法故云離起歸性并云約對治説破昔計情法俱即者約稱理實見也且一佛成道法界無非此佛之依正祇如地獄因果情執造業全是如來所證境界良以稱理實見此情此法無不即性故云即起祇是性并云若見法性即見法性淳是諸法苟非此意如何得云證道不斷情離法即者從近要轉迷也當知一切由心分別今但離情事法自即故云但開其心境無不轉問情法俱離必破九界與別何殊答約即論離而非定離故與別殊但約即論離之義義實難揀今祗以氷水顯之如指氷是水不須融氷此是即義乃相體俱即也指氷是水而融於氷此是約即論離之義故氷相須離水體則即乃相離體即也問或謂約即論離義不如是如氷是水有不知者謂氷非水今指氷是水此約即也不知心亡此論離也故知法體才即偏情自離此説如何今問不知之情成定離耶若非定離者且以喻明但氷即是水而為約即不知之心既然自離豈非定離若云定離者今問不知之情既是所離須指圓智乃為能離且圓中論離豈有定離應知圓中心無定離如淨名疏云善斷者名不斷斷不善斷者名為定斷又復問之事法即者由全性起是故法即且如其情為全性起性外起耶若性外起則性體不遍性具不周若全性起何故法即情定離耶或云雖全性起由彼不知今問祇此不知還是性不宜諍求之又問性既是粗若定離而不即者則不應云粗即妙也若云粗之法體即者法體屬妙此則返成妙即妙也如此談即却可思議何者由俱但見於指白是白而實未見指黑是白淨名疏云如蜂作蜜雖採衆華不以便利蜜終不成故知便利皆是蜜種而此喻文同今黑白智者詳之然謂情須離者乃宗於四明學者之説也今復以四明自敘平生所得而曉之四明曰不蕩情慮妙復性本惟智者之圓唱也吾日夕任用為機為杖日夕舉揚為襟為規四十餘年其志一矣豈非四明以情亦即為所得乎故今説者天然妙性或非破非顯或而破而顯或惟破惟顯其而破而顯者以事之情法俱即性故故而顯以事之情法從當體故故而破以此破外更無於性故惟破以此顯外更無於情故惟顯如此而破而顯惟破惟顯皆不決定者功由悉是平等一性本來非破非顯祇此非破非顯亦乃名從對得若體自性彰者破之與顯惟破惟顯非破非顯皆不得而思議也問向辨約即論離義理雖明奈何以喻有所不順且氷可即水其不知心合當須離如何見此不知之心而亦即耶答氷即水者氷與水體體同故即其不知氷即水之心與今知氷即水之心心體既同故不知心而即知心是以亦即從所知邊乃氷即水從能知邊不知即知此喻最須人自窂窮問上有三義而無法離情即者何答亦有此義由點能執之情即性其所執之法自亡然破顯之道是成佛之要門自南嶽授智者而來至荊溪後人師所見不同者由會諦理有殊故也今略評之一家雖談三諦以性德之俗絶無形相今評之曰凡説理性皆歸空中何者若言有俗奈無於相無形相處豈非空乎故知雖有俗名而無俗體一家雖談三諦以性德有相相不可亡今評之曰凡説理性皆歸俗事何者若言有空中者如何性得相不可亡相不亡處豈非俗乎故知雖有空名而無空體若以亡情為空者祇如俗諦亦乃亡情返顯性德祇有於空却成無俗若云就性自論性亦有空者且就性自論性亦有空為空何法耶若空性俗是則俗相可空若不可空是則但有空名而無空體然此一見却使法界法體畢竟無空祇由二家會理不同致説破顯亦乃有異初家破相歸空即是破事顯理次家破情歸法即是破情顯相從名説時謂事理俱顯篤論所歸既以法體事相不空乃成破情顯事然此二家豈不知山家談諦理者即一而三即三而一及持此道建立義門多從於三而為根本論破顯者豈不知法界體性非破非顯而破而顯及持此道建立義門多從而破而顯以為根本彼二家者自得之道非余所知余所知者天台所談三一圓融功由在一忝為訓徒凡立義門皆從此一而為根本然此之一非事非理而事而理惟事惟理以此一而空中故法界無相以此一而俗事故法界有相以此一而惟事故法界惟有相以此一而唯空中故法界惟無相是以非有相非無相為自相為無相為惟有相為惟無相皆不可得而思議也論破顯者以非破非顯而為根本故有非破非顯而破而顯惟破惟顯以此非破非顯而為破顯者不出二義一者自行顯體二者化他顯用且自行中以此非破非顯從能迷能悟則曰同異情智論破顯從所迷所悟則曰事理法體論破顯且法體破顯者二或二死事法是所破空中二理是所顯然此破顯約即論離約即則不破論離則為破如指非道即是佛道若論即時則非道之事不破若論離時則非道之事乃破既以一性非破非顯全體為此之事故破處即非破既以一性非破非顯全體為此之理故顯處即非顯於是還歸非破非顯故使而破而顯皆得名為不可思議以論破顯且同異破顯者異情是所破同智是所顯此之破顯亦約即論離約即則不破論離則為破如不知事即是理之迷情與能知事即是理之悟智若論即是情即是智則迷情不破若論離時則迷情乃破既以一性非破非顯全體為此之迷情故破處即非破以一性非破非顯全體為此之悟智故顯處即非顯於是還歸非破非顯故使而破而顯皆得名為不可思議以論破顯二者化他顯用亦二一約情智以著空不能知病識藥之迷心而為所破以不著空能知病識藥之悟智而為所顯二約法體以所執空寂之法為所破以界內外俗事為所顯而此破顯亦約即論離即乃不破離乃論破并非破非顯等例前可解然為易曉故先説自行顯體次説化他顯用其實體用破顯一心中具如是解者斯人難得如此破顯方得名為圓中破顯而今始解即事是理即情是智直至妙覺即方究竟以即究竟離乃盡原此即此離本惟一性是故終歸不即不離然此非破非顯直於而破而顯中會故使而破而顯惟破惟顯皆不思議例如一性直於空假中三會此之一故此三諦皆悉圓妙復顯此一乃非定一此一方圓問法體情智兩番為破顯耶答祇點法體事即是理不知之心任運即知問化他顯用情智何無同異答且示一端可以此顯故前自行但語不知之情不説能起謬執今此化他但説能起謬執不説不知若例作者不知空即俗之情為所破知空即俗之智為所顯事理上能起謬執之情為所破事理上能起解了之智為所顯問前論破顯惟有破三惑顯三諦而無亡照破顯者何答既云終歸非破非顯豈非而破而顯悉為所亡且而顯亡者即亡空假中之三也良由三惑無明三諦法性本無名字是故三惑破即非破三諦顯即非顯所以非破非顯者祇由惑諦其名本無故荊溪云猶如濕性本無二名假立二名以示迷者且無名之處不獨三惑之名亡也故三諦之名亦亡亡非破乎故今所立義凡圓頓中云亡者破者即體達也無聞亡破驚凝斷滅斯正所謂惟一實性無空假中問若以三千會此破顯其義如何答攝無不遍故而破而顯非破非顯惟破惟顯皆三千也如云若非三千攝則不遍趣無不極故趣於智理之三諦則三千為所顯如云三千果成咸稱常樂趣於情事之三惑則三千為所破如云三千在理同名無為成無不俗乃通二向一自行證體則為所破如云亡淨穢故以空以中二化他證用則為所顯如云化他三千赴物約一性全體為此三千故破處非破顯處非顯是故三千終歸是非破非顯之妙法也如指的妙境出自法華
