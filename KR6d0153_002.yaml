body:
  text: 東掖白蓮釋了然述二辨體狀二初分科示意約離相明淨心不一不異論法性二藏辨真如者然淨心法性真如實一體而異名今以此三分對三章者從名別故淨之為名離染義便故約離相明淨心也故前文釋淨心云無明染法本來與心相離法性之名乃於諸法而辨其性如向釋法性中有即有離即故不異離故不一故不一不異法性也真如辨二藏者依起信乃約真如明二藏故又二藏既云如來故順如字辨真如也須知三章不出體用淨心是體法性是用然淨心中應乃有用文云自性圓融體備大用然法性中應乃有體文云淨心之體常無生滅今但從文正途以說淨心為離一切法故獨明其體法性約即一切法故意明其用如文云上來雖明淨心離一切分別心及境界之相然此諸相復不異淨心何以故以此心體雖復平等而即本具染淨二用乃至云此等虗相無體惟是淨心故言不異又復離相淨心中雖云有用乃是性染性淨之用故皆屬體不異法性中既辨事染事淨之用遂偏屬用故此二章不出體用其第三二藏者釋成前義也空藏釋離相淨心不空釋不異法性雖此三文不出體用意則惟在辨於體狀斯亦可云文三義二意則惟一所論用者約用者辨體何者由不異之意意論此體不異用故乃見此用是即體之用故於用中亦云辨體若以今文會摩訶止觀者今文同體相中眼智所知見之境界也彼以三諦為境界今以三諦為體狀文雖在於開解義必貫於正修摩訶止觀正明觀法中先示十境輔行乃云又此十境即是前文所顯之體前約所顯能攝故立體名今對能觀所發故立境名又前從理說故體惟一今從事邊故境有十事即理故故一一境皆不思議理即事故故一一境相別不同然此文意以止觀所觀有所離所顯陰等十境乃所離也不思議境乃所顯也前來體相正是所顯點今所離即是所顯故云即是前文所顯之體且前文所顯之體即是下文正觀不思議境故云一一境皆不思議以此而知開解中體相即是正觀不思議境類今開解明體狀者豈非預示正觀所觀不思議境下文止觀體狀乃依此境明於能入止觀體狀能不離所即是今文所依體狀如此了者方可與云能所不二又今文中該於三境何者且離相明淨心即性德修德二境不異辨法性即化他境南嶽以體用分自他如云為自利利他故止為自以觀為他心體平等為止具違順二用為觀輔行亦以三境分自他乃云以三諦法不出修性自他故也既以修性二境為自化他為他今淨心是體屬自法性是用屬他故此二章義該修性二境者可進退取之一者直示心體是性德境離於四句是修德境下文有問答云得入者前離四句為修德體後問答者約能入之人辨意識解入也二者以問答之前為性境正以問答為修境且前為性者初直示性德之體次以四句顯性德體本來離計故皆屬性境若會同三千者今立四句顯發祖文一該攝無不遍乃成三千之通體也二歸趣無不極乃法法三千也三所成無不俗則三千惟在俗諦也四能詮無不圓由前三教法屬三千而不能詮且成三千者以淨心是體法性是用以體融用遂成三千故三境具足方是三千所以該攝而無不遍也趣無不極者乃在體為體三千在用為用三千也所成無不俗者則在體非三千在用是三千也今先示摩訶止觀中三義輔行云以三諦法不出修性自他故也且三千即三諦中性空自俗他是故三境具成三千此同攝無不遍也又於性德為理具三千於修為修具三千於化化為化用三千此乃趣無不極也智者云第一義一法不可得況三千法輔行云結前自行乃性德修德非三千也又云世諦尚具無量法況三千法輔行云生後化他乃化他境則有三千此乃所成無不俗也若今文中據下釋不空如來藏乃云若遍就分別妄執之事即一向不融若據心性緣起依持之用即可得相攝此是以理融事攝無不遍也又淨心中有體備大用此乃趣無不極也又淨心惟未明三千法性之用方論三千此乃成無不俗也問南嶽不云三千何以會同答祇此體狀章中藏體一異以釋實有而明圓融無礙法界法門并事用相用相攝豈有三千義理顯過於此何必名同方云義等俟至下文當略點之二解釋為三初舉離相以明體狀三初標二此心下釋二初法體三初直示心體不可思議四初云此心即是第一義諦真如心者示此心體也自性圓融體備大用者示心體之具德也但是自覺聖智所知非情量之能測者示心體不可思議也文云第一義諦者揀俗非勝故稱第一深極所以故稱為義審實不虗故稱曰諦然真俗二諦其名則通其義別四教三接共有七種今所云者即是圓教平等理性中實真諦也古人釋諦或以於境或以智教今以理釋收攝不遺如章安云今用理釋諦理當即境正境正即智教皆正故荊溪云諦即是理又諦之為名有從當體審實不虗如審實是空是假是中有從所依實審一體如空假中皆即一性所以稱諦諦乃非三三名非諦以三即性故曰三諦此約所依不從當體云云言真如心者揀僞異念稱真如心雖非僞異不離當念即真如也圓融者圓滿融通融而不圓通教也圓而不融別教也能圓能融圓教也又圓謂圓妙妙即融通故此圓融不通通別以此心體當體包含無有障礙故云自性圓融而此之體以圓融故不隔諸法能備大用又自性者法身圓融者般若大用者解脫三德一體即是淨心之體狀也但是自覺聖智所知者自覺聖之言出自楞伽即一切種智也由此心體真空冥寂若非此智無由能知非情量之能測者揀非四眼二智之能知也故圓心體非前三教心口思議問非情量能測者不可思耶不可議耶答情即是思量即是議如云量謂詮量詮即議也故情量之言對於思議又不別分對如涅槃云不可稱量不可思議問今云心體是自覺聖智所知章安釋大經云涅槃非名非相云何而言可得見聞不可見故無相不可聞故無名佛以佛眼佛耳尚不見聞況復下地及與凡夫而能見聞與今相違其義如何答克從法體不可見聞故非思議約教詮辨偏邪不詮故此法體非彼見聞圓教詮之故此法體惟佛能知言能知者乃知其不可思議也涅槃從體今文從教又涅槃中以圓為能絶偏為所絶不獨所絶之偏不得見聞能絶之圓亦絶故非見聞今以圓為能絶偏為所絶但取非所絶之偏而得思議故能絶之圓不妨能知同章安云當知絶名與無名為異又云論無無一切方便情量同非論絶絶能終所又云別教已下四門為所絶圓教為能絶今既絶能故圓亦絶乃同佛眼佛耳尚不見聞二故云下引證言語道斷故不可以名名心行處滅故不可以相相言語心行者言是一實亦通二假今對語字且屬一實語屬三假心是心王行是心所道斷所滅者道謂道路而能通故今路既斷言說何通所謂處所為所依故今處既滅心行無依心行無依乃非心所相言說不通乃非言所名非心所相是不可思非言所名是不可議祇因所無致其能泯故不可思議之言該能思能議所思所議皆不可也若以心行行字作平聲讀者亦無害前釋三何以下釋成心體離名相者德王云涅槃非名非相起信云離言說相離名字相離心緣相與今相字通局不同起信以言說名字心緣皆號為相此相則通涅槃以見者為相聞者為名故章安以佛眼佛耳釋於見聞此相乃別今文相者別取心緣法塵為相屬不可思體既離名心既絶相者文之互顯亦可心既離名體既絶相四是以下結意此法既然不可思議如何可論其體狀耶故云實亦難哉二惟可下約離相以顯不可思議上則直示心體乃屬性德若據性德之體不論顯與不顯無得而狀天然妙絶契悟之求是不可為但約衆生日用不知今欲示知令契此體才云示知令契此乃便屬修門是故約於所離四句以過顯德令契悟之故此離相顯不思議正同修德不思議境問性德一境不通修耶答法理圓轉義不一途然彼止觀若從文相以辨生起則性德一境體非迷悟而為迷悟而以迷故故非順修以而悟故了之為修才了為修即名修境修既離執為他四說即名化他此從記約文相生起立名而說惟是修德論修者也若約立章本意為言第七大竟正明觀法是故初來無非通修復從文相生起而有進不修性二境不通單修由以修照性全性為修是故二境共方為修化他一境不通初心約觀為修由離執竟為他四說是故初心不通觀修離執後心以說為修初後心義或約名觀或約真似今取有執無執而分切後上乃以性境為三諦修德為三觀化他為三語又此三境各通修相性德境者約破前後縱橫而為修相修德境者約破自他共離而為修相化他境者約於初心觀達四說而為修相故荊溪云前文雖以八相為喻別為破於心法前後故知性境約破縱橫而為修也又云雖有夢譬別為破於四句計性故知修境約破自他而為修也又云然雖破計說必隨宜從云何但說爾觀亦隨宜此文意含自他二義今且證他故知他境乃通說修并於觀修此約隨文各別修相若約總旨於此初乘荊溪科之凡有其至第七收攝諸法以入觀境故大師云說時如上次第及論修時皆居一心由此三境不出三諦三觀三智三語是諸三法即是行人一念心體妙具三千即空假中能如是修名曰正觀今文進不亦復如之問行者措心依何為的答解則遍達無殊行則隨宜不一文為二初標示惟可說所離之相至自契焉者標也所謂此心至平等寂滅者示也標中云所離者其離一切四句相也反相者由四句之相既離反顯此體非相也滅相者祇由此體非相是故諸相皆滅也須了離相而無所捨反相而無所背滅相而無所寂方是圓中離反滅相示中云平等寂滅者祇由從本離一切相是故此心平等寂滅何者良以今日相興在情情既分別故相高下以高下故不能平等既不平等何由寂滅又此標文令同法華乃以三相轉釋一相由彼經文先舉一相以一相圓妙故以三相而轉釋之然其三相即就平等中道一相立此三名約其所離以顯一相全同今文今約大師釋彼義以申解之反相者反生死相離相者無涅槃相滅相者無相亦無相又反分段變易一切葉縛故名反相能遠離迷惑無所著故名為離相滅於一切虗狀因果名為滅相示文中云離一切相者即同離相平等者同反相寂滅者同滅相反二邊著故云平等二非有下正示離相以向標示離一切相平等寂滅不知所離為何等相今正示之為二初別示相無相約色心去來今約時世上中下約根性彼此約方所或約己他靜亂深淨明暗約過德靜亂是結業解脫明暗是煩惱菩提深淨是生死涅槃斷常一異約執見今此心體乃非色心時世根性方所過德并執見等一切相也又可附前三相釋之是故諸句悉皆不出空有二邊以雙亦為第四句者別句次第全同起信彼云非有相非無相非非有相非非無相非有無俱相所云非有無俱相者即同今文非亦有亦無也有相者即生死相也今非有相乃非生死即前反相也無相者即涅槃相也今非無相非亦無相乃非涅槃即前離相也非非有相非非無相者非即無也既非此非乃無相亦無即前滅相也乃至非一非異例於有無一無異有明無暗有斷無常有淨無染有靜無亂有此無彼有皆作四句如云非彼非此非非彼非非此非亦彼非亦此或約彼此各成四句如以彼字成四句者應云非有彼非無彼非非彼非非無彼非亦有彼非亦無彼此字亦然其一異等例彼此作故云一切四句法也若於三世三根立四句者義應有三一者三字共論約有無立如云非有去來今非無去來今等二者三字對論就去來今而為句法如云非去非來非非去非非來非亦去非亦來或以來今對成四句如云非來非今等或以去今對成四句或以去來為一句以今為一句或以去為一句以來今為一句三者三字各論還約有無而為句法如於去字為四句者應云非有去非無去等三世既然三根亦爾二總說下總示對前別示乃有二義論於總別一前別約相與三世靜亂一異諸名目故今於其名而不別出但云非一切可說可念故名為總二者前來但離可說可念故名為別今乃亦離不可說念故名為總文為二初示所離二何以下釋二初正釋不可思議亦非淨心不可說念不思議今既非之故不思議亦為所離文云非自體法者以淨心自體無得名狀寂絶平等乃非偏圓以非偏故故非思議以非圓故非不可思議以不思議名從對得是故須離體自性彰是故須顯其所離者執名對偏失意故離非離法體二是故下揲示說念但屬虗相二初揲二但是下示二初虗相二初示然此虗相若約當體從情想生若約所依從淨心現由情迷於淨心是故發現虗相二然此下釋無明之體其體本空但有於相相既無體此相之有即是非有故非實相乃是虗相文云有即非有者非有之言有過有德非無明是有法性非有無明即性有即非有此約所顯為非有也若取無明當體既空無無明體故曰非有此約所離為非有也二非有下示非有二初示非有之相亦無可取者聞謂無明乃是非有即於非有單止其心今亦遣之故云亦無非有之義既有二向今無可取亦通此二一者不取法性真空二者不取無明體空分別雖二意趣乃一體空之處即是法性不分且作此說二何以下釋無明之有本是不有本既不有今則無滅既然無滅何有非有言非有者祇因其有以非其有故云非有若了本來不有更將何有可非既然無有可非任運則無非有有亡即性空非有亡即相空云云三是故下結釋心體不可思議由前顯示心體離相非思議法今結釋之二初法二初結二何以下釋二初約即義釋不可思議由此淨心即是諸法諸法之外無別淨心豈有能緣能說此心者耶故此淨心屬不思議今以此文為即義者據下文結真實性中四番止觀第二番云即復念言心外無法結云次一顯即僞是真息異執以辨寂既云即僞是真知屬即義明矣二是以下約離義釋不可思議淨心是實離於虗妄思議之法從虗妄生淨心既離是以體屬不可思議文為三初單約能緣能說能緣之心能說之言是妄有考實無體二能緣下以能例所恐其但謂能緣能說心口非實若其所緣法體必真今亦非之且其能緣既乃不實以能願所何是真良由所緣因能緣生若無能緣何有所緣問能緣是虗所緣自實可乎若云不可荊溪何云心粗境妙如有相心持法華經故但開其心耶答所緣中實克從法體是妙非粗但如開其心由能纍所故所緣雖妙同名不實如心境俱開今取由能纍所故所緣亦虗三能緣下結能緣所緣皆悉虗妄即思議也淨心既離虗妄故不思議法然今文中不獨離其能緣能說亦離所緣所說者正同摩訶止觀引楞伽云無增無減離言說妄想文字二趣智者釋云離言說妄想者不可思議也離文字者離假名也離二趣者離說所說想所想名所名也記云離言說者不可議也離妄相者不可思也離文字者離假名文字也凡能詮教無非假名約自證法有何文字言二趣者復疏釋前言說假名恐情妄計但離能說能名能思即以所說所思所名謂之真體故復疏云二趣俱離何者於自證中不見能所名離二趣問文既結釋不可思議何故祇云不以緣慮所知答向文既存今但略爾言由心發若亡於心其言亦無是故略云非緣慮所知若以有言必有心但亡於言其心亦泯亦可但云非言說所及又不思議惟可心知但非言說故大師云此不思議非青黃赤白方圓長短無名無相究竟寂滅惟當心知口不能說今問既不可思云何心知答以無妙心作不思知亦可例云以無妙辨作不言說惟當口說不可心知二譬如下喻二初喻即二初出喻若據眼不自見可喻淨心而無分別今約自眼之外有他人眼能見自眼乃有自他二眼不同故不可喻淨心一如二心不下反合反前眼喻由眼有二心祇是一故心不如是二又復下喻離三初約法承前起後又復淨心至取此心耶者承前即義如外無法也而諸凡惑分別淨心者起後離義而於心外建立諸法也即乃屬理悟之法體離乃屬事迷之法體由離無別離乃離於理故理亦名離即無別即乃即於事故事亦名即二即如下喻合文而略今預約法以合釋之即如癡人大張己眼者癡人即迷中衆生也己眼即迷中衆生亦有淨心也大張者若知己有己眼則不大張求覔為不知己眼故乃大張更覔己眼由不知淨心故以淨心更求淨心才用淨心求心此之淨心因不覺故即動為業也還覔己眼者雖然終日有於淨心乃不識之而却遍求故云還覓復謂種種相㒵為己家眼者因不識於本有淨心向外求之求之不已得偏邪理認為淨心如以種種相㒵為己家眼種種相㒵即轉現也竟不知自家眼處者中實之心即是第九真常淨識既認八識染相為淨是故不知己家眼處三是故下合是故應知有能緣所緣者合大張己眼為能緣還覓己眼種種相㒵為所緣也但是己家淨心為無始妄想所薰故不能自知己性者合癡人不知己眼故大張己眼覔也即妄生分別至淨心之相者合所見種種相貌也還以妄相者合復謂也取之以為淨心者合迷所見種種相㒵能見己家眼也考實至非淨心也者合竟不知自家眼處也二問下解入上來委示淨心法體有性有修皆是所知所行所證法今論解入者乃是能知能行能證之心即同下文依於意識修止觀也然此法理義有三種一者性德二者修德三者意識若就此三分能所者一者性德修德乃是能治意識一種乃是所治二者意識乃是能知能行能證性德修德乃是所知所行所證三者修為能觀性為所觀故此能所望於意識俱得為能俱得為所今取意識為能解入然此問答借起信文以明今義就文為二初問乃有三義即解行證初問淨心之體既不可分別者即不思議也一者性德不可分別乃約即義由一切法即是此心心外無法將誰分別二者修德不可分別乃約離義由離一切緣念故不可以緣念分別今問者初問此二義既不可分別云何能知解耶既不可知解第二即問云何能隨順而修耶既不可修第三即問云何能證入耶應以如諸衆生貫通上下貫上既不可分別貫下云何隨順而能得入二答者問既三義答亦有三初答知解上問不可分別乃含二種不可分別今答若知分別體是淨心者即此分別是無分別此答約即義了知上法體中性德法體而無分別也但以分別不息說為背理者乃由分別異無分別是故分別背淨心理此答約離義了知上法體中修德法體離於一切四句分別也若知二字通冠下文若知一切妄念分別體是淨心者知性境也若知但以分別不息說為背理者知修境也作此知已一句結上生下則總答上文既不可分別也上文雖無知解之言以答顯之故知上問不可分別問知解也二答隨順當觀一切諸法至故名隨順者上問隨順正問於修今答依解起行即是隨順而修故云當觀久久修習一句結上生下結上隨順生下得入因修習故是以得入三答得入若離分別名得入者離分別者斷無明也約即論斷是故云離即是離相體證真如者結得入為證也若以問答為修境者上文有從本之言離於四句即性德也今文問答有若知之言離於分別即修德也問知之一字屬修觀耶答或知即是觀如荊溪云知者照也今文知字且在解知由下文云作此知已方云當觀若以今文意求於起信則彼文似略問藏師以知一切法是名隨順為方便觀今何以知與觀為殊答今釋論文不同彼疏不可執彼而難今也然復須了解即是觀但約位次分解行爾問今云隨順乃在行修還可隨順屬解知不答或可隨順即是解知如下文云作此解者名為隨順真如故隨順之名通解通修亦可通證良由解順修順證順故也三此明下結二明不一不異以辨體狀三初標二上來下釋二初釋不異二初揲示上來至之相者揲前文也然此諸相復不異淨心者示不異也二何以下正釋二初性用欲明事用與心不異是故先出性具染淨令知事用即本而為既即本為故其事用與體不異二復以下正約事用以辨不異復以無始無明妄想薰習力故者明能重也心體染用依熏顯現者明其所薰現為事用也由所薰性本具於染故薰可現此等虗相無體者無明無體也惟是淨心者既依淨心作無明故無明以淨心為體也既以淨心為體故一切虗相與淨心不異問向來據下文用為化他義是故指今文同於化他境下文是淨用斯可屬化他今文是染用正乃屬迷生豈同於離執然後起四說答一者約能所迷染是所化淨用是能化今以所顯能故乃義無別二者約法體由染用當體自行雖曰離化他復取用且如四句法意識攀緣生雖自行已離為他故復說自他雖有殊法體乃無異問向論於性用雙具于染淨及論現事用何故祇說染答一由今文中為辨不異義若其淨用起即順於心性不異義易知恐謂染用起與性乃不一是故將辨之二以事染淨二用俱染攝因染有淨故所以俱名染又以佛望生依無明染心為修淨之本故乃並名染如文句事權起淨不淨業記中獨指為立一切染法二又復下釋不一二初標示二何以下正釋二初性用然性用之說或說平等或說差別向文性用意示差別故先舉平等後云二用今文性用意示平等故先舉二用後云平等意示差別者欲成與事不異義故意示平等者欲成與事不一義故三此明下結第三明二種如來藏者起信云一者如實空義以能究竟顯實故二如實不空義以有自體具足無漏性功德故南嶽依此二文而說今旨然此二藏自昔說者皆約情法以分二義所謂情空法不空也但於情法所見不同其說有二一家云情是事相法是理性空如來藏一相不存不空藏者具足性德據起信云淨法滿足則名不空亦無有相一家云夫言相者有情有法其所空者乃空情相其不空者不空法相起信云無有相者無情相也今評初家不空性德況南嶽云藏體平等實無差別即是如來空如來藏此文豈非性德染淨泯處為空然何以知由物不空可顯此義故不空藏云然體復有不可思議用故具足一切法性有其差別即是不空如來藏此蓋無差別之差別也以此而知存性德為不空亡性德為空明矣今評次家空於情相況南嶽云二衆生始終乃具染淨二事何以故以一衆生受地獄身時無餘趣報受天報時亦無餘趣報此文豈非情相不空然何以知由約彼談法相顯之彼謂法體世間相常於一念中頓足十界今相生滅豈非情乎南嶽既指始終方具名為不空故知不空藏者亦不空於情相明矣今所立者應知心體非空不空論空不空乃約染淨二用以說若以心體立此染淨故召心體名之為空若亡於染淨亡之與立故此心體非空不空故今文辨空如來藏云心體平等以泯染淨二用心性既寂是故心體空淨以是因緣名此心體為空如來藏非謂空無心體此文意謂心體非空以空染淨故召心體而名為空辨不空藏云心體具此德故名為不空不就有心體義明不空此文意謂心體非不空以具染淨故召心體而為不空然後結云以心體平等非空非不空今謂既知此已方可示於約染淨用辨空不空染淨二用有性有事若辨二藏義應有三一者能執情空所執二用法體不空義同次家二者性用不空事用乃空義同初家三者情之與法性用事用有則俱有名為不空亡則俱亡號之為空此加今義問今文與起信殊耶答隨順悉檀義雖有異篤論法體意實無別以起信中為對治故空過存德如論明云聞修多羅說世間諸法畢竟體空涅槃真如之法亦畢竟空以不知此語為破著故即謂真如涅槃之性惟是其空云何對治明真如法身自體不空具足無漏性功德故又云聞修多羅說一切世間生死染法依如來藏而有以不解故謂如來藏自體具有一切世間生死等法云何對治以如來藏從本以來惟有過恆沙等功德以過恆沙等煩惱染法未曾與如來藏相應今出其意一者性德本具染淨為對治故不立染名惟彰淨號此由衆生聞性有染即謂性體實是於染畏不羡故二者性德本具修淨為對治故不立修名惟彰性號此由衆生未曾起修示彼所有特立性名意使全性而為修故三者性體亦非淨為對治故不云本淨空此由衆生聞性本空不知此語乃謂性體執此說空於性用是故惟明性德不空破彼著故論因對治故此偏名今約本然遂成全說良以法界全體全用空則凡有名字皆亡立則凡有情貌悉備即亡即立即立即亡不可思議此則隨順悉檀所說有異若篤論法體意實無別者論亦有不空染法之說故因重習鏡云謂如實不空一切世間境界悉於中現亦有空於性德之義故論問云上說真如其體平等離一切相云何復說體有如是種種功德答曰雖實有此諸功德義而無差別之相等同一味惟一真如此義云何以無分別離分別相是故無二復以何義得說差別以依業識生滅相示諸究此文性功德者因無明有若無無明何云性德苟謂不然如何解會性本無名應知才云具足衆名即是性用對衆生有故知性體德名亦泯或曰但泯差別何泯性德答既泯差別如何召云是常是樂是我是淨荊溪云佛性是一而有常等四德差別今謂若泯差別四德之名其亦何有釋文為二初標二釋二初空如來藏三初標二何故下釋二初心體妙絶無相空即性用空也由性染淨約用即存從體即泯故此心體非染非淨既非染淨性用乃空文云建立生死涅槃違順等法者能起是性用所起是事用今文意者在能起空故云而復心體平等妙絶染淨之相心體者一平等性也絶染淨相者無能起性用之相也問起者即全體而起今無能起應空無心體耶答心體才起即屬於用今文乃就能起邊論由能起用故名能起為性用也今所空者空其起用非空心體問恐今文云空染淨相者是空修相非空性用答若以今文空於修相又與下文所起染淨等法性自非有空義何殊下文既云所起驗知上文乃語能起問性是無相云何謂相答斯則正是無相之相何者起信論中以性功德謂之相大豈非指於性用為相然無相之相乃有二義一者全無相為可見之相二者祇指無相為相起信云則有過恆沙等諸淨功德相義示現者指無相為相也今文云染淨相者相之一字正是性用由空性用故云妙絶染淨之相亦可用之法體體本是相故指性用亦名為相二非直下正示緣起非有空即事用空也文為四初法非直心體自性平等者良以體既空能起染淨用相故云平等若論能起染淨二用即是平等之高下今既空用高下遂平此結上也所起染淨等法亦復性自非有者正示所起事用空義若據事用應云相亦非有今云性者性即是相然性即是相義應有三一者理性即是事相二者理性是無相之相三者習性望於理性故習性即相今是習性故云性自非有亦可非有法體體本是性若非理性何得非有故指事用空處云性自非有二如以下喻二初喻二心亦下合心亦如是總合也但以染淨二業者舉法也幻力者帶喻也所熏者乃染淨業熏合幻之力也似染似淨二法現者合免現也若以心望至法即非有者合所現之免以巾望之有即非有也三是故下引證三初引三經生死染也涅槃淨也二俱不可得乃證染淨二用俱空覺即淨也所覺染也二此等下釋經旨三以是下結恐人謂空空無心體且真如體既叵名狀如何可有如何可空問既云非謂空無心體豈非心體是不空耶答雙非之言須了二義一者非空是有非不空是空二者非空不是有非不空不是空今此心體非空不空正當次義故今文云非謂空無心體者即心體非空也下文云不就有心體義明不空者即心體非不空也篤論其藏謂空不空者乃從心體具用說爾四問下料揀乃料揀事用也文為二初料揀有即非有三初重問答約諸佛與衆生釋有即非有疑初問諸佛等者諸佛證體體乃平等空於染淨故染淨用其用常寂衆生未證但在於事事既不空如何非有二答真智等者以佛顯生也今問真智真照合當常寂何云尚有耶衆生迷暗合見六道是有何云何得耶若據其義應云衆生妄見合當是有尚乃有即非有況諸佛真智真照何得不用而常寂斯為便耳答若取隨心所知有無則凡夫謂有不可非有諸佛知無故可常寂此則正同今文問意今取隨人所見明暗諸佛見尚乃非有衆生暗見豈不非有又佛真智體是常住此智照用合當常住而用不住尚乃當寂豈況衆生皆昏暗妄見體見無常所見之用合當非有故云何得不有有即非有第二問答約有迷妄釋有即非有疑初問既言其有者其字恐誤應云既言非有由向妄見有即非有既是非有何故得有此迷妄耶問其意者有即非有是所見法其迷妄者是能見情所見之法若是於有可得有於能見之迷所見之法既然非有如何得有能見之迷亦可有之一字即是有其非有二答二初正答乃以所見例答能迷既得非有而妄見有者此是所見何為不得無迷而橫起迷者乃是能迷二空華下指喻眼翳喻能迷妄心空華喻所見妄有所見之有即是非有華即無也能迷之妄亦即無妄翳即無也眼之與空皆喻淨心翳病喻依淨心非迷而迷也華相喻依淨心非有而有也華相既得非有而有而翳病何為不得非迷而迷云宜陳者直作此陳也第三問答約餘染法與無明染因釋有即非有疑二初問諸餘染法與染因者起信六染別以根本無明為因故云一切染因名為無明今文通以杖本無明皆為染因故中中云子果無明意問染法因無明起何云非有無明是因何得非有二答二初正答前問三初法子果至以淨心為體者此約二惑同體以說但由熏習因緣故有迷用者熏有各共各熏又二一者子果互熏復成子果無明迷用二者子果別熏以子熏子以果熏果皆以前念熏起後念若共熏者即以似識無明妄想妄境和合共熏或成妄想或成境界或成無明前釋佛性中約成妄境今成迷用二如似下喻粟麥本無自體者喻無明本無自體也惟以微塵為體者微塵喻淨心但以種子因緣者喻熏習也有粟麥之用者喻故有迷用也以塵往收者喻以心往攝也用即非有者喻無明迷用非有也惟是微塵者喻惟是一心也三無明下合但總合耳二問下再難淨心二初問此問意者由上答云無明本無自體惟以淨心為體又云但由熏習因緣故有迷用且無明既因熏習而起應指熏習之法作無明體何得前云淨心為體當知隨名辨體後念無明以前念能熏無明為體克實論體故無明無體全以淨心而為其體今以隨名而難克實答文四初法然前念雖滅後念已生如是生滅未曾間斷此未間斷有二不同一約一人二約通體約一人者在迷則生滅不斷在悟則終有斷時約通體者生滅法體於法界中常生常滅無有斷絶以無斷絶故故常有衆生問若以無明熏起無明最初念起有無明約何為熏而起不覺答例同佛界初無師教乃初真如內熏而起今約性染內熏而起問若依此義則先有性染後有事染二染殊耶答約染未現號為性染及性現時即為事染說雖前後旨在一時又復須知乍可云悟佛有未悟之時不可云迷生有未迷之日二如似下喻三過去下合二初正合過去無明至明如是者總合也但能熏起後念無明者合麥子生果也不得自體不滅者合體自爛壞也即作後念無明者合豈得春麥為秋果也若得爾至非念念滅合劫初麥今仍應在也二既非下借喻恬合乃借燈喻帖合麥喻既非常故再舉前義也即如燈焰前後相因而起合前麥子為後果麥前子爛故無常也後果得起即相因也喻如燈焰隨炷起滅體惟淨心者結合歸法四是故下指歸二料揀無明與妄識一異二初問無明即染因妄想即染法染法雖通今以惑業法理相類故別問之為一為異二答二初總答二何以下別答二初正答二初子時無明與業識論一異二初答二初答不異文有三義一者由起故不異乃一向而論但取業識由無明不取無明由業識此由不覺而有動也二者有無故不異乃更互而論若有無明則有業識若無無明則無業識若有業識則有無明若無業識則無無明前約獨頭今約相應三者同時故不異以業與無明同時而起問何不以由起與有無共作一義答據文有又復之言故知義別次又不下辨不一文有二義一者相異無明是迷相業是變相故云不覺自是迷暗動者自是變異二因異無明自因無明而起妄想自因識想而起故云以彼果時無明為因以彼妄想為因即自種因也然此同異義亦難見今以一喻明之如蠟燭光焰若論同者由蠟燭故有光𦦨若無燭即無光𦦨又復光焰與蠟燭和合俱起此喻不異也蠟燭色黃光𦦨色紅燭因蠟成𦦨因火起此喻不一也二此是下結二果時下果時無明與妄想論一異例上子時可解然有無論同中前云更互者正據今文若無無明即無妄想若無妄想亦無無明二以是下結判初約體用無明是體識想是用者一由識想依無明起故二由識想是動義故二二種下約因果二初正示因果但約能所分因果也如子無明生果無明即以子為因以果為果若果生子即以果為因以子為果妄想業識例無明說二若子下就因法辨二緣初因緣二增上緣然因緣之義經論異出今略明之成論三因四緣三因者一生因若法生時能為其因如業為報因二習因如習貪欲貪欲增長為因三依因如心心數法依色香等為因四緣者因緣次第緣緣緣增上緣大論六因四緣一所作因不礙於他名所作因由之是能作彼是所作若礙於他則無所作於所作成因曰所作因二相應因心心數法同相同緣必共相應故名相應因如親友知識和合成事三共因一切有為各共生因以共生故各相佐助如兄弟同生互相成濟前相應者是能造心以心心所相應為因今因者於所造法各共為因如以斧鑿共成於柱四自種因過去善法與現在善為因現在善法與未來為因惡無記法亦復如是以由各各有自種故五遍因若集諦下十一遍使名為遍因由苦諦下五見及疑并一無明共七種使集下有四謂邪見見取無明及疑共為十一此十一使遍為一切染法作因於十使中不語貪瞋慢者由取七使是親迷惑貪等三使是重迷惑六報因行於善惡得善惡報俱舍六因頌曰能作同所作及俱有同共同類同自種與相應同相應遍行同遍并異熟報同許因惟六種大論四緣者一因緣於六因中除相應因為次第緣其餘五因名因緣今文以惑業各自更互為因名因緣者於五因中取自種因為因緣也成論謂具三因為因緣二次第緣亦名無間緣以心心數法次第無間相續而起以因言之即相應因也成論同此三者緣緣心心數法託緣生故名為緣緣由心心數已是於緣復託緣生故名緣緣成論云識生眼識為緣緣四增上緣諸法生時不生障礙成論云離前三緣所生諸法名增上緣今文以無明起識想為增上緣者正同除三緣外所生諸法名增上緣亦是大論諸法生時不生障礙以無明不礙業識故無明令業識得起是以無明乃為業識增上緣也輔行云夫因緣之義佛法根本背邪向正之始入道修觀之原習佛說者不可全迷二次明下不空如來藏二初標章二初明下解釋文自為二初明具染淨二法明不空二初釋二初淨法二初分科以具性功德與出障淨德辨不空者則知辨空空性功德與出障淨德也二第一下正釋文自為二初具性功德法三初標二即此下釋三初示平等一味體無差別者舉性體也而復具有過恆沙數無漏功德法者舉性用也由性體非淨故無差性用而淨故差別性用差別乃有二義一者對他以淨對染故淨成差二者自法淨法不一故淨成差今文乃是自法差別故云沙數以沙比數言甚多也若非差別如何有數或云此是無數之數今問無數之數為是數耶是無數耶若云是數豈非差別若云無數何不祇云無數又何須云之數應知今文與上空藏文相有旨何者上空藏中為空性用先舉差別後舉無差文云雖復緣起建立生死涅槃違順等法此則先舉性用差別然復空之故後舉無差乃云而復心體平等妙絶染淨之相今文先舉無差後舉差別意在立之而成不空以此而知約亡性淨為空立性淨為不空明矣二所謂下釋由上示云性具功德不知性具為何德耶是故釋云所謂自性者舉性體也有大智光明等者舉性用也當知此德對過而得故起信云乃至具有過恆沙等妄染之義對此義故心性無動則有過恆沙等諸淨功德相義示現既然對過而得故乃可立可空有過則德生無過則德泯德泯之處故淨心之體乃是非淨問云有過則德泯無過則德生可乎答可此正約對衆生而言乃用中之語也向云無過則德泯者乃順體而言也皆方便爾問如來無過應泯此德答自雖無過為他在迷若不語德何能轉凡以法界中常亡常照莫聞泯寂便謂斷無問既非斷無信知常在答莫聞常在便謂不空一性本圓何容定執問但亡情執德何可亡答德不亡者即其執也問德若亡者乃非執耶答但云德亡亦其執也問何者非執答亡即不亡不亡即亡不可言思圓融微妙若聞此說即謂圓融者亦是鬪影大師敘南嶽偈云狗見影便鬪鬪之不肯罷遂至渴而死況起信云復次究竟離妄執者當知染法淨法皆悉相待無有自相可說是故一切法從本已來非色非心非智非識非有非無畢竟不可說相以此而知心體妙絶不可說云染性淨性才作此說便是妄生分別皆屬差別法門若能竅究心源真謂不可思議或曰豈非不解論意同於他宗惟談淳淨一真如耶答既云不可言說豈容擬議一多及非一多然如此論者乃論心體及論其用故此之體無所不有非但是一亦乃為多非但有相亦乃具情又復無所不空可謂卷之線毫不存舒之充滿法界皆即心體來去叵思指論并結如文二第二下明具足出障淨法二初標二即此下釋二初正釋二初約義解釋二初示義若非淨心本有能具淨德之性則不能攝修中淨業熏習之力復何能依熏力現德二此義下釋相二初般若淨德以因地修習般若熏起具智之性故使智相發現成自報如來果德三智二復以下解脫淨德以因地修習五度熏起具福之性故使福相發現即成報應果德相好二然此下約名結釋二初結心體非有由具德相乃名為有故云不就心體明不空也二何以下釋心體非空不空二問下料揀二初問者由前示於出障淨德凡有三義一者淨性是所熏二者淨業是能熏三者淨德是所現其所現者從淨性現若爾淨德可是從性而起且能熏淨業還從何起二答二初正答能熏皆是一心三初標示由一切法皆從性起良由性德本具故起二此義下釋相約於教解行果四法以釋其義教之一種是能化之人說教解行果三是所票之人修證若能若所皆是能熏淨業之法而此之法不離一性天然本具生佛雖殊性恆平等故師所說教亦我自心之所發現解行果三從自心起在文可見三以此下結二以是下示所熏本來能具因果淨德之性三初法三初本具無虧云本具解行果德之性者以所召能故云解行果德之性其所具者即是修中解行果法為性所具以此所具召能具性故能具一性從所具故云是解性行性果性其所具解行果三相既未現故從能具之性為名是以乃云本具解行果德之性二但未下未熏不現三若本下約無返示欲示本有乃約於無返顯示之二如似下喻三初喻本具無虧器朴喻解成器喻果行始為因行終為果設此二喻又行別在因惟喻器朴二但未下喻未熏不現問所現之相為次第現為復頓現答從情則漸從性則頓又總約生佛以辨十界故一時俱現別約一人以辨十界故次第漸現三若金下喻約無反示二初喻二初正約喻二如似下復引他喻例顯實無然在喻從物則各各有殊約法從性則物物無別亦可壓沙作油鑽水覔火蓋由性融是以物等二是故下引證今問法華以前二乘修道不得成佛應無佛性答若其本具佛性可如來難既然本具具十性以具二乘因果性故故法華前熏發而證以具佛界因果性故故法華中熏發而證問二乘在昔全性為修耶答實全性起但彼不知謂從外證問由具二乘性方成二乘果彼修說知性而不妨證果由具佛界性方成佛界果亦通不知性而成佛界不答二乘不名佛性是不學體以順性不覺是以不知性故得成二乘佛既名為覺性是覺知體以順性覺故是以須了性方得成佛道三以是下結初正結所熏二依此下結得名不空二次明下染法二初分科二初明下解釋文自為二初具染性三初標二此心下釋三初正釋云能生能作者生是自然作是稱造故以五陰實法為生衆生假名為作由實法稟於報果不可改故假名出自前人義當造作自然者不改稱造者可更皆謂生死者如阿含是老死誰老死問若據生法二境假名者生空境也今何以生謂之實法答今取所詮實法為生不同能詮之名為生又生可同造今取不同二是故下引證果報是實法衆生是假名知生作對此二義然此文意本談性具一切染法釋義引證皆云能生斯乃正是以生顯具性若不具其何有生然以生顯具先賢所見釋亦有殊今所伸者不出二義一顯所具乃以心生即是性具足故得云以生顯具斯非此顯乃是即顯二顯能具復有二義一以能生以顯能具斯亦即顯而非此顯二以所生以顯能具如何得知性能具十乃以所生顯性能具斯乃此顯而非即顯若了修是性亦成即顯今文正當乃以能生而顯能具三問答凡八重初重二初問然性之為義通本有不改觀其問意乃問本有本有染者染即是凡既然本有如何轉凡以下答求知約本有義為問也二答心體等者意謂本有若惟有染故無淨可成是故不可論於轉凡且其本有既有二性不單有染亦乃有淨由有淨故是以得論轉凡成聖問若約性是不改之義可論轉凡不若云可者則與義違縱使復有淨性但可各各不改答性雖不改其染可轉祇由染體本屬於修約染即性故染不改以性從染性亦須轉良由本具可轉之性是故得有以聖轉凡若謂不然此轉凡義性不具耶祇此妙旨自昔牢窮第二重問答二初問者以事中一人別造問於性中通具二答三初正答二初示二初各示二初示染淨二性若就事中舉一衆生自無始來修染修染約於種子亦可得云染淨並有則體異為並今取能具之性性既是一約體具用以用從體故乃並具所謂並者非如二事祇一體中全體是染全體是淨染淨名殊其體常一故云雙有是以答云一味平等古今不壞二但以下示凡聖二用性雖並有熏則差殊起凡惟凡起聖惟聖故有前後二然此下共示一者向約惟事各說今約性事共明二者向二用中生惟染性佛惟淨性今欲示於生亦有淨佛亦有染方見生佛二性共有今於凡聖各舉一邊性實並有因對事用故各舉一依熏作生死者無修善也能有淨性者有性善也依熏作涅槃者無修惡也能有染性者有性惡也觀音玄文宗此之說二結釋二初結二性並有兩用不俱二初以是下二性並有二但下兩用不依俱二是以下釋用有改轉性無成壞既明二用不俱是以有其改轉義當追釋轉凡成聖用雖改轉性則不壞義當釋向古今不壞文為二初用有改轉乃約事用故有改轉由事法體是無常故事中染業雖息而性染常在不滅事中淨業雖起而性淨本有不動故染淨二事而有改轉其染淨二性則無成壞故次科云然其二性實無成壞無成者性淨也無壞者性染也問染淨二性節節皆云而無成壞何故空藏亦空二性答文各有義不可一途由染淨二性通常無常例如染淨二事或一時具有或前後方足若執一文亦可為難今文皆云先後不俱何故下文一時頓具以此而知各從文義不可執一以礙通方問二事可云約一人論故先後方具約凡聖總說故一時頓足未審二性約何義故通常無常答染淨從性故性染淨其乃是常從染淨染淨二性故亦無常二是故下結問染淨並具然染淨之性何得雙有凡聖不俱答凡聖之用不得並起三是以下引證二初證二性經語淨法煩惱不見增減今釋之曰即是本具而無生滅二然依下證二用經語清淨般若轉勝現前煩惱妄想盡在於此今文釋曰即是淨熏染息轉凡成聖第三重二初問以染業本有淨業為本無者久迷為本約事云爾二答諸佛真如用義者真如是諸佛之境衆生內心本自有之以能內熏故名為用又諸佛既證真如即能起用乃為外熏又諸佛師教外用衆生真如內用以此內外熏故淨業得起故云諸佛真如用義第四重二初問以性難修意難修二皆從性起性既是同修亦無別如何修淨却除修染今應預知修性染淨相除之義亦不一途一者修中自辨有二一背真為妄乃以修染而除修淨此取不起淨行之處名之為除如云闡提斷修善盡二反妄歸真乃以修淨而除修染雖皆是修染逆淨順正如今文違有滅離順有相資二者修性對辨修中染淨皆除性德染淨不泯修雖曰淨對染而為病去藥亡故二修俱泯三者就性自辨性中染淨亦除染淨二名本從修得體非思議名亦何存故云若廢二性之能惟論心體是非染非淨四者修性相顯性之染淨名從修得既亦可除修之染淨體即性為故亦不泯即同今文以事染淨號藏不空若非如實豈有存理得上四義諸文破顯亦粗可明二答三初定體染之法體是違淨之法體是順二違有下約義正答心性之理是常是即染法之體與此性違違則背性成迷迷不知性使常住之理斷滅背不向性使常即之理遠離義不合理故為淨除又違染當體無常故滅不即故離體若常即如何可除性之當體是常是即修淨順性能以常即除彼滅離三法界下結法理違順相除非修者作天然妙體具如此事不足為疑第五重二初問問文甚廣今先辨違順之義然後出其問意今文專以修之染淨為能違能順染淨二性為所違所順然此違順有約生起論有約法體辨若約生起者修染能順染性而起既乃不從淨性而起故與淨性為違乃與染性為順修淨例說若約法體者修染之體是違雖從染性而起而常違於染性不獨違於染性亦乃違於淨性修淨例說今問意者乃約生起以難法體文為二初約違順定義三初通示染淨二業相順二乃可下約染業違淨性正約生起為違三染業下明染業順染性正約生起為順二若相下約違正難五初難云若相順者即不可滅者問家不解法體違順祇就生起違順而解蓋殊不知生起雖相順奈法體是違今可滅者乃取體違二若染下揲釋難恐作此釋難故乃揲之為例難之本三亦應下例難四若二下再揲釋難恐再釋云染之與淨各有違義由淨違於染染違於淨既各有違是故各有滅離之義良由違即滅離故也雖然各有違滅之義而不妨存淨除染者然既各有滅離如何存淨除染作此釋難似無其理今恐欲盡通方例釋乃令義盡意窮使乎再難不可通故故有此說爾五亦應下再例難既二皆滅離得存淨除染例須二皆相資得存染廢淨或云既二相資如何存染廢淨復可例難既二滅離如何存淨除染二答二初總行不解法體違順也二我言下示今正義三初示二本由違順二法以二性為本二若偏下示心體由染淨二性性體祇一三但順下示違順正約法體而辨違順以答前難第六重問答為二初問者以末難本也染事既可除染性何不除染性若不除則本末不同二答者約染即性也由性祗是一淨性既不除染性豈應滅是故云理用故與順一味問畢竟事染與性染何殊答體同義異以體同故祗一染事以義異故修染已現乃是定有從於當體屬可思議其性染者不可定有不可定無從於所依屬不思議故與修染其義則異遂名性染謂之法門以義異故修染可斷性染不斷欲明此說復須曉了性染之義不出二種一者以所具染召能具性名為性染二者以能具性召所具染亦名性染云不斷者亦通此二一者性雖具染染事未現是故惟論能具之性以由此性能具於染故名性染指此性染是不可斷此約不可定有故不可斷二者雖云未現染事實具蓋由此性即是事是故事為性所具事既即性性所具染乃不可斷此約不可定無故不可斷修染異此是故可斷初義異者以由修染是已現事事故可斷次義異者以由修染不即性故是故可斷若取體同性染亦斷修染不斷問前空藏中空性染淨為約與事體同故空義異故空若云義異今既不斷彼合不空若云體同空性染淨即是空事何故再說事染淨空答由體同故故性染淨是以可空但體同之義應細分別由染淨之義有能詮之名目有所詮之相質能詮名者即染淨二名也所詮相者即六道四聖之相也能起性用但有染淨二名所起事用非但有名亦乃有於染淨二相空性用者亡其名也空事用者非但亡名亦乃泯相能詮之名雖同於事以所詮之相未論空故是故空性用後再空事用第七重二初問猶執生起違順之義故成仍不解也意謂染用既順染性而起如何謂之違心二答復約知不知義以論違順而曉答之不知名違知即名順文為三初法二初示染法一不知修從性而起不知自己者不知自己修染也及諸境界者不知生佛染淨諸法也二不知性性體是一故云亦不知淨心等二智慧下示淨心反染可見問法體違順與知不知違順何別答體同義異不知者即無明染之體也知即智明淨之體也但由知不知者約能迷能知之心其法體者直約染淨法體以辨故成義異何者法體違順直指染法體是於違淨法體是於順若以法體從於能迷能知在不知心染淨皆名為違在於知心染淨皆名為順故與法體義殊然此義理深遠幽隱若不精別則於文有礙豫掌辨於開權顯實有約法體有約同異義類於此何者約法體者權之法體是異是粗實之法體是同是妙權體異者一約當體是差別故二約所依不即實故實體同者一約當體是無差故二約所依能即權故若直從法體則開權顯實若以法體從能迷能知之心權實法體在於迷心皆名為異故有異體權實在於知心皆名為同故有同體權實若取體同不知之心體即是權了知之心體即是實但以義異故有法體論開乃曰開權顯實有同異論開乃曰開異體權實顯同體權實此之二開皆是開粗無非約即法體論粗則權粗實妙同異論粗則異體權實為粗同體權實為妙法體論即即異是同問開同體髫與實相明珠於二開中為屬何耶答乃通二開由廣開中先敘權者乃重敘所施科雖謂之開權此則以施為開非同開權是實之開權也開權是實之開權者皆在顯實一科中明其解髻示珠荊溪指云顯實即此意也所云通二開者祇一點權即實便該二義從權實說乃是約於法體論開以由開權即是實故從即是說乃當約於同異論開權既即實任運開於權不即實故解髫示珠文通二義同體之言即同異義也權實二字即法體義也可以意求乃至蓮華之喻亦復如是蓮華二字法體義也華即是蓮即是故同異義也蓮華俱妙者同異義也華粗蓮妙者法體義也故大師云昔權隱實如華含蓮開權顯實如華開蓮現離此華已無別更蓮離此粗已無別更妙故又云為十妙故開出十粗如為蓮故華又華開蓮現譬開十粗以顯十妙若無法體一義以蓮華為粗其文何通問立此二開何據答文句化城喻文云云然此大義就今叵窮偏因與類略談綱骨讀者無誚孤起開涉二如似下父生喻從心而起文意喻二性一味三衆生下合第八重二初問熏習之義必須性同既然相違如何熏起二答二初法今宗圓旨即具論熏是故無明無別有體全是淨心由全是故故得相熏由恐相違之義未明是故約喻再辨二如木下喻二初正喻二後復下遮難恐謂火不燒爐故遮此難云耳三此明下結二次明下明具足染事二初標二即彼下釋二初正示染事然此文意染法染情俱名染事是生此實造為性所具二然此下明亦得為如來藏恐人謂此情染事是生死法如何得稱為不空藏遂乃釋之由此染事悉依真如性體發現是故亦得名不空藏文為四初示染事無體心性為體是以性體全為染事既有染事故名此性為不空藏二譬如下喻三是以下引證論明四鏡分別第二因熏習鏡然論復云又一切染法所不能染智體不動具足無漏熏衆生故今不引者以因熏習鏡中辨不空有二一者染事不空二者淨德不空先說染事次明淨德故云又也今祇欲證染事不空故不引之四以此下結以此驗之等者今明不空不遮於染事恐謂起信惟指淨德故特引之釋出其義乃有驗之并亦是之言也問論中正明二藏於不空藏惟云具足無漏功德與下四鏡文何不同答前約對治正明淨德後約通體具取染淨二明藏體一異以釋實有者約不空藏開出此科所謂實有者即不空也由此不空既有性用事用故今辨釋與其義體為一為異文為三初分科有六者初圓融無礙法界法門通辨事理下之五科復明初義由初科中明法身有本有諸佛之別在障出障之殊故第二第三復辨此義有初科中以理融事故事用中亦得無差復明此義故有第四又初科中明本頓具一切法性若隨事熏以淨除染與後方具為復明此義故有第五又初科中明一切凡聖同是一藏為復明此義既同一藏何有相見及不見者遂有第六二三別辨性用第四別辨事用五六性事雙辨亦可別辨事用由報與見皆在事故二第一下解釋文自為六初謂圓融無礙法界法門者即一念三千之異名智者依於法華十如因果以明十界互融互攝良由稟受南嶽深旨遂開廣之乃以四義消釋經文及正立行加三世間委示一念即具三千南嶽今文引於華嚴譬如明淨鏡隨對面像現又云心性是一云何能生種種果報而此文意即同法華十如是也故摩訶止觀引華嚴云譬如大地一能生種種等復引法華云一切種相體性皆是一種相體性記云次引法華結華嚴意云何種種謂相性等正用十如以為觀境以此求之故知南嶽引華嚴文證今科中圓融無礙者豈異法華十如是也其所不引法華十如者斯有二意一者天台之前雖有消釋法華妙典而未明法華超勝華嚴是故盛以華嚴大教而為圓融根本之經斯恐南嶽隨時悉檀獨引華嚴以證融攝二者十如是文融攝之旨意顯文隱故前代消經但以十如分於凡聖直對權實十界融攝殊不涉言權華嚴之文以一為多多即是一融攝之義文相顯然斯恐南嶽從顯而引然文雖引於雜華意實出於妙法良由全用法華十如深極妙旨說此圓融無礙法門何者以由南嶽讀十如文乃不以文而容其旨是故讀云相是如性是如乃至本末是如也作此讀文以見圓融無礙之旨何者所謂如者即非染非淨非聖非凡非一非異圓融平等不得而名但以絶高下故稱為平等無異相故稱之為一以不改故稱之為性故此如者即平等一性也相性本末十法不同即是十界各各因果因果當體體是於事事即差別以差別故地獄相者表其苦楚佛界相者表其莊嚴地獄報者銅柱鐵牀佛果報者涅槃上定常情見者善惡殊形苦樂異勢今反常情以合於性即指地獄全是佛界即指佛界全是地獄乃至十界互融互攝圓無障礙無其所從自何而得良由地獄相性本末全體是如佛界相性本末亦全體是如一如無二如故地獄界若因若果即是佛果若因若果故佛果若因若果即是地獄若因若果界界互具十十無窮如此圓融功歸如也此如之體無名無相寂絶平等不可思議以相性等一切諸法即此如故是故法法皆不思議南嶽禪師得此妙旨於是讀云相是如乃至本末是如也又若非此如本末如何云究竟等豫嘗謂三千者單理不是獨事不成事理融攝方曰三千而於前意亦可見之如即理也相性本末即是事也以理融事遂成三千苟謂事權自得名曰事三千者必衆相性不用如理自能融攝若其爾者何必讀云相是如耶問若祇讀云如是相者非三千耶答若共經旨直以如是為指法之辭者此相何得是三千耶由此南嶽恐人但作指法而解故特以如而為句末依此讀文方見經旨若依天台三轉讀文一轉依經讀云如是相者應以如是為相方是三千相若離於如是終不能於互融故今文云若就妄執之事即一向不融若據心性緣起依持之用即可得相攝問單理獨事若非三千如何得有理具三千事造三千答此約歸趣無不極義以三千趣理故曰理具三千以三千趣事故曰事造三千若其成三千之體者必事理圓具方成三千也山家諸文有云三千為緣生有云三千為非道有云三千性是中理亦云三千皆空泯亡悉是事理融攝成三千後隨義舉用趣極之說若趣於空則三千皆無若趣於中則三千皆妙若趣於假則三千皆有荊溪云凡權四句之法皆權諸法已和合性今亦例云凡言三千惟俗惟理皆約三千已成後說問若云南嶽讀十如云是相如是性如可乎答若以是字而為句初於理亦得義但不同天台三轉良由天台以是為中以如為空如南嶽之讀是之一字指法之辭如之一字乃平等性故與天台三轉不等問若不等者何云天台稟承南嶽答就字辨義不同意旨所歸無別若一向同天台何必作三轉耶其意無別者悉是以理融事圓妙無礙心佛生三互融互攝問南嶽天台所談事理意同之旨若為見之答皆是三諦故云意同然事理之義有在今就三諦且約體用中邊亡照三義以明其意南嶽指具足染淨因果為不空藏不空是有無非相性等十屬其假也以空此有稱為空藏其能空者豈非指於平等一如為能空耶故此之如即屬空也篤論其如非空非有故云心體非空不空豈非指於平等一如體為中耶斯則乃見如之一字讀於空中所謂空中二體二無二者由皆如故其相性等十乃是事用此約體用又既論心體非空不空同對不空說心為空故此之空名從對得還屬於事是故惟指非空不空中道之理名之為如此約中邊又此非空不空由對於空及與不空而乃名為非空不空況此之名亦從對得然其如體亦於中是故此如無以可目而強目為平等一性此約亡照問中道如何得名為事答篤論其事事乃是有體屬相性染淨因果由對此有說為空中空中二名因從有生亡名為理者名為事是故空中皆在事收故荊溪云假立空稱假立中名假非事乎又云圓教即用不思議空即此正是亡於三諦常亡常照論亡論照如是名為事理合行豈非亡三為理照三為事又大師云無明故有者點出事觀也若其空而復空那得此事既有事即有空既有空即有非事非理此之三種悉由無明故有以諦例觀諦豈不然天台既以如是二字而為空中相性為假三諦之法既同事理之義去就無別但南嶽以此之一字體屬空中天台以如為空以是為中祇此字義少不同耳釋又為三初標二問下示二初藏體惟一有問有答然如來藏法同人別以法同故祇共一藏以人別故亦可各各具如來藏是以下文乃有因果法身之異法同人別如涅槃疏問隱名如來藏我是佛性者一切衆生有我性耶答一切衆生悉有性未即是佛是故有我未是我德何者人別法通通故有性有我人別故非佛非德以人別故因中法身未有莊嚴以法同故雖未莊嚴與佛性等此乃獨約藏體為言若約藏用別十界事皆德論於法同人別二問下示具法漸頓二初問二答二初示法體有性有事涅槃疏云問藏性理三云何同異答祇是一義若欲分別理惑合論名之為藏全不論惑稱之為理不可改變稱之為性今文正以染事是惑理具此惑理惑合辨為如來藏又諸文中辨四門義以如來藏為有門者正取此藏具足諸法故荊溪云具即是假二如上下指上二若據下正示具法有漸有頓二初標性染淨無始俱有者正取染淨能具性性既常住則無始本有性既頓足則一時俱具章安云佛性中道不同善根何者一闡名信提名不具佛性非信亦復非具云何可斷佛性非善非惡闡提但能斷善云何斷性以此類之乃以染淨從能具性故云無始俱時具有二此義下釋二初釋約性惟頓二初示相二初約十界通示以一性為能具十界為所具一性是無差十界是差別故云無差別之差別此則未論一界復具十界乃且總示一性具十文云一切衆生者通指十界皆名衆生二然此下界界各明先須曉了各具互具義凡有四一者一界具當界因果為各具十界因果為互如大師云問當界有十性相可然云何交互相有二者一界具十界為各具百界為互如大師又云一法界復有十法所謂如是相性究竟等十界即有百法十界相互則有千法三者一界具自己百界為各具他百界為互輔行云一一界界各各具十不相混濫又復學者縱知內心具三千法不知我心遍彼三千彼彼三千互遍亦爾四者以具己百界他百界并具從能具人別為各從所具法同為互如金錍云衆生有迷中事理諸佛有悟中事理迷悟雖殊從人則各事理體一從法則互問釋籤云理體無差差約事用如何分對各互二具答理體無差為互具差約事用為各具問金錍以事理體一為互具何不獨以理為互具答籤云理體無差者乃是能融也三法高下者乃是所融也由以理體融故故三法無差三法既然無差則所具事理任運體一乃成互具也斯同金錍事理體一亦同大意理同故即以此事理從迷悟高下乃成各具故釋籤云差約事用斯同金錍迷悟雖殊復同大意事異故六今以三千事理若從各具皆在事異若從互具俱在理同不二門云三千在理同名無明三千果成咸稱常樂豈非三千俱在事異成各具耶三千無改無明即明三千並常俱體俱用豈非三千俱在理同成互具耶由無明當體體屬於生智明當體體屬於佛今點生同佛故云無明即明斯乃生亦具佛也由理體體屬於佛事用當體體屬於生今點佛同生故云俱體俱用斯乃佛亦具生也祇由理同是故互具問理同事異各是三千耶答此問不然向約理同事異為能具說乃以所具三千從於能具事理不同故有各具互具之別若欲就於理同事異辨三千法體者應知單理不成獨事不是須以理同融於事異是故事異理同法體圓具方為三千及趣無不極則趣事為事趣理為理問事異揀濫云何三千答偏教揀濫而無理融故非三千圓中事異約即論六圓中理同約六論即既得云無高下之高下豈不得云非揀濫之揀濫故圓揀濫定是三千若謂不然豈可得云圓人之位然此且約能詮無不圓說況復若取三千攝無不遍則偏教揀濫亦是三千問既指一性為能具今何復云事異為能具答由此一性遍一切處是故法法皆為能具功歸言之性曰能具就法言之事亦能具問事為能具一向屬於各具義耶答不可一向若以所具從於能具事既差別故為各具若不以所具從於能具故事中所具有各有互具自己者名之為各具他人者名之為互以理能具為互具者亦乃以所從能而說若不從能故理中所具有各有互今文中云然此一一衆生性中至具無量無邊之性者其有二意一者一界復具十界十界成百自百至千自千至萬乃至無量無邊不可算數之性此則界界各能具自己無量無邊之性復能具他人無量無邊之性故各能各具各能互具斯乃謂之界界各明也此則約於十界而辨二者於一界中自他不同且如人界以十界言之祇云人界若界界各明者此之人界復有苦者樂者愚者智者種種不同亦有無量無邊之性斯乃亦是界界各明由其文意通此二向天台談一界具十十界具百者意出南嶽即今文是也二所謂下示二初六道云苦樂好醜等者若約初義應以六界迭論苦樂好醜并愚智等若約次義則一界中自有苦樂好醜愚智二及三下四聖三乘因果等者若約初義則三乘竪論約次義則三乘橫辨文語三乘不言佛者應以菩薩之果即是佛也故該四聖與前六道共是十界三如是下結二以是下結二初約頓具結故云以是義故俱時具有二以具下約二名結二初在障法身即染性二出障法身即淨性上來染淨既約六凡四聖以分今在障出障亦應無別以由染淨有通有別別則六凡四聖通則十通染淨今取別義問文云出障法身亦名性淨涅槃涅槃豈法身耶答今云涅槃即法身也如章安云四依品明三德者一法身二解脫三般若四相品中不爾一者涅槃二者解脫三者般若即取涅槃以代法身今此性德俱時具有無量無邊差別之性不出十界相性本末因果十法為差別也然此十法有性有事若云性者乃具相性性性體性力性乃至本末十法之性若云事者則具相事性事體事力事乃至本末十法之事今語具性下言具事然其相性因果等十體祇是一以隨義異名性名事以約體同故云事理共成三千或有覽者宜究其意祇是一性云三千性二然諸下釋約事有二為二初一時俱具又二初辨熏用性則無始皆全事則在人不等人不等者業為能熏種子用別二種子下辨俱具三初標言一時者即二剎那時俱有十界此乃總約一切凡聖而成頓具性云受報者以向造業即是其因今偏從果言者由因易曉二所謂下釋二初約十界通辨文缺修羅有開合故文無菩薩以能成佛者二復於下界界各辨即一一界中復有無量差別不同此則惟可各於一界自辨不同如前性中第二義也不可復於一界又具十界謂之無量差別不同何者且如人界如何一時自有九界之事報耶云頓具者乃約多人從事而說三以此下結二初約藏體二如一下約時節二然此下始終方漸具乃約一人從事而說故始終方具三初結前示後二初結前前則具約十界於一時中受報各別二但因下示後此後乃約一人歷從迷悟故具十界前是多人一時今是一人多時文為三初六道世間二後遇下三乘出世三以此下結示始終二何以下正辨始終具相二初自就六道二又受下世出世對辨天然理性因果頓足從事造業或有或無或強或弱或熟或生從業受報必不兩果今從事報故無餘身三以是下結三初約一人結二一切下例結三是故下總結問染淨二事雖有頓具但是十界而非百界并於漸具報果前後此之二義為是三千為非三千若非三千如何却是如來藏中所具之事若是三千且非百界十界一時頓足答豫嘗謂談三千者欲令行者於一塵一念見法界之全體也故成道時稱此全體遍應無方且法界之全體者有麁有妙有漸有頓有情有法有破有顯一塵一念圓具無虧苟缺纖毫即非全體故荊溪云於一念心不約十界收事不遍不約三諦攝理不周且約十界收事遍者若但祇收一界一時受報之事而乃不收十界前後受報之事斯乃正是收事不遍荊溪又云但明四聖何法不攝何必須明六道法耶文有五意四者為知不可思議境所攝法故良由攝於思議成不思議若棄思議求不思議其道則遠豫辨三千立義有四一攝無不遍以此一義通達自心無有一法出于當念今文內受報前後情事差殊皆是如來藏中所具若非三千所收又是何處法門問若爾單事亦可曰三千耶答言三千有必攝其事言單事者不成三千問若云三千有麁有妙如何得云指的妙境出自法華答三千攝法有麁有妙是此麁妙皆即一如故云妙境出自法華說雖前後旨不異時問受報前後或多人一時其理灼然如何事中自己一時頓受十界百界諸報果耶答從事當體其理實難由以理融故非思議若欲見之今以諸佛而顯衆生且佛得理故能一時任運頓現十界百界一切報果不可思議故知衆生亦復如是但在當體未證理故故云實造受報前後本其事體不曾離理故此實造常於一時頓具十界百界一切果報不可思議故知非但以生顯具而亦得云以悟顯迷
