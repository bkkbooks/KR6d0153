body:
  text: 東掖白蓮釋了然述初就染濁三性以明止觀體狀二初分科二對分下隨釋三初法四初正明三初依分別性以明止觀體狀二初標二先從下釋三初從觀入止三初總標二所言下隨釋二初觀三初標二當觀下示二初示觀境文云五陰六塵者即該己佗色心諸心法智者示境有修有發各別示之今則通示又四三昧雖有觀及明正修別依常坐揀境及心於前四乘唯觀識陰復成別示今仍屬通以由不揀四陰等也示境雖通修觀必別但此之別不同智者揀四觀識隨其根塵別取一法而為觀境故云隨二法二悉作下示用觀三初總觀謂實二但是下別觀三法三初觀無明二以不下觀妄想妄想即業三是故下觀境界即報三復當下觀因果總觀前三不獨今日自無始來由此三故復起惑業感報不出問前謂修觀為假觀者今觀正是觀於見思惑業與報義當空觀如何謂假答以諦真者必須諦俗然若以今文從假入空從假為觀入空為止觀皆空觀收干何不可但為今文與於山家諸文用義有不同故以諸文中從假入空若不名觀即乃名止而不可分觀為從假止為入空今文既分故知義別觀見思假必屬假觀非空觀也故下以立三性緣起名為世諦又補為用問修假觀者竪論必在空觀之後今何先假而後修空又假觀者乃是菩薩歷學法門今何觀之答今文從圓不可分於空假前後或分前後者不出尅從法體隨義詮辨若尅法體今觀見思執虗為實照於三假即與假觀法體無別若隨義辨由在空前故名此假為生死假若在空後故召此假為建立假隨義前後雖然不同其如法體更無少別若隨義言今先從觀修假觀者是修出假方便觀也由先修故正出假時觀智易發故智者云入空之前遍觀見思總知病相為出假方便後用一門斷惑入空若出假時分別見思照了則易薄修止觀法眼則明以由智者則立入假故指空前而為方便今文不別立入假觀即三性中修觀是假亦可從觀入止修假觀者假方便也從止起觀修假觀者正修假也三修假觀觀是學法者學法不出知病識藥授藥方法今文正是知病一義藥與授法即是自行所修之止持以化人故名授藥問智者止觀通空假中南岳何故以觀為假空中為止答法理一同結名別爾如依真空修止觀者必由先知六道體虗妄執為實實執亡處即見真空智者惟就實執亡處結名止觀故曰止觀故曰止息故曰貫穿破實執故曰體真故曰空觀南岳通約二處結名約其知於妄執為實故名為觀約能於實執亡處故名為止修中亦然又南岳止觀體用對各智者止觀體用各說所以智者辨真中中若止若觀皆在南岳三性之中止義所収辨俗假中若止若觀皆在南岳三性之中觀義所收況復智者亦曾以止對法身體而將於觀屬般若用又復今文觀中有止以知執為實故也知虗即止止中有觀以由知實是虗故也知實即觀下去例爾三作此下結二作此下修止二初止所觀三初法二初追念前觀流轉生死者因謂實故起惑造業故致流轉二今復下正修止法二初止息亦名貫穿云癡妄者癡即無明妄想違之之言即止息二強觀下停止亦名觀達虗相無實者亡真實境前乃違息妄實之心今乃停止虗相之理此理不當止與不止故今修止該三止也又此三止皆名體真亦名實觀以虗相為理者若從小乘不知八識無明虗想實執亡處正認無明虗相為空今從圓旨由全一性為無明相是故相虗相虗云空即畢竟空不知此空此空奚亡實執是故上文破枝時根本分滅二猶如下喻愛即無明謂即妄想實人即境然此喻文正就大乘以喻幻假又大乘語通今則從圓幻由一性問一性之語亦通此記前後何以一性惟為圓耶答此記前後之一性者乃是三千即一之性所以惟圓為患學山家者凡談圓性惟執三諦三千而不本於師祖之意故以一性而導達之後人其或惟執一性必須後以三諦三千而導達之然三千一性殊名而同體無惟執名以失圓旨三我今下合迷即愛心妄即能謂實人意亦無明確亦妄想由妄想故靳固為實二復當下止能觀三初正示以由意識能知名義用無塵今所止者通於二義一止能用此智之心前為性空今為相空良由空於能觀心相亦名相空二者直指能觀之觀觀亦非實名為相空二如是下進行即以後念而為能觀復破前念能觀非實如是次第以修止念寂之處止方頓極三作此下觀成三即名下結二復有下從止起觀意乃為顯真俗不二寂照同時或從觀入止或從止起觀行大乘者於此體用不並不別圓妙難思下去例爾三若從下從止入觀前約一性自分從分別止起分別觀今約二性相望從分別止入依佗觀又前止寂觀照二法不同今於此為止於彼為觀一法二名二次明下約依佗性以顯止觀體狀此中止觀觀達根本無明停止中道真性文為二初標二亦先下釋三初從觀入止三初標二所言下釋三即名下結釋又三初觀悟入之後觀無明假立同破於界外塵沙問既云觀於無明復何言破塵沙答依佗性者祇一法體乃是界外生死因果虗相之事於此之事不了名曰塵沙不了此事即中名曰無明今修觀者了達虗相名為假觀破塵沙惑今修止者止息虗相即是一心名為中觀破無明惑文謂因前分別性中止行等者然而雖云以分別性為依佗觀法理是同細究其意非不殊別一者在分別性修止之時雖破實執了心虗相有其止息停止二義若望依佗故前分別且破實執未究虗相由解虗相者必究一性相方是虗以前分別雖有此解解未深明是故望今且為破實二者前推迷妄但推枝末執實之迷未推虗相所起之迷故前修止推止執實枝末癡妄今修觀者能知虗相乃因根本癡妄而成二作此下止二初追念前觀云妄業者或妄想即業或因妄成業皆行蘊収無明妄想與前分別仗柰乃殊前不知虗執實今不知性執相故上文云見有虗相謂有異心又云妄想所執似與心異相相不一不即是妄境良由不知相即是性謂有虗相若知即性故推一心即無妄境二猶如下正修止法三初喻二初喻止息前分別性鏡像喻取執像為實今空華喻無執華實但論華相有即非有病喻無明病乃病眼眼喻妄想空喻一性華喻虗相有即非有喻虗相息二不生下喻停止華本不生今亦無滅喻停中道不生滅理既達此理此理不當止與不止如此三止故皆名息二偏分別亦名中觀二我今下合二初總合二惟一下別合二初止息二本自下停止三如是下結觀成二既知下從止起觀并從止入觀例前可了三次明下對真實性以示止觀體狀問依佗性中既假中觀而破無明今明實性為破何惑答亦破無明良由破無明者真證性體不可思議豈得執滯中道者即中尚不存豈況空假是故三諦三即非三亦即非一此等執除如是方為真證性體是以上文云談其心體非有非無覺與不覺皆不可名今依佗性雖修中實止甚虗相相執雖亡而存中道法愛不亡是故移觀於中道法而修止觀令中亦止三諦即亡證平等性所以復於真實性中以修止觀此義大同智者說於中道破偏約以三法以修中觀一觀無明義同今文觀依佗性彼觀無明未真證者由聞無明即是法性便決定計無明即是故須移觀就法性中故有第二觀於法性義同今文觀真實性三觀真緣亦可會於今觀真實性中有二一無無性二無真性者同觀真緣良由起執不入故依佗後復觀真實故下位次以十迴向為依佗性以別格圓迴向同信故知依佗未及真證又依佗中非不真證由約初住直至等覺望於妙覺尚在於因推佛果位法愛盡已一性究顯故位次中復以依佗判屬地上真實為果又除鄣中以依佗性除迷理惑及以虗相又復但云無明住地漸已頓薄實性方云念動息滅穿云能滅無明住地及妄想習氣不云虗相者由三細中轉理乃在依佗中除業與無明在真實除故依佗中除無明者但除相應真實性中能除始迷獨頭不覺然雖皆是破於無明不無淺深此諸義別文為二初標二亦先下釋五初從觀入止二初標二所言下釋二初觀二初觀因前止雖云前止為今之觀非無殊別前知有即非有而以破有為宗而未窮非有今知有即非有而以非有為旨故云此中知一切法本來唯心外無法二復作下復觀心相二初牒境牒真性為所觀境二為無下用觀為無前二性者若從次第可云無一由依佗性約分別中無性為體今真實性祇可約於依佗性中無性為體今云二者一以深該淺兼前總說二尅從圓旨約法橫論由分別中無就法雖在分別功德歸乃由實性若非此性其云何無是以實性二無為體若指此二無為真實性故真實性即是空中乃因修有若異此二無為真實性故真實性即是一性不從修得作此推窮名為觀也二即復下止下示實性四番止觀今當初番示妄空非實除妄空以明止文為二初示修二作此下結成初文又二初約對有顯妄無論止無是無法對有而成生者由名從對得其若執名不達體性此名須亡何者天然一性體本非名具足眾名是以對彼分別實有故以此性假立空名無彼依佗流動塵相故以此性假立中名若取此名體從性彰故空中體二無二也既然無二所以順體即一性矣今取於名從對而得故此空中還成虗相假是以可亡故云何有無法即是下文無性性也上之性字即二性也今真實性是無二性之性之性名無性性二又復下約四句顯妄無論止上明心體非有非無乃至不可說不可念者即此性體也今至於實性修止即是顯於前之心體非空假中離名言念是以指為窮深之處而修止也同荊溪云至果乃由契本一理約止證體也非權非實而權而實約觀證用也二又從下從止入觀前番約離以性止修故以照修為觀今番約即以同止異故以照異為觀文為二初標二作如下釋二初觀二性異執淨心既異二性之無更有何法為淨心即二又復下觀見念又復此無空中之性為可見念不可見念三即復下復從觀入止正當次番顯即偽是真息異執以辨寂即是下文無真性也由離二性與見念外別無真性故名無真文為四初法二喻三合此之三科各有三意初心體本寂文云心外無法者此之一句義含二向一者此一性外無空中法即此空中全是一性是故止於二性無外別無淨心斯亦名為即偽是真息異執以辨寂二者以心外無法故何有能見能念良由性體本來寂滅此性既徧無有一法而非性者性既本寂故云何有能見能念二若便下偽執成異若異二性緣念淨心緣念即偽能所即異由此偏異故不得名為真如也三又復下即偽息異二初即偽息異以辨止覔心之心是偽既覔心之心體是淨心故即偽是真云何有異法者既無異法故息入寂也但以妄想是偽也自生分別是異也二又復下從止起觀以辨止又復設使起觀分別能緣所緣故此分別亦即寂矣良由寂為分別故故荊溪云雖曰能所念本無二喻亦三初喻心體寂眼即心體眼本無華心體本寂二反更下喻偽執成異性如己眼性外無法如己眼外別更無眼由不知故以緣念心而求真性如不知己眼而覔於眼然能覔之眼即是己眼能緣之心即所緣性今從不知偽執成異三若能下喻即偽息異法文別有從止起觀以辨止今喻則總三行者下合二初合心體本寂二但以下合偽執成異三是故下合即偽息異二初合即偽息異以辯止能觀者偏異也即是淨心者偽即異息也二設使下合從止起觀以辨寂四作此下結二初結修所云解者此解即修修即於隨中亦得名為止門者不同初止故名亦得二結證念動即寂如息波入水四復以下從止起觀即第三重根本三昧文云真如用義者用即神用由三昧力然此起徧起一切分別依佗皆為所起深該淺故全具現故此神用即是一性具足三千咸空假中眾生理是諸佛顯是五又復下止觀雙行即第四重雙現前也說雖或有次第意歸止觀雙行是故一性三諦不前不後寂照同修體用俱證二上來下結示二初通結三性以立三性為緣起有門即三諦俱照以滅三性為止寂空門即三諦俱亡文云入三無性者性之一字通過通德若以性為執性之性此性屬過即是所無故分別者以相為性其依佗者以性為性然真實者以性為性無此等性故云無性若以性若以性為理性之性屬能即是能無由分別止是真空性此性無相名無相性由依佗止是中道性此性無生性由真實止是平等性此性無於空二性此性字却屬執名無性性文云除分別性者此性是過入無相性此性是德下二亦然若以性為執性之性此三無性實一無性具二無性一無性性二無相性今但總云無性而已文以無相無性對二性者若准前文分別為用依佗為相由約起信三大為名今依無性論作此名故論文云約分別者由相無性說名無性何以故如所顯現是相實無是故分別性以無相為性約依佗者由生無性說名無性何以故此生由緣力成不由自成緣力即是分別性體既無以無緣力故生不得立是故依佗性以無生為性然上論文約二互說由分別性別無執實乃執依佗虗相為實亡執實相名無相性由依佗性自不得生乃依分別迷妄所生亡此所生名無生性真實性為無性性者二不同一者取前二無之性為真實性名無性性即不得云無性已如論云此一性真實是無真實是有真實無此分別依佗二有無相有無生有真實有此分別依佗二無有無相有無生上之論文雖說無其體不出即前兩性為真實生故論復云此真實性更無別法還即前兩性之無是真實性真實是無相無性故意云此是無相性無生性之性故名無性性二者無前二無之性為真實性故云無性性亦得云無無性也初釋無字乃是無相無生之無即無見思無無明之無也次釋無字乃是無無相無無生之無即同無空無中之無也今屬次義由真實性當體即以無相無生而為其性今既除之即是無無相性無無生性也論文之中亦有此義故論說妄立非妄立諦乃云對遣二有妄立二無名為真實正同上文真實是有真實是無還尋此性離有離無故非妄立三無性皆非妄立也既云離有離無即是離遣二有離立二無正同次義無無相性無無生性故今文云除真實性入無性性然論云還尋此性者還之一字甚有其由旨名從對得云遣二有立二無屬妄立諦即世諦也體自性彰乃非空屬非妄立諦即第一義諦也不離此性有其亡照故云還尋若讀智者四念處中妄立非妄立諦須知今說二就真下別結真實文云窮深之處微妙難知者真俗立處三諦即亡故立與亡皆非思議文云是故無性性或名無無性或云無真性者祇一法體因遣情殊遂有三名故皆言或遣無性云無無性復由遣執於無性云無真性此二名者祇是論中一無性性之法體也三又復下約根三初約中根次若不能下下根三又復雖是初行下上根若以三根約此三文對三止觀義何不可細究文意乃是圓頓自分此三良由約證竪論於修是故分別成在七信依佗十信真實初住或依佗性初住已去真實妙覺故云不得越前二性經修第三若也約解橫辨於修故諸位中皆是三番一時而修是故初心約此並學皆成竪論第三番耳雖有橫竪莫不皆是圓頓法門故下結位乃有橫竪二義之別人若問云今此南岳大乘止觀於三種中屬於何種故應答云正屬圓頓問若由約位竪論之故不可越二何以越一答雖云越於分別一性以依佗中有分別故還成不越是故無有不歷七信便至後位之疑妨也問既然不越何以文云不從第一答依說次第故云不從依義實具足是故不越問既是約位竪論次第法理合然何故分根有能不能答其分根者自約位說次與不次非由位得問三番並學為上根者其義云何答此通二義一者不可定為上根但可於前分二根性有利鈍若利若鈍約證竪論三番不並約解橫辨何不並學二者亦可以前二根如於修別故屬中下以後根性即修一心故屬最上文云以依佗性亦得名分別性者一者由執依佗為分別故二者不以二性分對二惑是故二惑名以當體名為分別各取所依合為佗依問前依佗性亦具三性今何具二答今從竪論并非上根如修別故依佗外更須修實故略不說問應顯前文是橫不別耶答不可一向前但示於依佗一性具三性義若以此三一心而觀故成橫成一若以此三次第而觀故成竪成別四料揀有此問者由上文云除真實性答文意者但是除執非謂除性不出就法功歸二義就法論除云除實性由就實性而起執故功歸論除乃除無明功由無明執實性故問人據荊溪云世緣起法亦本無生但由情計謂之為生理性亦爾故謂事理法體不除但除情執且今三性前之二性正屬緣起亦但除情耶答昔說誤矣今問緣起是生無生若云無生何云緣起若云是生生必須除若謂不然何云情計謂之為生良由不知理體不除者自心功也事理不除者由即理也是故今文於前二性而無此難二復更下喻二初約巾兔喻四初總示二譬如下正示二初喻三性觀門二初示二此喻下結初三初喻真實性二初喻二真實下合文云唯一淨心自性離相者若約止門總離二相一者名相二者形相形相又二一者虗相二者實相離名相者即離性相離虗相者即離生相離實相者即離相相故三無性亦名三無相也且名相者由性本無名因對分別名之為空因對依佗名之為中二名本無故離名相如巾本不名無兔巾因對兔故號無兔巾無兔巾名其名亦亡無兔如空中巾則如性無無兔巾如為空中性其實但亡無兔之名而不亡巾如實但亡空中之名而不亡性今文且在實性觀中未離名相故離相言且離虗相并離實相淨心自性既離二相正屬空中餘二各有喻合在文可了二若了下喻三無性止門二初示二即此下結示中各有喻合問無性性智中云能知淨心本性自有不以二性之無為真實性據此之說其義但離修入空中有性空中為真實性若其然者性得謂之真實性止亡於於中歸一性耶答修性空中體同義異若從義亡修空中存性空中教門有之但今文意真實性中窮深修止止體寂也而非其用以約體同故性空中還是於用而非性體今修止者既證性體故亡空中問文中何云本性自有若性體本有不因無相無生方有實性三是故下結法喻二初結法文有三節初二約離後一約即離中初明宜亦故云若欲次明修習故云若不二以是下結喻四如幻下例顯三初喻通辨三性文云依實起虗執為實此之實字亦可是同由依佗性或指分別為所依故今文則異依實之實乃是實之實據次科云但虗體是實即喻真實性是以不同執虗之實二若但直下喻別就依佗辨三性三是故下結二又更下約夢事喻喻三初標二譬如下示三是以下結示中又二初喻依佗二彼夢下喻分別各有喻合二是以下證三此即下結云三性者喻中既有作夢之心心即實性二然此下喻止門二初喻二此即下結喻三無性各有喻合依佗中云有即非有惟是本識者流即是水故屬非有真實性中為論覺心夢心故以本識真心說即是息異以辨寂也二就清淨三性以明止觀體狀者然此三性法理進不與染獨中稍有不同染中依佗體是無明虗相惟在俗諦淨中依佗云虗相者體是三身四土義通三諦染中真實體是空中淨真實體是一性其不同者深有其旨由虗相者乃是世諦其無相者方為真諦此世俗諦在生佛進不不同如法華十如相性等十如是二字乃屬理實玄辨六道相性體三即指苦報色心為體表苦為相生惡為性然既此等義屬事權如是理實故當空中其佛畎釋正因為體事因為性緣因為相并約位釋以相性體指為三德三因三德荊溪指因即是三諦既以三諦為之事權故如是理實須當一性盡由至佛境中究極歸深空假中三還是諸法苟無此義大師何云一諦為實三諦為實三諦為權今亦復然因此義故即見南岳所說有旨何者前明染中實性修止乃以滅於二無為止今明淨中實性修止但以佛心生心無二為止其不云滅二無為止者祇由二無體是空中淨中空中屬依佗故問若以三諦屬依佗性其一性者屬真實性是則一性出三諦外三諦復在一性之傍豈是圓頓法門者耶答此問非也其云一者即三之一故一即是三其云三者即一之三故三即是一豈惟三一不二況復三性元同不分而分作前說耳問若而分時三出一外一在三傍耶答三是即一之三且從三說如波是即水之波且名為波一是即三之一且從一名如水是即波之水且名為水波水相別故云不分而分波水體一是故分而不分問曾問人云即三是一即一是三者乃就三中趣舉於一一相即爾答此一說者但得就法圓融而失本源法體故智者云如摩醯首羅面上三目雖是三目而是一面觀境亦如是觀三即一發一即三不可思議釋文為三初標科二第一下隨釋三此約下結隨釋三初隨章別釋三初明分別性中止觀體狀三初所觀境三初法體謂知一切諸佛至大悲大願者斯示在世淨用化物正執三輪悲願即意依報眾具者此通在世并於滅後及以染淨殊形六道變化施設者此語染用點三乘者攝淨用中滅後中云表彰處所者即指舍利塑泥刻木與圖畫像表彰是佛化用之處亦可塔廟為表彰也文云經教即經藏威儀住持即律藏不語論藏故云等法二當知下示虗相惟是真性緣起之能者能即用也既真性能相即非相任運無實三但諸下明妄執佛現虗相生執為實正約見思為曲見也二行者下能觀觀二以知下止二初追念前觀二強作下正修止法二初示修二初止息二唯是下停止自心所作者一者妄心佛相本虗眾生自心妄執為實二者真心是佛自性清淨心作亦即眾生自性心作由生佛心本不二故斯從文旨可作此說二如是下結成云實執止息者既然息實必住真空若例染中今文略於起觀二明依佗性中止觀體狀三初標章二謂因前止下釋二初觀二初示二作此下結初文二初因止成今觀二以不下正示觀門以止文顯今此觀中必有自佗二種虗相酬因即自對緣即佗既因前止為今文觀今此觀中既有自佗二種虗相顯前分別必該自佗前不語者乃文略爾又雖因前止為今之觀不無少殊前分別性非但無化他亦殊前唯界內設化今通內外利佗二依此下止二初示自利利他之德者即是所止平等一性而為能止故云有即非有何者由下料揀自利利他是三身四土且法身寂光與諦理體同名別荊溪得指自行空中化他俗諦豈非三諦俱屬依他同為所止二如止下結三此下結示前後行之亦得者隨根不同雖云前後實是圓乘例如勝別三次明下明真實性中止識體狀三初標二謂因下釋三此名下結釋又二初觀惟是一心者知惟一法名為觀門二復知下止三初出法體正示一心真實法體乃是能止之體性也由此體性非迷非悟平等一如二以無下示相二初止息以迷悟無別為能止有迷有悟為所止故云分別自滅前染實性次番論止止於能所但約自己心體而論今止迷悟乃約生佛相望而說二妄心下停止妄心既息者結前也本來一如者停止非迷非悟之理三故名下結名二上來下約義通結三初結自行入修窮深至極平等一如若以我心佛心皆有體用亦得名為平等一如今但在體為一如爾然須了知既見體如任運用等二復以下結化他出修既云無事不作豈不權作於情事既云無相不為豈不權為於染相問情屬凡迷若言佛起情事之用必再迷再凡耶答實非凡迷為眾生故權現凡迷故章安云方便道中如來不定法身本地定不定為凡故荊溪云若當分者尚非教主所知問起於染用此論有文未審智者有其言乎答光明疏云起淨不淨用三用時下結止觀雙顯二初結染位二乃至下例凡夫祇一體用更無異法佛亦此法己亦此法但無始來雖居其體不得其體故於體用得用失體以失體故此用無益又雖曰得用但得少分不得其全但得其礙不得其融皆由失體故有斯過若得體者非但於用有亦乃任運得全得融但以此意求之實無別有諸佛之法又眾生得一而不得二所以却二體用異故佛二其所以却一體用如故故為佛法三料揀釋疑二初四重料揀差無差四初重問者由前實性修止而生答文者乃約尅從法體為答理體同也事體異也知同者智執異者情前從知同之智而修止故云我心佛心本來一如今從執異之情而為答故乃云佛生二名之異文云心體有無障礙別性者即能具情之性也既云名無礙復稱別者無礙從性別則從情此無礙性能具於情故云無障礙別性第二重初問二答文三初示義余始聞道常疑於此何者一切事相各別不同者莫非是情佛既離情合無差別如何經教說佛起用種種事用歷然不同其同學輩或謂余云佛之事用不同眾生非由情致自是如來不思議事或答余云佛無事用從眾生邊之事用爾其實佛用全是性德故事相者非佛所證余乃研究此二說者非余所知者尅從法體事相是情隨具詮辨佛亦有之良由佛亦具眾生故從佛性體即云其用乃是性德從用當體故其事用須由執情余雖知之求諸無所一日得今南岳之文其言既顯足為良證有求余者方最說授文云若離我執即無十方三世之異豈非事異由情文云但本在因未離執時各別發願豈非果證情盡差別元從在因執存不因可致問前文起用云但除其情今文起用云未離我執者何答用從所依如鑑現像不曰假形故云但除其情用從當體如形現像不曰鑑故云未難我執其實鑑明形像一致而圓二是故下引證二初引二此即下釋一切是別一道是同三以是下結答二初法推情所起良由性具性不具情情無由起情若不起事無由生事若不生豈有差別相從雖爾其實情事差別性本頓具全具發現故文總云具差別性若云此性不具情者情無由即情若不即大師何云問七識是執見之心何得言是實慧解脫答若離迷執何處別有實慧之解二若解下喻云具像性者或曰現具者但具情之性而不具於情今問曰具情之性者此性名情不性若得名情何云不具情若云具情性其性不名情亦須具權性其性不名權故知此說者祇因失能所第三重問答者此義前後凡三辨之文相生起雖各有由而其意旨或答意大同而問意少別或問意大同而答意少別疑文可見文為二初問二答二初違問答雖舉異意在惟同故云他修我得道今答違之若從體一是故不論修與不修成與不成復何得云他修我得此約性體雙非義拒云平等耳二雖然下順問答二初示義二是故下引證若解此體同之義亦有益己者惟從性體己他平等非修不修但從於用己他既殊修不修別今以即體論用他既即體而修其體既同於己是示己同他修故云他修亦有益己第四重初問二答二初同異各論二初同二初了他即己同全性為修以性同故了他即己二又亦下自他無相同亦釋伏疑疑云既然了佗即己藉佗得道今何佛自成道我却在迷是以釋云了他即己己佗性同故無佗身己身之別如何尚存佛我之二疑佛成道我何在迷二真如下異二復知下同異對論二初不可全同雖知佗修即己亦須自進其修二又復下不可全異雖然自進其修復須了佗益己文為三初釋二即如下引證不知性同但在事異三是故下結示藉因託緣者同異二義互為因緣然若不知同無由成佛同之功者是實性故在異者不能知同知同者必須得異第二三重料揀有非有初之一重覈定法體餘二正辨有非有義初重若文自利之中云淨土者身既證於法報土必是於寂光與無上報利佗順化不云佗報者在勝應攝摩菟摩者此云化身始終為應歘有為化云淨土與雜染者即三土也淨染之言於三土中該於橫竪第二重初問法報二身圓覺大智顯理而成者一心三智能顯能成一境三諦而為所顯一體三身乃為所成不別而別今別自行圓覺大智即空中智以為能顯真中二理以為所顯法報二身以為所成故云顯理而成又圓覺大智即報身屬能顯也顯理而成即法身屬所顯也若約唯識轉於八識以成四智又束四智以成三身者則轉第八為大圓境智轉第七為平等性智轉第六為妙觀察智轉五識為成所作智大圓鏡智成法身平等性智成報身成所作智成化身妙觀察智遍於三身既然不約真常淨識乃是教道一途屬對不與今同何者今以圓覺大智顯平等一性此之一性有法身性故成於法身有報身性故成於法報皆即性而成能顯之智亦全性具豈惟法報即性而成祇如應身亦即性具足故三身一念因心無不具足融妙難思至佛果顯又指法身為塵相者佛本無身順世立身故法身者亦世相收但此之相而非報應身色之相以詮實理假名為相既有名相故為所非問法身無色相耶答尅法體無色相隨處辨即是有色相問昔人亦云若論相即俱相俱無相與今何殊答即名雖同良由昔人用祖文故即義有殊以假立宗應身即法相不存故智者明於三智稱曰本無說於四土曰非垢染示其開顯號非權實或談之於初或結之於後意從此立意從此歸予因得之三身者即平等一身四土者即平等一土是故今文法身寂光俱為虗相二答三初示體用二初用即體二復正下體即用由法身之名從世間得名下之理從性體彰即用而體既是一心所以不遷即體而用既是虗相所以可非問若云今文指修法身謂之虗相以性法身而亡此修可乎答今文之意不擇修性凡有名字皆屬用義是以前文乃指本覺亦屬用收又復須知性本無名以生迷性既有苦身欲以假名引彼入理遂以此性強名法身故法身名乃從對得生既迷此乃云此是逆修所迷法身勉令反迷以智照此乃云此是順修所顯法身以體自性彰故云乃是本來性德法身故知祇一法身名修名性問學今宗者執人不知祇一法身在性為性在修為修答雖皆知之同焉其所以知者殊爾何者由彼乃謂性體本來名為法身今謂性體本來不名法身由對眾生故有此名以此對得之名召本妙性之體故體自體彰亦名法身篤論性體本無此號若云性本名法身者何云佛本無身何云性本無名若云但無修中之名而不妨有性德非不思議何者既然有名豈不可思議或曰如此辨不識即是習啞法答曰若謂習啞法即以啞法識縱使不習法思惑者若達此於啞法妙訓問前云強名梁公何云非強名耶答了名即性何強之有問名既非強前後何云答前從離說當知若從即說何獨此名非強亦乃言滿法界未曾擬識絲毫雖然即離分途究竟同歸一轍二然用下示融妙三寂即下示止觀四初法本一體二但為下隨機先後三非謂下正答前難即亡即照照即是常四又復下引事例顯二初引事二世法下例顯世法尚爾者色即是空通別圓三悉有是說今云世法者以世虗空與真空殊今色即空屬世間耳若望真空故世間空還是色攝第三重初問者以佛難生意云若眾生之有亦常住者且如身之是有何得死滅答二初立義二常住下相理體是無常即理為用故用亦常在佛在生據其法體皆是有即有非有非有而有但佛順理所以常住眾生迷理所以生滅第四止觀除障得益者止觀體狀即自行因除障得益屬自行果前非無果今非不因文相生起相對說爾文為三初標分二初明下隨釋三斯辨下總結隨釋又二初別明二初釋義文自為三初約分別性以明除障得益二初標二謂能下釋二初觀行三初法二初除障二初爾所除障二何謂下釋所除障二初釋迷妄見思迷虗妄執為實初一重也復迷見思是於迷妄妄執非迷第二重也故云迷妄之上迷妄文云何謂至迷妄標也謂不知至即是迷也釋迷字也以此迷故至妄想釋妄字也此一重迷妄至迷妄也結釋也二是故下釋除障者正除見思屬於止中是故今觀但除見思迷上之迷問前云觀門是修假觀破於塵沙今除見思迷上之迷是塵沙耶答正是此惑見思迷真塵沙迷俗見思之體體是俗事今於見思而起迷者是迷俗事既知是過乃解俗事迷則為惑解則為諦是以得云除塵沙惑而悟俗諦問俗諦是所顯見思是所破何指見思為俗諦耶答見思望真屬於生死故為所破若望不知是見思者今既識知義當建立故是所顯荊谿曾云界內外俗俱所破者斯由望於真中為言若破塵沙證俗諦者斯由望於不知之心建立為言教故章安云俗亦非諦若望解了則得名諦應知俗諦其體祇一乃界內界外因果色心其名有三一者對於空中名生死俗二者望於能不知心名建立俗亦是自行入道名生死俗化他起用名建立俗三者即是一性名不思議俗然不思議俗復有三義一約所具由其一性具彼俗故故俗即性稱不思議此如向說二約能具由能一性能具於俗故能具性名為俗性或稱俗諦三約附世假立為俗如佛附世假立五陰云常住陰平等陰法性陰等故荊谿云五陰即是俗諦陰既至心當知俗諦亦通至佛又如中道實相之理附世假立名為妙有有即是俗故大師云又此實相諸佛得法故稱妙有例應空中稱不思議亦通此三二以除下得益三性除障皆從自分望後進行稱為得益二又此下喻三初總標二如人下正喻二初喻所除障二初喻迷妄執東為西執虗為實二此人下喻過失二若此下喻能除觀二初喻除障未醒悟者未破見思也信知自是迷者知即是於照假之智二此人喻得益三雖未下合二初合能除障二初合除障二堪能下合得益二若都下合所除障二初合迷妄二即當下合過失三此明下結二所言下止行三初標二謂依下釋三此明下結釋為二初除障文云作方便者若初望止從假入空是故假觀乃為入空之方便也若觀自辨既是於假乃為出假之方便也以大乘中入空方便即是出假方便故爾文云除果時迷事無明及妄相者正除見思復於貪嗔漸已微薄者於三毒中自論難易無明癡也以迷虗相起妄執實今既知虗不復執實是故迷妄二皆易除其有貪嗔而難除故雖不迷境執實愛惡之心尚存是故但云漸已微薄雖曰微薄終須斷又無明妄相屬見貪嗔屬思亦可橫論除見思時根本貪嗔漸已微薄雖有罪垢不為業繫者祇一昔債理設受苦痛解苦無苦者子縛雖已果縛猶在苦受苦痛皆即空也問既是大乘何云抵債答今順入空法理如此苦就出假何抵之有亦可既云在苦無苦亦顯在業非業是以得云不為業繫二復依下得益二次明下依他性除障得益二初明下釋二初觀三初標二此觀下釋三此是下結釋又二初除障二初標同異二此云下正釋二初約法體辨同二但彼下約破立辨異二以是下得益二初結前生後二別者下釋得益二初堪入止二又復下成三昧文云幻化等者幻事喻法或云夢像辨水目等於一切相能亡實執即得如是一切三昧二所言下止四初標二謂依下釋相二初除障果時迷理者對論獨頭子時迷理及虗相者對前見思迷事實相又復無明住地漸薄者前破見思則根本相應貪嗔漸薄今破根本則獨頭微細無明漸薄由依佗性即是初住至於等覺所破相應之無明也若其獨頭破在妙覺屬真實性今文住地但指獨頭不同前文通指根本二又得下得益依佗止觀辨得益者不獨望修進行亦獨約自成三昧三料揀初問次答云觀中分得等者位在相似非真出假故云分得位在住上屬真建立故云成就又復等者觀未證中但知於假今證中理而知於假四此明下結三初真實性除障得益二初標二初明下釋二初觀四初標二此觀釋二初除二初標同異二此云下釋相二初約法體辨同二然彼下約破立辨異二是故下得益二初結前生後二別義下釋得益三料揀今問唯心與唯是一心為事為理答事則俱事理則俱理何者就法言之以一切法即唯妄心妄心屬事所以唯事功歸言之如何諸法皆唯心是理問其如不別何分二義答但約起入故成義殊又復須知若立言云當知一一切法唯是一心作必應指於唯是一心為起相證若云能知諸法皆唯心體應指唯心為入實證然今文明有起入二證故知證用是證相證體是證性是以如來性相俱證從名曰俱法體無二波水之喻於此宜陳問起相滅相可以情法分二相不答二相不別祇一非有而有有即非有兩處非有既同二處有字豈別必不可云非有而有乃是法有有即非有乃是情有能了圓宗破顯難思必於今文心境無礙何者為順入體故云滅相相實不滅為順起用故云起相相實不起若謂圓宗情滅已不復有者豈得為妙二所言下止三初標二謂依下釋三此明下結釋又二初除障知彼一心之體不可分別者一不可以空中分別是一性故二不可能所分別淨心之外別無法故三不可以迷悟分別眾生諸佛同心體故於後二義亦須不可以一分別由非一故真或不然何云寂靜若離分別有不分別亦非寂靜念動息滅者念即子時獨頭無明動即子時根本之業不言虗相者由在依他性止中已滅能滅無明住地者結上念滅及妄想者結上動滅習氣者結通惑業家習二大覺下得益大覺等者三覺圓明故稱大覺法法是覺故稱現前十力究成故具足佛力二料揀有三初重二初問二答意在解用漸漸薰除今問若謂此論旨在圓者於今除惑其疑可三一但論除不說不除二但論離不說於即三但論漸不說於頓答須知圓除無非約即但就性惑說義不同即惑是性從性說義故云不除如荊谿云本觀理是不觀染除染體自虗本虗名滅故妙體滅不立除名然此文意非謂離染直觀心性亦乃非謂不除於染良由了染即性從性說義故云理是不立除名或了惑即性從惑說義正如今文論於薰除然今文意非謂離性而除於惑祇由了惑即性從惑說義故但云除惑了惑即性復從惑從性而說義者則云約即論除融氷是水約即從性論除從惑其謂漸頓義亦斯類理性常頓情惑常漸了惑即性從性為言故云頓除了惑即性從惑為言故云漸除然情惑即性漸除之處即頓除性隨情事頓除之處不妨漸除據其性非頓非漸亦乃非除不如此了者方是圓宗法界全體一色一念無不具足此全體也今於一念如是除惑若除惑若除不除若即若離若頓若漸義無不可問何知理頓情漸答佛頂經云理即頓悟乘悟併銷事非頓除同次第𦘕答文為二初總答二所以下示相四初示不得敵對相除由歒對者先須二法並存然後除一存一余既解時無惑惑時無解豈名敵對二如是下釋伏疑由聞二法前後不俱不名敵對故潛疑云未必二法共在一時名為敵對但以解起惑除名為敵對今釋此凝解起惑除故當然也但不得云解起惑除名為敵對夫敵對者必解起後更無於惑方成敵對若解起後有惑者何名解起敵對解惑今既解起惑種未滅故知乃非敵對非敵對相除文云如是雖由至惑用不起者斯是顯可疑者之辭然其本識至還起用者正釋其疑三如是下正示薰除三初法文云解用漸漸薰心者稱理之解常頓從行之解自殊若尅諦法體理性則頓情事則漸其解從行漸者祇由行從情漸行若從理則曰頓行問今以解除情何云以解從情名而漸耶答解若稱理其解即頓但由情隔故解淺深指此名為以解從情二如似下喻三惑種下合四非如下辨異權小祇由小乘不談本識故無熏除豈同不知便非其理有本云亦迷熏除迷應為還第二重初問為見淨心者見即解也答三初法意云別無所由由解淨心為熏淨心則為解由惑淨心為熏淨心則為惑故云解惑之用皆依一心并云即自熏心更無所由此則淨心之外無別有法雖悟假師教即心迷由外緣外緣即心即是自熏自悟自熏自迷二如何下喻此喻不全波動因風不但是水若取因風則別有由今若以喻順法應須了風即水由波動處即是風故波既不離於水故風亦不離水也清風如師教之緣動於淨波毒風如無明之緣動於濁波三解惑下合法理易曉但總合爾第三重問者由佛隨機或談有位或說無位故得今約有無為問及下答文乃從有位須善其旨何者談無位者可非有位說有位者不離無位如世坐位必依於地地無彼此位自先後從地為言可云無位從位為言不可無地若得此旨一位一切位一切位一位一位非一非一切而一而一切理無不通又應四句分別位地一地非位二位非地此二句者地是平等一理復是漸次修證修依理立修不分而分地位殊爾三地即是位如十地也四理即是地如法位也荊谿乃云位可一如應知此位即經一地二答云不定者一有無不定今就有位一相而言二橫竪不定今且就竪一相而言由下論位凡有四番前二約竪後二約橫於前竪義初竪者分別中止既言十解屬別住行依他中止未入中道但在似證屬別迴向此之二位即是圓信真實性止說既云佛滿其未滿者即別地上同圓住上終至等覺第二竪義者依他修止已入中實故屬地上同圓住上是故分別即屬地前同圓住前由圓住前竪屬空假此空假者或以七信為空八至十為假或通以十信為空或通以十信為假不談空空不談假融皆通十還成竪義復望登住為中故亦竪大師云界內習氣至八九十信盡者斯乃通以十信為空其實性既破子時無明妄想故惟妙覺後二橫論者初約十信似證為橫次約名觀解行論橫此二橫義文談五即若非理性三止一時五無由橫是故六位位具三二又復下總明離凡夫等者約人為言凡夫聲聞俱為所離菩薩能離況菩薩人通於四教今文在圓大章第五止觀作用從前生起離在果後約文求意實被初心又作用之言止寂觀照亦可俱通名為作用今文意別正取化他為作用也釋文為三初標章二謂止下隨釋三此明下結釋又二初長行三初別示二初止體證淨心者就佛自辨與諸眾生者約生對說理融無二之性者若從性用染淨不同今從體故云無二圓同一相之身者以一為相故名一相一非筭數相非色心即法身也況法身處二身常在是故三身一相而圓今文在體同名法身三身一相離佛果顯生因故佛果身與生理等雖非色心即色心即色心是三寶無三者體證淨心既融無二故三寶無二寶由證淨心見一體故二諦不二者與諸眾生既圓同一相故二諦不二故指生死即涅槃故怕兮者總歎無二一相之德凝湛者如理融無二淵渟者若一相圓同恬然者總無三不二之德澄明者如混爾無三內寂者如莽然不二澄靜之處自然發明文意在澄內明之處自然恬寂文意在寂用無用相者染淨三皆是性用動無動相者眾生俗事即是真常本來平等者示其本來一性法體心性法爾者示其法體不可思議此則甚深法性之體者以德歎體當知體德不獨甚深亦乃無量以由一性竪窮橫遍當處絕侍二謂觀下觀敘述經論示起用相由證性故得難思用今所記者直記義理凡前後經論并事相等不復委引二又止下通辨文有三對各成四句初約生死涅槃住與不住不入與不互成四句次約寂用即離以成四句三約生死涅槃單複以成四句又初二句約即第三句約己第四句約照三料揀初問二答二初總答別在依佗者以依他性非有而有有即是假又分別性既然證空證空之後即當假也即橫論竪故作此對以餘性助者二性皆有觀行故也二此義下別釋二初依依佗由依他性體是虗相非有而有故能成立緣起化用二然復下以餘性助二初明餘性助具說三性者能助所助共而辨也又以三性止觀皆在化用者於化用中明甚止寂故俱屬用今文應以分別為空依佗為假真實為中圭峯亦以中論三觀對此三性問前真實性乃以自他體同為止今何為觀答此義幽隱難以會通苦得前此義易了前體同者即是一性故名為止今體同者乃是中道故獨屬觀何者由前淨中依佗性觀以該中道寂光法身依佗修止乃止中道寂光法身故至實觀惟觀一性及修止時乃止自他一性之殊令了體同今依他觀乃是於假故依佗止止虗相假乃見中道故至實觀乃了自他中道體同修止自佗中道亦泯見平等性故云本來常住大般涅槃二又若下發願助三初始行二初標示二何故下釋相應知南岳所明止觀不出十乘今文云先須發願者豈非發菩提心得修止觀者豈非巧安止觀除障得益者豈非破法遍亦有位次者豈非知次位知流轉即生死不轉是涅槃者豈非識通塞兼以餘性助成者豈非對治助開既助化他自行比除真性上橫執之真者豈非離法愛捨世諦者豈非能安忍既有其外內術可知用無塵智者豈非調道品既有其慧戒定必存但此窮染之處微妙難知者豈非不思議境文雖前後意實貫通名雖不窮趣實無別義雖不等自實可同又復今且取一二句顯者示知無其源流應遍一部覽入當念方名大車但以智者分別廣說故於正修別示其相名義顯著然其道理亦遍十章又復智者通示十乘雖皆正觀若別說者故前七乘而為行此如記辨又復須知自就前七依於妙境發菩提心依菩提心修於止觀惟此三乘是行正相況破遍者即是止觀所破昏散修止觀時豈存昏散破徧既爾通塞等義自可比知是故今文惟明願行必依境故具三乘此且一期生起而說若論入道必須遍達一部文義即心而明然後於境於願乃至離愛隨一處入皆具十乘是故不須大車之譬自利利人法不出此今先修止後起觀者自行成己然後化物前文先觀後修止者從事入理是以前觀亦可但為起用方便隨念即通者有即非有不為礙所以即通隨念即成者非有即有不為非滯所以即成即通即成者皆妙性之功也二若久下久行前始行者位在名觀今久行者位在相似故云發意欲作隨念即成欲作次言比前名觀須前入止然後起觀方隨念成今相似位欲作即成故深於前比後真證任運而成既云欲作未逃作意故淺於後又所成相淺深不同相似成者以一妙音滿三千界名字觀行所成豈然三諸佛下真證四初法對前作意初住已上皆在佛收住前但得名為菩薩又復若以分極而分作不作意則等覺已還皆名作意惟佛非作今文亦可通作此說二譬如下喻三如來下合即體為用從體論功故云不作四此蓋下結三僧祇者通大通小無執三祇一向在小云淳熟者永絕無明相雜故淳常與妙理相應故熟更無異法者熏熟故爾此外無法又復意顯初心之解與果地解無二無別初心本熟用為事礙為生為凡若淳熟者即是此解而名為佛二偈頌總有十一行一句大分為二初三行明心體二八行一句明心用初心體中雖云作二辨具種種皆能具性望於熏起故咸屬體文又二初二行單約法示二一行帶喻示法初文者初半行總示次半行明人即心體第三半行明法即心體最後半行通結入法皆無二相然此文意該三無差由約一心對於生佛人之與法故於人法各以二結二無二相即是心故三無差帶喻示法中云具種種者既具生佛即該十界界十如及三世間是故一心具三千性對後熏起故此三千俱體斯亦可云不解天台如何消偈二心用中示如藏及違順性意在明於所起之用文為四初三行一句約法次二行約喻三一行總合四二行結勸初法又二初二行一句明染次一行明淨二喻亦二初一行喻染次一行喻淨然今文中以金隨匠成虵佛像虵形金匠如無明緣佛像金匠如師教緣此則真如隨染淨緣成生成佛然此喻文意惟在圓不可通別由別教中不該即故故別望圓無隨緣理就別自說義亦有之圓隨緣者乃同體隨全金為像像不離金更無異物為其像相故其像相相全是金此金隨緣乃名同體別教道乃無此義故非隨緣若自金𦘕像丹青九金無所依處入無丹青像無有相入隨就別以義說者如匠依金外用丹青就於匠𥁞成其像此亦名為真如隨緣但此隨緣是異體隨故不可即以不即故故荊溪云變義惟二即具惟圓所謂變者金體或為丹青所變金體或為形相所變故通於二所謂即者形相即丹青非金故即惟圓復云具者良由於金能具像性故可即金作於像形別教不知金具像性謂金不可即作於像但可依之丹青為像由不知具所以不即問別教隨緣既非即義藏師有起信論疏其云不變即隨緣者以今收會為屬何教答進不成圓退不成別以不談具而即故不具非圓即故非別問或云別教亦有即義但是體即其相不即圓教則乃相體俱即故彼即義正是體即與今別同答義例之中宮路土喻妙示之中氷水之喻豈非乃是相離體即何云圓惟相體俱即或云別教相離體即不同氷水正如丹青相離金體乃即然作此說者但金即金豈是隨緣即不變耶或曰取能隨邊云隨緣即然作此說者乃非彼宗之所立之義彼宗疏云自性清淨心動作生滅不相捨離故云和合非謂別有生滅與真和合彼疏又云生滅之心心之生滅無二相故而無二體不相捨離既云而無二體豈是金上丹青之相為相離耶故知彼宗會相歸心正如息波是水而無波相為相離體即但不談具故非今圓若以彼宗因不談具以今奪之雖有即名而無即義故屬別教有何不可而但不可直將即義全同今別問別教隨緣若是異體池水清濁其喻如何答若取波水本是即義惟可喻圓若喻別者不取即義但取水為清濁之本故荊溪云別人乃為迷解之本圓人即知心是法界圓取即義別取本義於文明矣例如幻夢八喻本是幻空屬摩訶衍或時亦取證於三藏但取鋪滅空義不取當體幻有問前後皆云平等一性若隨緣者應是此性與彼何殊答今談一者乃是三千三諦即一之一故此之一即是具足染淨之一非不具一故與彼殊結勸中云莫輕御自身者御訓使也當使自身而成佛道自得作用也亦勿賊於他者化他作用也此二作用由止觀故第二流通分者廣說文立大章為五故此禮佛不顯其教意屬流通然流通即日用中流通大乘止觀法門後了今文不獨流通謂隨日用一部大體四三昧中似隨自意但由南岳別名一卷曰隨自意既有彼別故今成通例如十乘通四三昧問彼隨自意山家諸文亦曾指用今此止觀殊不涉言者何者冥用義旨但無顯言問既無顯言恐非真有答南岳曾說無諍行門亦為二卷并禪要等山家諸文殊不涉言既不涉言亦非真有耶問南岳僧傳何不載之答智者說法成頗多南岳僧傳豈𦘕載耶復恐今即無諍行門云云釋文為三初禮佛二飲食三便利為善之最無出恭佛資己之要無出飲食穢物之極無出便利而於此三示止觀者是日用故無有一法非止觀故皆治惡故皆得道故禮佛為三初凡禮下標二所言下釋二初止觀各論二初觀二初標二當知下釋三此觀下結釋又三初生佛同異二初體同二但以下用異二初身二然一下心由佛與生理體雖同事用有異生不證體但為業用不得自在一身不能現無量身一心不能遍知一切佛證體故稱體為用其自在身為無量身滿十方三世必一切種智遍知無量法二是故下行者修供若以體同何彼何此祇由用異有沈昇沈故遂修供養文為二初事二理以約事故能供所供未辨全性以約理故皆全性現然此二義今皆在圓初心莫不了知生佛能所一切諸法皆即自心全具發現但以理無種種行有殊塗或就事而修或從理而習故有雖知佛身心普遍而未觀即心而為融知或修供五塵而未現無非性起故名為事若也觀佛觀供皆即心性故名為理此之事理亦同荊溪引用占察明於今家事理二觀約事專照起心未現此心即是心性從理惟達法性於一切境皆觀即如云云初事又四初法猶如下喻三行者下合四如是下結德初法中若供法當作是念下示修事觀然供法中若供養時一句之文乃用依報五塵之法若禮拜下即是正報三業修法依正雖殊莫非皆是因緣生法生法而為供養今文別以五塵名供養禮拜等為修法結德云勸見佛心者如有慈悲受我供養禮二又若下理觀二初想心作佛二初示義又若能想作一佛等者今問所想作者為作自己佛為是作他佛若是佗佛者其如己心作若是己佛者其如供他佛答須曉各互具則己佗自明若論各具者心即作自佛若論互具者心乃作佗佛雖己他佛殊莫不皆心作良由己心具故乃作可成今文是互具觀想於己心即乃作他佛亦見於己佛即是於佗佛既然了他佛不離於己心亦是於佗佛即是於己佛問今文修觀義想心作佛時於三性之中為屬何性攝答即就依他性具有三性義故下文修止云有即非有良由想此心而能作諸佛心屬實中觀心作佛虗想屬依他空觀從虗當體屬分別假亦可於虗相若也見為實屬分別假觀又心屬空中虗相即假觀心是真實性虗相該於二問前分別為空以依他為假與今初對者其義何不同答前取分別性己實則為空故依他為假今取分別性照實則為假是故依他性虗相則為空文云亦是現前供養者雖云供養由未顯說從心想作乃下方云從心出生所以料在想心作佛文云是心作佛是心是佛者引經證今想心作佛作即緣起是即本具心若不是作則不成問想心作佛為觀心耶為觀佛耶答從迷定境則曰觀佛從悟為觀則曰觀心祇一觀境受此二名例荊溪云迷謂內外悟惟一心又復須知此且從於唯心以說若唯色唯香唯味唯觸則曰從悟觀色觀香味等問若觀心者當如何云答從迷定境則曰觀心從悟為觀亦曰觀心問二心何殊答前之心者乃是生佛若依若正等於自己五根五塵離比當念之名心也後之心者即是生佛若依若正自己根塵不離當念之名心也若於此義能曉了者不可但云若觀佛者必須照心亦應須云若觀心者必須照佛若離佛觀心豈是圓觀故祖師以三千一念而為圓觀問既佛照心亦名觀心必觀心照佛亦名觀佛若爾則大師止觀常坐觀心是觀佛耶答今意不爾今曰從悟觀心者乃約若心若佛一如之處如名為心是以或觀佛或觀心皆曰觀心若約一如之處如名為佛是亦可云從悟觀佛但為順今凡下於妄心中以示唯心若示唯佛有何不可復了心佛皆假名自生疑惑云云二料揀有二初重問意是前非後意謂不合於無實中起假想故然得旨者皆當失旨者是非今誠辨之天然性體不當事理宛然故不妨他佛非我我非他佛佛能知我我不知佛故修供養如有獻施於大眾中非理宛然故不妨無佛無己無供無事無想無念以理即事故不妨即己心是佛即己心想若因想故佛現前問者昧此故有是非問心想作佛的從正意為真為妄若為真者經曰心有想即癡若為妄者今遭惟耶答一者約於所想之法以分真妄義有多途若以世間善惡而分心想惡事為妄心想善境為真若以世出世而分心想世間為妄心想出世為真若自於出世以巧掘而論心想實有為妄心想幻有為真若以偏空對中而論心想偏空為妄心想中道為真若以次第對圓融論心想次第三諦為妄心想圓融三諦為真若自就圓融中邊而論心想二邊為妄心想中道為真體用已照例此說之經云心有想即癡者正約體用中邊亦談亡照而說乃以中道奪於假觀從假當體乃斥云癡若即妙性想假何疑談亡照者如荊溪云不食於有不著於空不求於中無三想故二者約於能想之心情想則妄想則真然觀之為言亦復不同以理觀照此觀方真以情觀照此觀還妄今且對情以觀為真問文何不云觀作一佛身等而云想取答初心習觀且立想名觀行未深仍順想故況復此想順理而為故非妄想實是真觀又順理起想豈局初心是教文菩薩為別荊溪亦云等覺尚通名想應知進不義不一端從極為言唯佛一人三千相應方不想若爾想還是妄然想體雖妄既順理起妄即是真答三初約佛世凡夫為例二又復下超勝二乘曲見為德二初出非曲見乃劣不曲見勝然此勝劣義非一途若惟從事人天之相為劣佛三十二相為勝復以三十二相為芬八萬四千為勝八萬四千為劣藏塵相好為勝是以就出世論故藏惟劣通含勝劣別圓是勝藏惟曲見別圓非曲通則兩兼若對即理為事而言故但從事辨三品之相皆名為劣以即理故三品之相方名為勝故云來至今經從劣辨勝即三而一良由即前三教之劣為圓一勝故藏通別皆名為劣盡號曲見唯圓非曲方乃名勝今文曲見雖語二乘以意求之必談三教由此三教不談心性即具緣起然此四教南岳深知為讓化緣在天台故遂隱其名不廣顯示二我今下顯德不壞真寂者真實性也不壞緣起者分別性也此之緣起既依真寂依他性也故此三觀皆在依具修此三三又若下引華嚴并為類二初類見佛然華嚴談別今取證同若存教道但約異體相依緣起亦得名為不定外來二又復下類淨業我今想心作佛之時即此想心是名淨業能熏真心因想成佛即是真心從熏緣起豈惟真心觀佛義同亦乃淨業熏心相類第二重初問意者既以己心想作佛無佗實佛耶二答三初總示由一心體中雖然非自他他自不相礙自他復相即二何以下釋相二初約一切生佛無不體同二是故下偏據一人以論心體二初心體同一切生佛既一心體是以趣舉一生為言即是生作生生作佛趣舉一佛為言即是佛作佛佛作生此則但由趣舉不同其實生作生即是佛作生佛作佛即是生作佛故云由此義故一切諸佛惟是我心所作如華嚴云應知自心念念常有佛成正覺二但由下明熏異心體雖同以由熏異必假想佛而為熏業方得見佛文為三初總示二以是下別示二初因熏得見二若無下示不熏不見三是故下總結前義為二初結諸佛前雖但眾生因熏故得見佛今乃示佛亦自熏力故得見生大論云若諸佛現在前諸佛可爾今乃不見云何可請答佛雖必說而不待請請者得福何得不請猶如大王雖多美膳若有請者必得恩福又眾生雖不面見諸佛諸佛何甞不見其心聞其所請假令諸佛不見不聞請亦得福何況聞見而無益耶是故諸佛常見眾生二若偏據下結眾生三若不下斥結以圓斥偏皆不識佛二又復下想心作供二初示二想身心出現五陰二初標亦從定心出生者初心必詫十大善地定之心數即見本性首楞嚴定故能出生一切諸法二以是下示二或復下想身十方親侍禮足身數等諸佛者佛若無量身我身亦無量猶如大梵王者想所變身如此瑞妙又諸佛興世皆有梵王請轉法故二知身下結不生妄想執謂心外有者以即性故則事妄想三復知下己他互益二初以他益己二以己下以己益二止門下修止三初標二當知下釋三如是下釋三如是下結釋中云有即非有者若指實有非有即分別中止若指虗有非有即依他中止唯是一心者在依他屬止於實性屬觀亦不得取一心之相者真實中止荊溪云能禮所禮性空寂者若以能禮所禮為實有實有性空同分別止若以能禮所禮為虗有虗有性空同依佗止故空寂言即是空中屬真實觀感應者若以實有為感應同分別觀若以虗有為感應緣同依佗觀故感應言即是假觀云道交由此感應即是三千妙假道交眾生理具諸佛果滿因果雖殊三千道合惟思議者或別語感應屬前二性或道結兩處屬真實止故空假中當處即一亦不得取一心之相故雖思議或真以空寂為空感應為假惟思為中對今三性止觀禮佛者前曾三性經對三觀約彼會之義無不合二復不下止觀雙行三初標二所謂下釋三此是下結釋又二初示二是故下證供養下是觀諸佛下是止說雖前後行在一時二飯食二初總標二所言下隨釋二初觀三初標二初得下釋三初反劣為勝三初示義二是故下引證三問下料揀初又二初先修供養二作此下供已可食初又二初總示由佗是勝田故標章居首二即當下別示三初能供二初心體能變二作是下所變器食二作此下所供三當念下結能所二又復下變一為多二初先修供養二初能供二作此下所供二作此下供已可食南岳別有隨自意云凡所得食應云此食色香味上供十方佛中奉諸賢聖下及六道品等施無差別隨感皆飽滿令諸施主得無量波羅蜜又云念食色香如旃檀風一時普熏十方世界凡聖有感各得上味六道聞香發菩提心於食能生六波羅蜜及以三行智者亦云譬如熏藥藥隨火勢入人身中患除方復菩薩觀食亦復如是以食施時食為法界具一切法凡諸受者法隨食入乃為冥益或近或遠終破無明應知豈惟施於前人有此之德己身戶蟲何不然耶三若為下變勝為劣二初示相二何故下釋義二止門有標釋結三皆在文易見惟恐不行然此止觀理深事諸晨已現前若能明記不忘乃獲無量功德三利使便三初標二隨釋三料揀重問答瓔珞云神名天心通名慧性天心者天然之心也慧性者通達無礙也毗曇立云障通無知若去即發慧性地持力品云神謂難測知通謂無壅礙若以神通與幻術辨如釋論云幻術事是虗法法於草木誑惑人眼物實不變神通不爾實得變法使物實變今於神通約圓菩薩對二乘辨故二乘人依背捨勝處一切處等修十四變化通從外來不全性用若圓菩薩了中道真真
